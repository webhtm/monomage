
 <!DOCTYPE html>
 <html lang="en">
 <head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
 <title>Monomage</title>
 <style>
   :root{
     --bg:#333;
     --panel:#3a3a3a;
     --panel-2:#444;
     --panel-3:#505050;
     --border:#565656;
     --text:#eaeaee;
     --muted:#a8a8ae;
     --accent:#4d96ff;
     --accent-2:#4d96ff;
     --accent-strong:#4d96ff;
     --danger:#ff6b6b;
     --radius:14px;
     --radius-sm:10px;
     --radius-xs:8px;
     --shadow:0 8px 24px rgba(0,0,0,.4);
   }
  
   *{ box-sizing:border-box; }
   html,body{ height:100%; }
   body{
     margin:0;
     font-family: "Heebo", "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
     background:var(--bg);
     color:var(--text);
     overflow:hidden;
     -webkit-tap-highlight-color: transparent;
   }
   button, input, select, textarea{ font-family:inherit; color:inherit; }
   button{ cursor:pointer; }
  
   /* ---------- Layout ---------- */
   #app{
     display:grid;
     grid-template-columns: 320px 1fr 56px;
     grid-template-rows: 100vh;
     width:100vw;
     height:100vh;
     overflow:hidden;
   }
  
   /* ---------- Sidebar (Desktop) ---------- */
   #sidebar{
     background:var(--panel);
     border-right:1px solid var(--border);
     display:flex;
     flex-direction:column;
     min-width:0;
   }
   .brand{
     padding:14px 16px 8px;
     display:flex;
     align-items:center;
     gap:10px;
   }
   .brand h1{
     margin:0;
     font-size:20px;
     font-weight:800;
     letter-spacing:.4px;
     color:var(--text);
   }
  
   .file-actions{
     display:flex; gap:8px; padding:6px 12px;
   }
   .file-actions button{
     flex:1;
     background:var(--panel-2);
     border:1px solid var(--border);
     color:var(--text);
     padding:9px 8px;
     border-radius:var(--radius-sm);
     font-size:12.5px;
     display:flex; align-items:center; justify-content:center; gap:6px;
     transition:background .15s, transform .05s;
   }
   .file-actions button:hover{ background:var(--panel-3); }
   .file-actions button:active{ transform:scale(.98); }
   .file-actions button.primary{
     background:var(--accent);
     border-color:transparent;
     color:#fff;
   }
   .file-actions svg{ width:14px;height:14px; }
  
   .search-wrap{ padding:6px 12px; }
   .search-box{
     display:flex; align-items:center; gap:8px;
     background:var(--panel-2);
     border:1px solid var(--border);
     border-radius:var(--radius-sm);
     padding:8px 10px;
   }
   .search-box svg{ width:14px;height:14px;color:var(--muted); flex-shrink:0;}
   .search-box input{
     flex:1; background:transparent; border:none; outline:none;
     color:var(--text); font-size:13px;
   }
   .search-box input::placeholder{ color:var(--muted); }
  
   .cat-wrap{ padding:6px 12px 10px; border-bottom:1px solid var(--border); position:relative; }
   .cat-switcher{
     display:flex; align-items:center;
     background:var(--panel-2);
     border:1px solid var(--border);
     border-radius:var(--radius-sm);
     padding:8px 10px;
     gap:8px;
     cursor:pointer;
     user-select:none;
   }
   .cat-switcher .cat-icon{
     width:22px;height:22px;border-radius:6px;
     background:var(--accent);
     display:grid;place-items:center;
     flex-shrink:0;
   }
   .cat-switcher .cat-icon svg{ width:12px;height:12px; color:#fff; }
   .cat-switcher .cat-label{ flex:1; font-size:13.5px; font-weight:500; }
   .cat-switcher .caret{ width:14px;height:14px;color:var(--muted); transition:transform .2s;}
   .cat-switcher.open .caret{ transform:rotate(180deg); }
  
   /* Dropdown */
   .dropdown{
     position:absolute;
     left:12px; right:12px;
     background:var(--panel-2);
     border:1px solid var(--border);
     border-radius:var(--radius-sm);
     box-shadow:var(--shadow);
     z-index:50;
     display:none;
     overflow:hidden;
   }
   .dropdown.open{ display:block; }
   .dropdown-search{
     padding:8px;
     border-bottom:1px solid var(--border);
     background:var(--panel);
   }
   .dropdown-search input{
     width:100%;
     background:var(--panel-3);
     border:1px solid var(--border);
     border-radius:var(--radius-xs);
     padding:7px 10px;
     outline:none;
     font-size:13px;
     color:var(--text);
   }
   .dropdown-list{
     max-height:260px;
     overflow-y:auto;
   }
   .dropdown-item{
     display:flex; align-items:center; gap:10px;
     padding:9px 12px;
     font-size:13px;
     cursor:pointer;
     transition:background .1s;
   }
   .dropdown-item:hover{ background:var(--panel-3); }
   .dropdown-item.active{ background:rgba(77,150,255,.18); color:var(--accent); }
   .dropdown-item .di-icon{
     width:20px;height:20px;border-radius:5px;
     background:var(--panel-3);
     display:grid;place-items:center;
   }
   .dropdown-item .di-icon svg{ width:12px;height:12px; color:var(--muted); }
   .dropdown-item.active .di-icon{ background:rgba(77,150,255,.25); }
   .dropdown-item.active .di-icon svg{ color:var(--accent); }
  
   /* Content pane (categories list) */
   .content{
     flex:1;
     overflow-y:auto;
     padding:14px 12px 60px;
     scrollbar-width: thin;
   }
   .content::-webkit-scrollbar{ width:8px; }
   .content::-webkit-scrollbar-thumb{ background:var(--panel-3); border-radius:4px;}
   .section{
     margin-bottom:18px;
     scroll-margin-top:10px;
   }
   .section-title{
     font-size:11px;
     letter-spacing:1.2px;
     text-transform:uppercase;
     color:var(--muted);
     margin:0 0 10px 4px;
     display:flex; align-items:center; gap:8px;
   }
   .section-title .sec-line{ flex:1; height:1px; background:var(--border); }
  
   .grid{
     display:grid;
     grid-template-columns:repeat(2, 1fr);
     gap:8px;
   }
   .grid.grid-3{ grid-template-columns:repeat(3,1fr); }
   .grid.grid-1{ grid-template-columns:1fr; }
  
   .tool-btn{
     background:var(--panel-2);
     border:1px solid var(--border);
     color:var(--text);
     padding:9px 10px;
     border-radius:var(--radius-sm);
     font-size:12.5px;
     display:flex; align-items:center; gap:8px; justify-content:flex-start;
     text-align:left;
     transition:all .15s;
     min-height:38px;
   }
   .tool-btn:hover{ background:var(--panel-3); border-color:#5f5f66; }
   .tool-btn:active{ transform:scale(.98); }
   .tool-btn.active{
     background:rgba(77,150,255,.18);
     border-color:var(--accent);
     color:var(--accent);
   }
   .tool-btn svg{ width:14px;height:14px; flex-shrink:0;}
   .tool-btn.centered{ justify-content:center; text-align:center;}
  
   .field{
     background:var(--panel-2);
     border:1px solid var(--border);
     border-radius:var(--radius-sm);
     padding:10px 12px;
     display:flex; flex-direction:column; gap:6px;
     margin-bottom:8px;
   }
   .field label{
     font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px;
     display:flex; justify-content:space-between;
   }
   .field label span.val{ color:var(--text); text-transform:none; letter-spacing:0; font-weight:500;}
   .field input[type="range"]{
     width:100%;
     accent-color:var(--accent);
   }
   .field input[type="number"], .field input[type="text"], .field select{
     background:var(--panel-3);
     border:1px solid var(--border);
     color:var(--text);
     border-radius:var(--radius-xs);
     padding:7px 9px;
     font-size:13px;
     outline:none;
     width:100%;
   }
   .field input[type="color"]{
     width:100%; height:32px; border:1px solid var(--border);
     background:var(--panel-3); border-radius:var(--radius-xs);
     cursor:pointer; padding:2px;
   }
   .field .row{ display:flex; gap:6px; }
   .field .row > *{ flex:1; }
  
   /* Color control (with gradient toggle) */
   .colorctrl{ display:flex; flex-direction:column; gap:6px; }
   .colorctrl-head{ display:flex; gap:6px; align-items:center; }
   .colorctrl-head .swatch-preview{
     width:34px; height:32px; border-radius:var(--radius-xs);
     border:1px solid var(--border); flex-shrink:0; cursor:pointer;
   }
   .colorctrl-head input[type="color"]{ flex:1; height:32px; padding:2px; }
   .grad-toggle{
     width:34px;height:32px; flex-shrink:0;
     border:1px solid var(--border); background:var(--panel-3);
     border-radius:var(--radius-xs); display:grid; place-items:center;
     font-size:10px; color:var(--muted);
   }
   .grad-toggle.active{ border-color:var(--accent); color:var(--accent); background:rgba(77,150,255,.15);}
   .grad-panel{ display:none; flex-direction:column; gap:6px; padding-top:4px; }
   .grad-panel.open{ display:flex; }
   .grad-stops{ display:flex; gap:6px; }
   .grad-stops input[type="color"]{ flex:1; height:28px; }
   .grad-angle{ display:flex; align-items:center; gap:6px; }
   .grad-angle input[type="range"]{ flex:1; }
  
   /* Font formatting */
   .fmt-row{ display:flex; gap:6px; }
   .fmt-btn{
     flex:1;
     background:var(--panel-3);
     border:1px solid var(--border);
     color:var(--text);
     border-radius:var(--radius-xs);
     padding:6px 0;
     min-height:34px;
     display:grid; place-items:center;
     font-size:14px;
   }
   .fmt-btn.active{
     background:rgba(77,150,255,.22);
     border-color:var(--accent);
     color:var(--accent);
   }
   .fmt-btn b{ font-weight:700; }
   .fmt-btn i{ font-style:italic; }
   .fmt-btn u{ text-decoration:underline; }
   .fmt-btn .sup{ font-size:10px; vertical-align:super; }
   .fmt-btn .sub{ font-size:10px; vertical-align:sub; }
  
   /* ---------- Center: Canvas Area ---------- */
   #canvas-area{
     background:
       linear-gradient(45deg, #2b2b2b 25%, transparent 25%),
       linear-gradient(-45deg, #2b2b2b 25%, transparent 25%),
       linear-gradient(45deg, transparent 75%, #2b2b2b 75%),
       linear-gradient(-45deg, transparent 75%, #2b2b2b 75%);
     background-size: 24px 24px;
     background-position: 0 0, 0 12px, 12px -12px, -12px 0;
     background-color:#2f2f2f;
     display:flex; align-items:center; justify-content:center;
     overflow:auto;
     position:relative;
     min-width:0;
   }
   #canvas-wrap{
     position:relative;
     display:inline-block;
     box-shadow:0 20px 60px rgba(0,0,0,.6);
     background:transparent;
   }
   #canvas{
     display:block;
     max-width:100%;
     max-height:calc(100vh - 40px);
     cursor:crosshair;
     touch-action:none;
   }
   #overlay{
     position:absolute; inset:0;
     pointer-events:none;
     touch-action:none;
   }
   #overlay.interactive{ pointer-events:auto; }
   /* Paint layer sits between the base image canvas and the overlay.
      All live brushstrokes are drawn here so the eraser can use
      destination-out safely without ever cutting into the base image. */
   #paint-layer{
     position:absolute; inset:0;
     pointer-events:none;
     touch-action:none;
     width:100%; height:100%;
   }
  
   /* Inline text edit box */
   #text-edit-box{
     position:absolute;
     display:none;
     z-index:30;
     background:transparent;
     border:2px dashed var(--accent);
     color:#fff;
     outline:none;
     padding:2px 4px;
     resize:none;
     overflow:hidden;
     white-space:pre;
     line-height:1.1;
     text-align:center;
   }
  
   #empty-state{
     color:var(--muted);
     text-align:center;
     padding:40px;
     max-width:400px;
   }
   #empty-state h2{
     margin:8px 0 4px; font-weight:800; font-size:26px;
     color:var(--text);
   }
   #empty-state p{ margin:0 0 18px; font-size:13.5px; line-height:1.5;}
   #empty-state .es-actions{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}
   #empty-state .es-actions button{
     background:var(--panel-2); border:1px solid var(--border); color:var(--text);
     padding:9px 14px; border-radius:var(--radius-sm); font-size:13px;
     display:flex; align-items:center; gap:8px;
   }
   #empty-state .es-actions button.primary{
     background:var(--accent);
     border-color:transparent;
   }
   #empty-state .es-actions svg{ width:14px;height:14px;}
  
   /* ---------- Right Toolbar (desktop) ---------- */
   #tools-rail{
     background:var(--panel);
     border-left:1px solid var(--border);
     display:flex; flex-direction:column;
     align-items:center;
     padding:12px 6px;
     gap:6px;
     overflow-y:auto;
   }
   .rail-btn{
     width:42px;height:42px;
     border-radius:10px;
     background:transparent;
     border:1px solid transparent;
     color:var(--muted);
     display:grid; place-items:center;
     transition:all .15s;
     position:relative;
   }
   .rail-btn:hover{ background:var(--panel-2); color:var(--text);}
   .rail-btn.active{
     background:rgba(77,150,255,.2);
     color:var(--accent);
     border-color:rgba(77,150,255,.4);
   }
   .rail-btn svg{ width:18px;height:18px;}
   .rail-btn[data-tooltip]:hover::after{
     content:attr(data-tooltip);
     position:absolute;
     right:calc(100% + 8px); top:50%; transform:translateY(-50%);
     background:var(--panel-3);
     padding:5px 9px;
     border-radius:6px;
     font-size:12px;
     white-space:nowrap;
     color:var(--text);
     border:1px solid var(--border);
     pointer-events:none;
     z-index:100;
   }
   .rail-divider{ width:26px; height:1px; background:var(--border); margin:4px 0;}
  
   /* ---------- Mobile top bar ---------- */
   #mobile-topbar{ display:none; }
   #mobile-bar{ display:none; }
  
   @media (max-width: 900px){
     :root{
       /* Default bottom-pane height on mobile. Deliberately compact — shows
          one row of controls + the category switcher. The user can drag the
          pill at the top of the pane to make it bigger (up to 90vh) or
          double-tap the pill to reset. */
       --mb-height: 34vh;
       --topbar-height: 46px;
     }
     #app{
       grid-template-columns: 1fr;
       grid-template-rows: auto 1fr auto;
       height: 100vh;
       height: 100dvh;
     }
     #sidebar{ display:none; }
     #tools-rail{ display:none; }
  
     /* Sticky top bar with file actions (icons) + scrollable tools */
     #mobile-topbar{
       display:flex;
       grid-row:1;
       align-items:center;
       background:var(--panel);
       border-bottom:1px solid var(--border);
       position:sticky;
       top:0;
       z-index:30;
       height:var(--topbar-height);
       padding:0;
       padding-top: env(safe-area-inset-top, 0px);
     }
     .mtb-files{
       display:flex; gap:4px;
       padding:0 6px;
       position:sticky; left:0;
       background:var(--panel);
       z-index:2;
       flex-shrink:0;
       height:100%;
       align-items:center;
     }
     .mtb-files button{
       width:34px; height:34px;
       border-radius:8px;
       background:var(--panel-2);
       border:1px solid var(--border);
       color:var(--text);
       display:grid; place-items:center;
       flex-shrink:0;
     }
     .mtb-files button.primary{
       background:var(--accent);
       border-color:transparent;
       color:#fff;
     }
     .mtb-files svg{ width:15px; height:15px; }
  
     /* Category switcher inside mobile top bar (no arrows) */
     .mtb-cat{
       flex:1; min-width:0;
       display:flex; align-items:center;
       padding:0 6px;
       height:100%;
       position:relative;
     }
     .mtb-cat-switcher{
       flex:1; min-width:0;
       display:flex; align-items:center; gap:6px;
       background:var(--panel-2);
       border:1px solid var(--border);
       border-radius:8px;
       padding:5px 8px;
       cursor:pointer;
       min-height:32px;
     }
     .mtb-cat-switcher .cat-icon{
       width:18px;height:18px;border-radius:5px;
       background:var(--accent);
       display:grid;place-items:center; flex-shrink:0;
     }
     .mtb-cat-switcher .cat-icon svg{ width:10px;height:10px; color:#fff;}
     .mtb-cat-switcher .lbl{
       flex:1; font-size:13px; font-weight:500;
       white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
       min-width:0;
     }
     .mtb-cat-switcher .caret{ width:12px;height:12px; color:var(--muted); transition:transform .2s; flex-shrink:0;}
     .mtb-cat-switcher.open .caret{ transform:rotate(180deg);}
     #mtb-cat-dropdown{
       position:fixed;
       left:8px; right:8px;
       top:auto; bottom:auto;
       max-height:60vh;
       z-index:80;
       display:none;
       flex-direction:column;
     }
     #mtb-cat-dropdown.open{ display:flex; }
     #mtb-cat-dropdown .dropdown-search{ flex:0 0 auto; }
     #mtb-cat-dropdown .dropdown-list{ flex:1 1 auto; max-height:none; min-height:0; }
  
     /* Right side: Tools dropdown btn + Download */
     .mtb-right{
       display:flex; gap:4px;
       padding:0 6px;
       height:100%;
       align-items:center;
       flex-shrink:0;
       position:relative;
     }
     .mtb-tools-btn, .mtb-right button[data-action]{
       width:34px; height:34px;
       border-radius:8px;
       background:var(--panel-2);
       border:1px solid var(--border);
       color:var(--text);
       display:grid; place-items:center;
       flex-shrink:0;
     }
     .mtb-tools-btn.active{
       background:rgba(77,150,255,.2);
       color:var(--accent);
       border-color:rgba(77,150,255,.4);
     }
     .mtb-right button.primary{
       background:var(--accent);
       border-color:transparent; color:#fff;
     }
     .mtb-tools-btn svg, .mtb-right button svg{ width:15px; height:15px; }
     #mtb-tools-dropdown{
       position:fixed;
       right:8px; left:auto;
       top:auto; bottom:auto;
       width:220px; max-width:calc(100vw - 16px);
       max-height:70vh;
       z-index:80;
       display:none;
       flex-direction:column;
     }
     #mtb-tools-dropdown.open{ display:flex; }
     #mtb-tools-dropdown .dropdown-list{ flex:1 1 auto; max-height:none; min-height:0; }
     #mtb-tools-dropdown .dropdown-item.divider{
       height:1px; padding:0; background:var(--border); margin:4px 8px; cursor:default;
     }
     #mtb-tools-dropdown .dropdown-item.divider:hover{ background:var(--border); }
  
     #canvas-area{
       grid-row: 2;
       padding:6px;
       min-height:0;
       height: calc(100dvh - var(--mb-height) - var(--topbar-height) - 8px);
       max-height: calc(100dvh - var(--mb-height) - var(--topbar-height) - 8px);
       overflow:hidden;
       /* Always center; do not scroll on mobile so portrait pics scale down cleanly. */
       overflow: hidden;
     }
     #canvas-wrap{
       max-width:100%;
       max-height:100%;
       /* portrait images: keep aspect ratio while fitting inside the available box */
       width:auto; height:auto;
       display:block;
       /* becomes block for layout, JS controls exact sizing */
     }
     #canvas{
       display:block;
       max-width: 100%;
       max-height: 100%;
       width:auto; height:auto;
       /* object-fit doesn't apply to canvas painting, but keeping for scaled bitmap sharpness in some browsers */
       object-fit: contain;
     }
  
     #mobile-bar{
       display:flex;
       flex-direction:column;
       grid-row:3;
       background:var(--panel);
       border-top:1px solid var(--border);
       position:sticky;
       bottom:0;
       z-index:20;
       padding: 5px 8px 6px;
       padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px));
       gap:5px;
       height: var(--mb-height);
       max-height: 90vh;
       min-height: 90px;
       box-shadow:0 -8px 24px rgba(0,0,0,.35);
     }
     #mobile-bar.compact .mb-content{ display:none; }
     /* Bottom-bar category switcher is a duplicate of the top-bar one on mobile — hide it to reclaim space */
     #mobile-bar .mb-cat-row{ display:none !important; }
     /* Simplified mode for cropping/resizing on mobile */
     #mobile-bar.crop-mode .mb-cat-row,
     #mobile-bar.crop-mode .mb-content{ display:none !important; }
     #mobile-bar.crop-mode .mb-crop-strip{ display:flex !important; }
  
     .mb-cat-row{
       display:flex; align-items:center; gap:6px;
       position:relative;
       max-width:460px;
       width:100%;
       margin:0 auto;
     }
     .mb-arrow{
       width:32px;height:32px;
       border-radius:8px;
       background:var(--panel-2);
       border:1px solid var(--border);
       display:grid; place-items:center;
       color:var(--text);
       flex-shrink:0;
     }
     .mb-arrow:active{ transform:scale(.92); }
     .mb-arrow svg{ width:14px;height:14px;}
     .mb-cat-switcher{
       flex:1;
       display:flex; align-items:center; gap:6px;
       background:var(--panel-2);
       border:1px solid var(--border);
       border-radius:8px;
       padding:6px 10px;
       cursor:pointer;
       min-height:32px;
     }
     .mb-cat-switcher .cat-icon{
       width:18px;height:18px;border-radius:5px;
       background:var(--accent);
       display:grid;place-items:center;
     }
     .mb-cat-switcher .cat-icon svg{ width:10px;height:10px; color:#fff;}
     .mb-cat-switcher .lbl{
       flex:1; font-size:13px; font-weight:500; text-align:center;
       white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
       min-width:0;
     }
     .mb-cat-switcher .caret{ width:12px;height:12px; color:var(--muted); transition:transform .2s;}
     .mb-cat-switcher.open .caret{ transform:rotate(180deg);}
  
     #mobile-bar .dropdown{
       position:fixed;
       left:8px; right:8px;
       top:auto;
       bottom:auto;
       max-height:60vh;
       z-index:80;
     }
     #mobile-bar .dropdown-list{ max-height: calc(60vh - 60px);}
  
     .mb-content{
       overflow-y:auto;
       /* Fill whatever space is left inside the (user-resizable) bottom bar
          after the category row + drag pill. No fixed vh cap here — the bar
          itself is capped, and the drag pill controls the total height. */
       flex:1 1 auto;
       min-height:0;
       padding-right:4px;
     }
     .mb-content:empty{ display:none; }
     .mb-content::-webkit-scrollbar{ width:6px;}
     .mb-content::-webkit-scrollbar-thumb{ background:var(--panel-3); border-radius:3px;}
  
     .mb-content .tool-btn{
       padding:6px 7px;
       font-size:11.5px;
       min-height:30px;
       border-radius:7px;
     }
     .mb-content .tool-btn svg{ width:11px;height:11px;}
     .mb-content .field{
       padding:5px 8px 6px;
       border-radius:7px;
       gap:2px;
       margin-bottom:6px;
     }
     .mb-content .field label{
       font-size:10px;
       letter-spacing:.5px;
     }
     .mb-content .field label span.val{ font-size:10.5px; }
     .mb-content .field input[type="range"]{
       height:16px;
       margin:0;
       padding:0;
     }
     .mb-content .field input[type="number"],
     .mb-content .field input[type="text"],
     .mb-content .field select{
       padding:5px 7px;
       font-size:12px;
     }
     .mb-content .field input[type="color"]{ height:24px; }
     .mb-content .colorctrl-head .swatch-preview{ width:26px; height:24px; }
     .mb-content .colorctrl-head input[type="color"]{ height:24px; }
     .mb-content .grad-toggle{ width:26px; height:24px; }
     .mb-content .section{ margin-bottom:9px;}
     .mb-content .section-title{ font-size:9.5px; margin-bottom:5px;}
     .mb-content .fmt-btn{ min-height:28px; font-size:12.5px;}
     .mb-content .swatch{ border-radius:5px; }
     .mb-content .swatches{ gap:3px; grid-template-columns:repeat(10,1fr);}
     .mb-content .swatch{ }
  
     .grid{ grid-template-columns:repeat(3,1fr); gap:5px; }
     .grid.grid-2-mobile{ grid-template-columns:repeat(2,1fr); }
   }
  
   .hidden{ display:none !important; }
  
   /* Modal */
   .modal-backdrop{
     position:fixed; inset:0;
     background:rgba(0,0,0,.6);
     display:none;
     align-items:center; justify-content:center;
     z-index:200;
     padding:16px;
   }
   .modal-backdrop.open{ display:flex; }
   .modal{
     background:var(--panel);
     border:1px solid var(--border);
     border-radius:16px;
     width:100%; max-width:400px;
     padding:20px;
     box-shadow:var(--shadow);
   }
   .modal h3{ margin:0 0 14px; font-size:16px;}
   .modal .field{ margin-bottom:10px; }
   .modal-actions{ display:flex; gap:8px; margin-top:14px;}
   .modal-actions button{
     flex:1; padding:9px; border-radius:10px; border:1px solid var(--border);
     background:var(--panel-2); color:var(--text); font-size:13px;
   }
   .modal-actions button.primary{
     background:var(--accent);
     border-color:transparent;
   }
   .modal-tabs{ display:flex; gap:6px; margin-bottom:14px; }
   .modal-tabs button{
     flex:1; padding:8px; border-radius:8px; font-size:13px;
     background:var(--panel-2); border:1px solid var(--border); color:var(--text);
   }
   .modal-tabs button.active{ background:var(--accent); border-color:transparent; color:#fff; }
  
   .swatches{
     display:grid;
     grid-template-columns:repeat(8,1fr);
     gap:4px;
     margin-top:4px;
   }
   .swatch{
     aspect-ratio:1/1;
     border-radius:6px;
     border:1px solid var(--border);
     cursor:pointer;
     transition:transform .1s;
   }
   .swatch:hover{ transform:scale(1.1); }
   .swatch.active{ box-shadow:0 0 0 2px var(--accent);}
  
   .text-item-list{
     display:flex; flex-direction:column; gap:6px;
     max-height:180px; overflow-y:auto;
   }
   .text-item{
     background:var(--panel-3);
     border:1px solid var(--border);
     padding:6px 8px;
     border-radius:8px;
     font-size:12px;
     display:flex; align-items:center; gap:6px;
     cursor:pointer;
     transition:background .1s, border-color .1s;
   }
   .text-item:hover{ background:var(--panel-2); }
   .text-item .txt{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
   .text-item button{
     background:transparent; border:1px solid transparent; color:var(--muted);
     padding:3px 7px; border-radius:5px; font-size:11px;
   }
   .text-item button:hover{ color:var(--text); background:var(--panel-2); border-color:var(--border);}
   .text-item button.del:hover{ color:var(--danger); border-color:var(--danger); }
   .text-item.active{
     border-color:var(--accent);
     background:rgba(77,150,255,.14);
     box-shadow:inset 0 0 0 1px rgba(77,150,255,.35);
   }
   .text-item.active .txt{ color:var(--accent); font-weight:500; }
  
   .hint{
     font-size:11px; color:var(--muted); padding:4px 6px 0; line-height:1.4;
   }
  
   /* Simplified crop/resize strip (mobile) */
   .mb-crop-strip{
     display:none; flex-direction:column; gap:6px;
     width:100%;
   }
   .mb-crop-strip .mcs-actions{
     display:flex; gap:6px;
   }
   .mb-crop-strip .mcs-actions button{
     flex:1; min-height:36px;
     border-radius:8px;
     background:var(--panel-2); border:1px solid var(--border);
     color:var(--text); font-size:13px; font-weight:500;
     display:flex; align-items:center; justify-content:center; gap:6px;
   }
   .mb-crop-strip .mcs-actions button.primary{
     background:var(--accent); border-color:transparent; color:#fff;
   }
   .mb-crop-strip .mcs-actions button.danger{
     color:var(--danger); border-color:rgba(255,107,107,.4);
   }
   .mb-crop-strip .mcs-actions svg{ width:14px; height:14px; }
   .mb-crop-strip .mcs-presets{
     display:flex; gap:5px; overflow-x:auto;
     padding-bottom:2px;
     scrollbar-width:none;
   }
   .mb-crop-strip .mcs-presets::-webkit-scrollbar{ display:none; }
   .mb-crop-strip .mcs-presets button{
     flex-shrink:0;
     padding:6px 12px; min-height:30px;
     border-radius:7px;
     background:var(--panel-3); border:1px solid var(--border);
     color:var(--text); font-size:12px;
   }
   .mb-crop-strip .mcs-presets button.active{
     background:rgba(77,150,255,.2);
     color:var(--accent); border-color:var(--accent);
   }
   .mb-crop-strip .mcs-dims{
     display:flex; gap:5px; align-items:center;
   }
   .mb-crop-strip .mcs-dims input{
     flex:1; min-width:0;
     padding:5px 7px; font-size:12px;
     background:var(--panel-3); border:1px solid var(--border);
     color:var(--text); border-radius:6px; outline:none;
   }
   .mb-crop-strip .mcs-lock{
     padding:5px 10px; min-height:30px;
     border-radius:6px;
     background:var(--panel-3); border:1px solid var(--border);
     color:var(--muted); font-size:11px;
     flex-shrink:0;
   }
   .mb-crop-strip .mcs-lock.active{
     background:rgba(77,150,255,.15);
     color:var(--accent); border-color:var(--accent);
   }
  
   /* ---------- Filter/Effect strength popover ---------- */
   .fx-item{
     position:relative;
     display:flex; align-items:stretch;
     background:var(--panel-2);
     border:1px solid var(--border);
     border-radius:8px;
     /* NB: no overflow:hidden here — the strength popover is absolutely
        positioned and would otherwise be clipped by the item's border box. */
   }
   .fx-item .fx-main{
     flex:1; min-width:0;
     background:transparent;
     border:none;
     color:var(--text);
     padding:8px 6px;
     font-size:12px;
     text-align:center;
     cursor:pointer;
     white-space:nowrap;
     overflow:hidden; text-overflow:ellipsis;
   }
   .fx-item .fx-main:hover{ background:var(--panel-3); }
   .fx-item .fx-more{
     width:22px; flex-shrink:0;
     background:var(--panel-3);
     border:none;
     border-left:1px solid var(--border);
     color:var(--muted);
     display:grid; place-items:center;
     cursor:pointer;
   }
   .fx-item .fx-more:hover{ color:var(--text); background:#5a5a5a; }
   .fx-item .fx-more svg{ width:10px; height:10px; }
   .fx-item.has-strength .fx-more{ color:var(--accent); }
   .fx-pop{
     /* Fixed positioning escapes any scroll-container clip (sidebar .content
        has overflow-y:auto which used to cut this popover off on desktop). */
     position:fixed;
     min-width:220px;
     max-width:min(280px, calc(100vw - 12px));
     background:var(--panel);
     border:1px solid var(--border);
     border-radius:10px;
     padding:10px 12px;
     box-shadow:var(--shadow);
     z-index:9000;
     display:none;
   }
   .fx-pop.open{ display:block; }
   .fx-pop-hint{
     font-size:10px;
     color:var(--muted);
     margin-top:2px;
     text-align:center;
     letter-spacing:.2px;
   }
   .fx-pop label{
     display:flex; justify-content:space-between;
     font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;
     margin-bottom:4px;
   }
   .fx-pop input[type=range]{ width:100%; margin:0; }
   .fx-pop .fx-actions{ display:flex; gap:5px; margin-top:6px; }
   .fx-pop .fx-actions button{
     flex:1; padding:5px 6px; font-size:11px;
     background:var(--panel-2); border:1px solid var(--border); color:var(--text);
     border-radius:6px; cursor:pointer;
   }
   .fx-pop .fx-actions button.primary{ background:var(--accent); border-color:transparent; color:#fff; }
  
   /* ---------- Mobile top bar search ---------- */
   .mtb-search-btn{
     width:34px; height:34px;
     border-radius:8px;
     background:var(--panel-2);
     border:1px solid var(--border);
     color:var(--text);
     display:none;
     place-items:center;
     flex-shrink:0;
   }
   .mtb-search-btn.active{
     background:rgba(77,150,255,.2);
     color:var(--accent); border-color:rgba(77,150,255,.4);
   }
   .mtb-search-btn svg{ width:15px; height:15px; }
   .mtb-search-box{
     display:none;
     flex:1; min-width:0;
     align-items:center; gap:6px;
     background:var(--panel-2);
     border:1px solid var(--border);
     border-radius:8px;
     padding:5px 8px;
     height:32px;
     margin: 0 6px;
   }
   .mtb-search-box.open{ display:flex; }
   .mtb-search-box svg{ width:13px; height:13px; color:var(--muted); flex-shrink:0; }
   .mtb-search-box input{
     flex:1; min-width:0;
     background:transparent; border:none; outline:none;
     color:var(--text); font-size:13px;
   }
   .mtb-search-box .mtb-search-close{
     background:transparent; border:none; color:var(--muted); cursor:pointer;
     padding:2px; display:grid; place-items:center;
   }
   .mtb-search-box .mtb-search-close svg{ width:12px; height:12px; }
  
   @media (max-width: 900px){
     .mtb-search-btn{ display:grid; }
   }
  
   /* ---------- Mobile bottom-pane drag pill ---------- */
   .mb-drag-pill{
     display:none;
   }
   @media (max-width: 900px){
     .mb-drag-pill{
       display:flex;
       align-items:center; justify-content:center;
       position: sticky; top: 0;
       margin: -3px auto 3px;
       width: 100%;
       height: 18px;
       background: var(--panel);
       cursor: ns-resize;
       touch-action: none;
       z-index: 5;
     }
     .mb-drag-pill::before{
       content:'';
       display:block;
       width: 44px; height: 4px;
       border-radius: 3px;
       background: var(--panel-3);
       transition: background .15s;
     }
     .mb-drag-pill:hover::before,
     .mb-drag-pill.dragging::before{
       background: var(--accent);
       height: 5px;
     }
     #mobile-bar{
       max-height: 90vh;
     }
     #mobile-bar .mb-content{
       max-height: none;
       flex: 1 1 auto;
       min-height: 0;
     }
   }

   /* ---------- Context Menu ---------- */
   .ctx-menu{
     position:fixed;
     min-width:180px;
     background:var(--panel-2);
     border:1px solid var(--border);
     border-radius:var(--radius-sm);
     box-shadow:var(--shadow);
     z-index:1000;
     padding:6px;
     display:none;
     user-select:none;
     -webkit-user-select:none;
   }
   .ctx-menu.open{ display:block; }
   .ctx-menu .ctx-item{
     display:flex; align-items:center; gap:10px;
     padding:8px 10px;
     border-radius:6px;
     font-size:13px;
     cursor:pointer;
     color:var(--text);
   }
   .ctx-menu .ctx-item:hover{ background:var(--panel-3); }
   .ctx-menu .ctx-item.danger{ color:var(--danger); }
   .ctx-menu .ctx-item.disabled{ opacity:.4; pointer-events:none; }
   .ctx-menu .ctx-sep{ height:1px; background:var(--border); margin:4px 2px; }
   .ctx-menu .ctx-icon{ width:14px; height:14px; opacity:.9; display:grid; place-items:center; flex-shrink:0;}
   .ctx-menu .ctx-icon svg{ width:14px; height:14px; }
   .ctx-menu .ctx-shortcut{ margin-left:auto; font-size:11px; color:var(--muted); }
   .ctx-submenu-parent{ position:relative; }
   .ctx-submenu-parent::after{
     content:'▸'; margin-left:auto; color:var(--muted); font-size:11px;
   }
   .ctx-submenu{
     position:absolute; left:100%; top:0; margin-left:2px;
     min-width:170px;
     background:var(--panel-2);
     border:1px solid var(--border);
     border-radius:var(--radius-sm);
     box-shadow:var(--shadow);
     padding:6px; display:none;
   }
   .ctx-submenu-parent:hover > .ctx-submenu,
   .ctx-submenu-parent.open > .ctx-submenu{ display:block; }

   /* ---------- Smart Select ---------- */
   .smart-select-hint{
     font-size:12px; color:var(--muted); padding:8px 10px;
     background:var(--panel-2); border:1px dashed var(--border);
     border-radius:var(--radius-sm); margin-bottom:8px;
   }
   .smart-object-list{
     display:flex; flex-direction:column; gap:4px;
   }
   .smart-object-item{
     display:flex; align-items:center; gap:8px;
     padding:8px 10px;
     background:var(--panel-2);
     border:1px solid var(--border);
     border-radius:8px;
     cursor:pointer;
     font-size:13px;
   }
   .smart-object-item:hover{ background:var(--panel-3); }
   .smart-object-item.active{
     background:rgba(77,150,255,0.15);
     border-color:var(--accent);
     color:var(--accent);
   }
   .smart-object-item input[type="checkbox"]{
     accent-color:var(--accent);
     width:14px; height:14px; margin:0;
   }
   .smart-object-item .so-kind{
     font-size:11px; color:var(--muted); text-transform:uppercase;
     letter-spacing:.5px;
   }
   .bulk-actions{
     display:flex; flex-wrap:wrap; gap:6px; margin:8px 0;
   }
   .bulk-actions button{
     flex:1 1 calc(50% - 3px);
     background:var(--panel-2);
     border:1px solid var(--border);
     color:var(--text);
     padding:8px;
     border-radius:8px;
     font-size:12px;
     cursor:pointer;
   }
   .bulk-actions button:hover{ background:var(--panel-3); }
   .bulk-actions button.danger{ color:var(--danger); border-color:rgba(255,107,107,.4);}
   .bulk-actions button.danger:hover{ background:rgba(255,107,107,.15);}

   /* Text effect target selector */
   .fx-target-selector{
     display:flex; gap:4px; padding:3px;
     background:var(--panel-3); border-radius:6px;
     margin-bottom:6px;
   }
   .fx-target-selector button{
     flex:1;
     background:transparent;
     border:none; color:var(--muted);
     padding:5px 8px;
     border-radius:4px;
     font-size:11.5px;
     cursor:pointer;
   }
   .fx-target-selector button.active{
     background:var(--accent); color:#fff;
   }
 </style>
 </head>
 <body>
 <input type="file" id="file-input" accept="image/*" style="display:none" />
  
 <div id="app">
   <!-- SIDEBAR -->
   <aside id="sidebar">
     <div class="brand">
       <h1>Monomage</h1>
     </div>
  
     <div class="file-actions">
       <button data-action="open" title="Open image">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
         Open
       </button>
       <button data-action="blank">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
         Blank
       </button>
       <button data-action="export" class="primary">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
         Export
       </button>
     </div>
  
     <div class="search-wrap">
       <div class="search-box">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
         <input id="sidebar-search" type="text" placeholder="Search tools, filters..." />
       </div>
     </div>
  
     <div class="cat-wrap">
       <div class="cat-switcher" id="desktop-cat-switcher">
         <span class="cat-icon" id="desk-cat-icon"></span>
         <span class="cat-label" id="desk-cat-label">All</span>
         <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
       </div>
       <div class="dropdown" id="desk-dropdown">
         <div class="dropdown-search">
           <input id="desk-dd-search" type="text" placeholder="Search categories..." />
         </div>
         <div class="dropdown-list" id="desk-dd-list"></div>
       </div>
     </div>
  
     <div class="content" id="content"></div>
   </aside>
  
   <!-- MOBILE TOP BAR -->
   <div id="mobile-topbar">
     <div class="mtb-files">
       <button data-action="open" aria-label="Open">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
       </button>
       <button data-action="new" aria-label="New">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
       </button>
     </div>
     <button class="mtb-search-btn" id="mtb-search-btn" aria-label="Search">
       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
     </button>
     <div class="mtb-search-box" id="mtb-search-box">
       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
       <input id="mtb-search-input" type="text" placeholder="Search tools, filters..." />
       <button class="mtb-search-close" id="mtb-search-close" aria-label="Close search">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
       </button>
     </div>
     <div class="mtb-cat" id="mtb-cat">
       <div class="mtb-cat-switcher" id="mtb-cat-switcher">
         <span class="cat-icon" id="mtb-cat-icon"></span>
         <span class="lbl" id="mtb-cat-label">All</span>
         <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
       </div>
       <div class="dropdown" id="mtb-cat-dropdown">
         <div class="dropdown-search"><input id="mtb-cat-dd-search" type="text" placeholder="Search categories..." /></div>
         <div class="dropdown-list" id="mtb-cat-dd-list"></div>
       </div>
     </div>

     const t = document.createElement('canvas');
     t.width = canvas.width; t.height = canvas.height;
     const tctx = t.getContext('2d');
     tctx.drawImage(canvas, 0, 0);
     if(paintLayer && paintLayer.width>0) tctx.drawImage(paintLayer, 0, 0);
     /* Live shapes are re-created on undo/redo from the resurrection
        image data, so include them here so the snapshot is a true
        image of what the user currently sees. */
     if(state.shapes && state.shapes.length){
       state.shapes.forEach(s=> drawShapeItem(tctx, s, false));
     }
     return t.toDataURL('image/png');
   } catch(_e){
     return canvas.toDataURL('image/png');
   }
 }
 /* Called before non-brush operations (filters, transform, crop, resize,
    frame, adjustments) so any un-baked brushstrokes on the paint layer
    AND any live shape objects (state.shapes) get burned into the base
    canvas first. Live text layers are intentionally NOT baked — they
    remain editable across most operations, matching the existing text
    workflow. */
 function commitPaintLayerBeforeMutation(){
   if(paintLayer && paintLayer.width>0){
     ctx.save();
     ctx.globalCompositeOperation='source-over';
     ctx.drawImage(paintLayer, 0, 0);
     ctx.restore();
     pctx.clearRect(0,0,paintLayer.width,paintLayer.height);
   }
   if(state.shapes && state.shapes.length){
     state.shapes.forEach(s=> drawShapeItem(ctx, s, false));
     state.shapes = [];
     state.activeShapeId = null;
   }
 }
 /* Build a full snapshot object capturing:
    - The base canvas dataURL (image + baked strokes/shapes/text)
    - The paint layer dataURL (un-baked brushstrokes)
    - Deep-cloned state.texts, state.shapes and their formatting
    - state.adj, state.filter, state.brush, state.shape config
    So undo/redo restores EVERY action: formatting toggles, deletes,
    duplicates, moves, brush strokes, filters, transforms, everything. */
 function _fullStateSnapshot(){
   try{
     let paintUrl = null;
     if(paintLayer && paintLayer.width>0){
       try{
         const pd = pctx.getImageData(0,0,paintLayer.width,paintLayer.height).data;
         // Only store if there's actual paint content (non-zero alpha).
         for(let i=3;i<pd.length;i+=4){
           if(pd[i]!==0){ paintUrl = paintLayer.toDataURL('image/png'); break; }
         }
       }catch(_e){}
     }
     return {
       canvasUrl : canvas.toDataURL('image/png'),
       paintUrl  : paintUrl,
       texts     : JSON.parse(JSON.stringify(state.texts||[])),
       shapes    : JSON.parse(JSON.stringify(state.shapes||[])),
       adj       : JSON.parse(JSON.stringify(state.adj||{})),
       filter    : state.filter,
       brush     : JSON.parse(JSON.stringify(state.brush||{})),
       shape     : JSON.parse(JSON.stringify(state.shape||{})),
     };
   }catch(_e){ return null; }
 }
 function _applyStateSnapshot(snap, onDone){
   if(!snap) return;
   const im = new Image();
   im.onload = ()=>{
     canvas.width = im.width; canvas.height = im.height;
     overlay.width = im.width; overlay.height = im.height;
     ctx.clearRect(0,0,canvas.width,canvas.height);
     ctx.drawImage(im,0,0);
     syncPaintLayerSize();
     if(pctx) pctx.clearRect(0,0,paintLayer.width,paintLayer.height);
     // Restore paint layer if present
     if(snap.paintUrl && pctx){
       const pi = new Image();
       pi.onload = ()=>{ pctx.drawImage(pi,0,0); afterRestore(); };
       pi.onerror = afterRestore;
       pi.src = snap.paintUrl;
     } else {
       afterRestore();
     }
     function afterRestore(){
       state.img = im;
       state.texts  = JSON.parse(JSON.stringify(snap.texts||[]));
       state.shapes = JSON.parse(JSON.stringify(snap.shapes||[]));
       if(snap.adj)   state.adj   = JSON.parse(JSON.stringify(snap.adj));
       if(snap.filter!==undefined) state.filter = snap.filter;
       if(snap.brush) state.brush = JSON.parse(JSON.stringify(snap.brush));
       if(snap.shape) state.shape = JSON.parse(JSON.stringify(snap.shape));
       state.activeTextId = null;
       state.activeShapeId = null;
       showCanvas(); fitCanvasCss();

   if(!state.img) return;

     const snap = _fullStateSnapshot();

     state.history.push(snap);

     state.redoStack = [];

   const cur = _fullStateSnapshot();

   const prev = state.history.pop();

   if(state.redoStack.length === 0) return;

 function loadDataUrlToCanvas(dataUrl, resetOriginal=false){

     ctx.clearRect(0,0,canvas.width,canvas.height);
     ctx.drawImage(im,0,0);
     syncPaintLayerSize();
     state.img = im;
     if(resetOriginal){
       state.originalDataUrl = dataUrl;
       state.history = []; state.redoStack = [];
       /* A brand-new image starts a brand-new filter session. */
       state.preFilterSnapshot = null;
       state.__preFilterImageData = null;
       state.__lastFilterId = null;
       state.__lastEffectId = null;
       /* Reset live objects on fresh image (they belonged to the old one). */
       state.texts = []; state.shapes = [];
       state.activeTextId = null; state.activeShapeId = null;

 /* Keep the paint layer canvas the same intrinsic pixel size as the base
    canvas, and clear it. Any live brushstrokes on the layer are lost when
    the base canvas is resized — that's fine because a resize (or new file
    load) is a hard reset for the drawing session. */
 function syncPaintLayerSize(){
   if(!paintLayer) return;
   if(paintLayer.width !== canvas.width)   paintLayer.width  = canvas.width;
   if(paintLayer.height !== canvas.height) paintLayer.height = canvas.height;
 }
  
 function showCanvas(){ emptyState.classList.add('hidden'); canvasWrap.classList.remove('hidden'); }
 function fitCanvasCss(){
   /* On mobile, explicitly scale the canvas so portrait images (tall) always fit
      within the visible canvas area, and landscape images fit within the width.
      We keep aspect ratio; we never up-scale beyond 100% of intrinsic pixels. */
   const area = document.getElementById('canvas-area');
   if(area && state.img && window.matchMedia('(max-width: 900px)').matches){
     const style = getComputedStyle(area);
     const padX = (parseFloat(style.paddingLeft)||0) + (parseFloat(style.paddingRight)||0);
     const padY = (parseFloat(style.paddingTop) ||0) + (parseFloat(style.paddingBottom)||0);
     const availW = Math.max(50, area.clientWidth  - padX);
     const availH = Math.max(50, area.clientHeight - padY);
     const iw = canvas.width, ih = canvas.height;
     /* Scale so the whole canvas fits, allowing tiny upscale (up to 1.05x) for
        portraits so they don't look aggressively shrunk. */
     const scale = Math.min(availW / iw, availH / ih, 1.05);
     const cw = Math.max(1, Math.floor(iw * scale));
     const ch = Math.max(1, Math.floor(ih * scale));
     canvas.style.width  = cw + 'px';
     canvas.style.height = ch + 'px';
     if(canvasWrap){
       canvasWrap.style.width  = cw + 'px';
       canvasWrap.style.height = ch + 'px';
     }
   } else if(canvas && state.img){
     /* Desktop: let CSS max-width/height do its thing but clear any inline
        sizes left over from a previous mobile session. */
     canvas.style.width = '';
     canvas.style.height = '';
     if(canvasWrap){ canvasWrap.style.width=''; canvasWrap.style.height=''; }
   }
   overlay.style.width = canvas.clientWidth + 'px';
   overlay.style.height = canvas.clientHeight + 'px';
   overlay.style.position='absolute'; overlay.style.left='0'; overlay.style.top='0';
   if(paintLayer){
     paintLayer.style.width  = canvas.clientWidth  + 'px';
     paintLayer.style.height = canvas.clientHeight + 'px';
     paintLayer.style.position='absolute'; paintLayer.style.left='0'; paintLayer.style.top='0';
     syncPaintLayerSize();
   }
   drawOverlay();
 }

 /* ========================================================================
    ADJUSTMENTS
    ======================================================================== */
 function applyPipeline(){
   if(!state.img) return;
   commitPaintLayerBeforeMutation();
   pushHistory();
   const {blur,sharpen,vignette} = state.adj;
   const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
   applyAdjustments(imgData, state.adj);
   ctx.putImageData(imgData,0,0);
   if(blur>0) doBlur(blur);
   if(sharpen>0) doSharpen(sharpen);
   if(vignette>0) doVignette(vignette);
   /* NOTE: intentionally do NOT reset state.adj here.
      The user asked that after Apply, the slider positions persist wherever
      they left them (they should NOT snap back to 0). The pixel edit has
      been baked into the canvas via pushHistory() above, so the slider
      values are now purely UI state that we keep for the user to tweak
      from. Use the "Reset" button to zero them out explicitly. */
   syncAdjustSliders();
 }
 function applyAdjustments(imgData, opts){
   const d = imgData.data;
   const B=opts.brightness||0, C=opts.contrast||0, S=opts.saturation||0, H=opts.hue||0,
         E=opts.exposure||0, T=opts.temperature||0, N=opts.tint||0, V=opts.vibrance||0, NZ=opts.noise||0;
   const contrastF = (259*(C+255))/(255*(259-C));
   const expF = Math.pow(2, E/50);
   const hueRad = H*Math.PI/180, cosH=Math.cos(hueRad), sinH=Math.sin(hueRad);
   for(let i=0;i<d.length;i+=4){
     let r=d[i], g=d[i+1], b=d[i+2];
     r*=expF; g*=expF; b*=expF;
     r += T*0.5; b -= T*0.5; g += N*0.5;
     r += B*2.55; g += B*2.55; b += B*2.55;
     r = contrastF*(r-128)+128; g = contrastF*(g-128)+128; b = contrastF*(b-128)+128;
     if(S!==0){ const gray=0.299*r+0.587*g+0.114*b, s=1+S/100; r=gray+(r-gray)*s; g=gray+(g-gray)*s; b=gray+(b-gray)*s; }
     if(V!==0){ const max=Math.max(r,g,b),avg=(r+g+b)/3, amt=((Math.abs(max-avg)*2/255)*V)/100; r+=(max-r)*amt; g+=(max-g)*amt; b+=(max-b)*amt; }
     if(H!==0){
       const nr=(0.213+cosH*0.787-sinH*0.213)*r+(0.715-cosH*0.715-sinH*0.715)*g+(0.072-cosH*0.072+sinH*0.928)*b;
       const ng=(0.213-cosH*0.213+sinH*0.143)*r+(0.715+cosH*0.285+sinH*0.140)*g+(0.072-cosH*0.072-sinH*0.283)*b;
       const nb=(0.213-cosH*0.213-sinH*0.787)*r+(0.715-cosH*0.715+sinH*0.715)*g+(0.072+cosH*0.928+sinH*0.072)*b;
       r=nr; g=ng; b=nb;
     }
     if(NZ>0){ const n=(Math.random()-0.5)*NZ*2; r+=n; g+=n; b+=n; }
     d[i]=clamp(r); d[i+1]=clamp(g); d[i+2]=clamp(b);
   }

 function clamp(v){ return v<0?0:(v>255?255:v); }
 function doBlur(amount){

   const tmp = document.createElement('canvas'); tmp.width=canvas.width; tmp.height=canvas.height;
   const tctx = tmp.getContext('2d'); tctx.filter=`blur(${radius}px)`; tctx.drawImage(canvas,0,0);
   ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(tmp,0,0);

 function doSharpen(amount){
   const w=canvas.width,h=canvas.height;
   const src=ctx.getImageData(0,0,w,h), out=ctx.createImageData(w,h);
   const s=src.data,o=out.data,k=amount/25;
   const kernel=[0,-k,0,-k,1+4*k,-k,0,-k,0];
   for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
     for(let c=0;c<3;c++){
       let v=0,idx=(y*w+x)*4+c;
       v+=s[((y-1)*w+x)*4+c]*kernel[1]; v+=s[(y*w+(x-1))*4+c]*kernel[3];
       v+=s[idx]*kernel[4]; v+=s[(y*w+(x+1))*4+c]*kernel[5]; v+=s[((y+1)*w+x)*4+c]*kernel[7];

    FILTERS
    ======================================================================== */
 /* Per-filter strength setting (0.0 - 2.0). 1.0 = normal. */

 function setFxStrength(kind,id,v){ (_fxStrength[kind]=_fxStrength[kind]||{})[id] = Math.max(0, Math.min(10, +v||0)); }
  
 function applyFilterPreset(id, strengthOverride){
   if(!state.img) return;
   if(id==='none'){
     /* "Original" here means: strip filters/effects only — do NOT throw away
        brushstrokes, text or shapes the user has added. We keep a snapshot of
        the canvas as it was BEFORE the first filter/effect in the current
        filter session; clicking Original rolls back to that snapshot, then
        clears the session so the next filter starts a fresh one. If nothing
        has been filtered yet, there is nothing to do. */
     if(state.preFilterSnapshot){
       pushHistory();
       const snap = state.preFilterSnapshot;
       state.preFilterSnapshot = null;
       state.__preFilterImageData = null;
       state.__lastFilterId = null;
       state.__lastEffectId = null;
       loadDataUrlToCanvas(snap, false);
     }
     /* Also reset every filter's strength slider back to 1.0 so the UI matches. */
     _fxStrength.filter = {};
     _fxStrength.effect = {};
     if(typeof renderContent === 'function') renderContent();
     return;
   }
   const strength = (strengthOverride===undefined) ? getFxStrength('filter',id) : strengthOverride;
   /* Take a pre-filter snapshot the first time a filter is applied after the
      last "Original" click (or since the image was loaded). */
   if(!state.preFilterSnapshot){
     try { state.preFilterSnapshot = canvas.toDataURL('image/png'); } catch(_e){}
   }
   commitPaintLayerBeforeMutation();
   pushHistory();
   const w=canvas.width,h=canvas.height;
   /* NON-STACKING: always start from the pre-session pixels so that
      re-applying the same filter (or a different one) does not compound
      on top of the previous application. If the strength slider changes,
      the filter is re-computed from the snapshot at the new intensity. */
   state.__lastFilterId = id;
   state.__lastEffectId = null;
   if(!state.__preFilterImageData){
     try{ state.__preFilterImageData = ctx.getImageData(0,0,w,h); }catch(_e){}
   } else if(state.__preFilterImageData.width===w && state.__preFilterImageData.height===h){
     ctx.putImageData(state.__preFilterImageData, 0, 0);
   }
   /* Snapshot for blending with strength (this is now the pre-session state). */
   const src = ctx.getImageData(0,0,w,h);
   const imgd = ctx.getImageData(0,0,w,h), d=imgd.data;
   const ops=getFilterOps(id);
   applyAdjustments(imgd, ops.adjustments||{});
   if(ops.tone){ const [tr,tg,tb,ta]=ops.tone;
     for(let i=0;i<d.length;i+=4){ d[i]=clamp(d[i]*(1-ta)+tr*ta); d[i+1]=clamp(d[i+1]*(1-ta)+tg*ta); d[i+2]=clamp(d[i+2]*(1-ta)+tb*ta);} }
   if(ops.builtin){
     for(let i=0;i<d.length;i+=4){
       const r=d[i],g=d[i+1],b=d[i+2];
       if(ops.builtin==='grayscale'){ const gr=0.299*r+0.587*g+0.114*b; d[i]=d[i+1]=d[i+2]=gr; }
       else if(ops.builtin==='sepia'){ d[i]=clamp(r*.393+g*.769+b*.189); d[i+1]=clamp(r*.349+g*.686+b*.168); d[i+2]=clamp(r*.272+g*.534+b*.131); }

       o[i+2] = clamp(s[i+2] + (o[i+2] - s[i+2]) * S);
     }
   }
   ctx.putImageData(imgd,0,0);

 /* ========================================================================
    EFFECTS
    ======================================================================== */
 function applyEffect(id, params={}, strengthOverride){
   if(!state.img) return;
   const strength = (strengthOverride===undefined) ? getFxStrength('effect',id) : strengthOverride;
   /* Effects are part of the same "filter session" as filters, so "Original"
      can undo them together. Snapshot once at the start of the session. */
   if(!state.preFilterSnapshot){
     try { state.preFilterSnapshot = canvas.toDataURL('image/png'); } catch(_e){}
   }
   pushHistory();
   const w=canvas.width,h=canvas.height;
   /* NON-STACKING: restore the pre-session pixels first so effects don't
      compound on each other or on any previously applied filter/effect. */
   state.__lastEffectId = id;
   state.__lastFilterId = null;
   if(!state.__preFilterImageData){
     try{ state.__preFilterImageData = ctx.getImageData(0,0,w,h); }catch(_e){}
   } else if(state.__preFilterImageData.width===w && state.__preFilterImageData.height===h){
     ctx.putImageData(state.__preFilterImageData, 0, 0);
   }
   /* Snapshot for strength-based blending (this is now the pre-session state). */

     pixelate:()=>{ const size=params.size||12; const off=document.createElement('canvas');
       off.width=Math.max(1,Math.floor(w/size)); off.height=Math.max(1,Math.floor(h/size));
       const oc=off.getContext('2d'); oc.imageSmoothingEnabled=false; oc.drawImage(canvas,0,0,off.width,off.height);
       ctx.imageSmoothingEnabled=false; ctx.clearRect(0,0,w,h); ctx.drawImage(off,0,0,w,h); ctx.imageSmoothingEnabled=true; },
     oilpaint:()=>{ doBlur(8); const d=ctx.getImageData(0,0,w,h),dd=d.data,lvls=6;
       for(let i=0;i<dd.length;i+=4){ dd[i]=Math.round(dd[i]/255*lvls)*(255/lvls); dd[i+1]=Math.round(dd[i+1]/255*lvls)*(255/lvls); dd[i+2]=Math.round(dd[i+2]/255*lvls)*(255/lvls);} ctx.putImageData(d,0,0); },
     emboss:()=>convolve([-2,-1,0,-1,1,1,0,1,2]),
     edge:()=>convolve([-1,-1,-1,-1,8,-1,-1,-1,-1]),
     threshold:()=>{ const d=ctx.getImageData(0,0,w,h),dd=d.data,t=params.t||128;
       for(let i=0;i<dd.length;i+=4){ const g=0.299*dd[i]+0.587*dd[i+1]+0.114*dd[i+2]; const v=g>t?255:0; dd[i]=dd[i+1]=dd[i+2]=v;} ctx.putImageData(d,0,0); },
     posterize:()=>{ const d=ctx.getImageData(0,0,w,h),dd=d.data,lvls=params.lvls||4;
       for(let i=0;i<dd.length;i+=4){ dd[i]=Math.round(dd[i]/255*lvls)*(255/lvls); dd[i+1]=Math.round(dd[i+1]/255*lvls)*(255/lvls); dd[i+2]=Math.round(dd[i+2]/255*lvls)*(255/lvls);} ctx.putImageData(d,0,0); },
     duotone:()=>{ const c1=hexToRgb(params.c1||'#1a1a5e'),c2=hexToRgb(params.c2||'#ff9f43'); const d=ctx.getImageData(0,0,w,h),dd=d.data;
       for(let i=0;i<dd.length;i+=4){ const g=(0.299*dd[i]+0.587*dd[i+1]+0.114*dd[i+2])/255; dd[i]=c1.r*(1-g)+c2.r*g; dd[i+1]=c1.g*(1-g)+c2.g*g; dd[i+2]=c1.b*(1-g)+c2.b*g;} ctx.putImageData(d,0,0); },
     glitch:()=>{ for(let i=0;i<10;i++){ const y=Math.random()*h|0,hh=4+Math.random()*20|0,dx=(Math.random()-0.5)*40|0; const slice=ctx.getImageData(0,y,w,hh); ctx.putImageData(slice,dx,y);} 
       const src=ctx.getImageData(0,0,w,h),out=ctx.createImageData(w,h),off=4;
       for(let i=0;i<src.data.length;i+=4){ out.data[i]=src.data[i+off*4]||src.data[i]; out.data[i+1]=src.data[i+1]; out.data[i+2]=src.data[i+2-off*4]||src.data[i+2]; out.data[i+3]=255;} ctx.putImageData(out,0,0); },
     scanlines:()=>{ ctx.save(); ctx.globalAlpha=0.25; ctx.fillStyle='#000'; for(let y=0;y<h;y+=3)ctx.fillRect(0,y,w,1); ctx.restore(); },
     crt:()=>{ doBlur(4); ctx.save(); ctx.globalAlpha=0.2; ctx.fillStyle='#000'; for(let y=0;y<h;y+=2)ctx.fillRect(0,y,w,1); ctx.restore(); doVignette(60); },
     halftone:()=>{ const src=ctx.getImageData(0,0,w,h); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.fillStyle='#000'; const step=6;

     mosaic:()=>{ const s=params.size||20; for(let y=0;y<h;y+=s)for(let x=0;x<w;x+=s){ const p=ctx.getImageData(x,y,1,1).data; ctx.fillStyle=`rgb(${p[0]},${p[1]},${p[2]})`; ctx.fillRect(x,y,s,s);} },
     sketch:()=>{ const src=ctx.getImageData(0,0,w,h); const gray=ctx.createImageData(w,h);
       for(let i=0;i<src.data.length;i+=4){ const g=0.299*src.data[i]+0.587*src.data[i+1]+0.114*src.data[i+2]; gray.data[i]=gray.data[i+1]=gray.data[i+2]=g; gray.data[i+3]=255; }

     sharpenfx:()=>doSharpen(60),
     bloom:()=>{ const tmp=document.createElement('canvas'); tmp.width=w; tmp.height=h; const tc=tmp.getContext('2d');
       tc.filter='blur(6px) brightness(1.4)'; tc.drawImage(canvas,0,0);
       ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.5; ctx.drawImage(tmp,0,0); ctx.restore(); },
     chromab:()=>{ const src=ctx.getImageData(0,0,w,h),out=ctx.createImageData(w,h),off=6;
       for(let y=0;y<h;y++)for(let x=0;x<w;x++){ const i=(y*w+x)*4;
         const ri=(y*w+Math.min(w-1,x+off))*4; const bi=(y*w+Math.max(0,x-off))*4;
         out.data[i]=src.data[ri]; out.data[i+1]=src.data[i+1]; out.data[i+2]=src.data[bi+2]; out.data[i+3]=255; }
       ctx.putImageData(out,0,0); },
     solarize:()=>{ const d=ctx.getImageData(0,0,w,h),dd=d.data;
       for(let i=0;i<dd.length;i+=4){ for(let c=0;c<3;c++){ const v=dd[i+c]; dd[i+c]= v<128 ? v : 255-v; } } ctx.putImageData(d,0,0); },
     vhs:()=>{ const src=ctx.getImageData(0,0,w,h),out=ctx.createImageData(w,h),off=3;
       for(let y=0;y<h;y++)for(let x=0;x<w;x++){ const i=(y*w+x)*4; const ri=(y*w+Math.min(w-1,x+off))*4;
         out.data[i]=src.data[ri]; out.data[i+1]=src.data[i+1]; out.data[i+2]=src.data[(y*w+Math.max(0,x-off))*4+2]; out.data[i+3]=255; }
       ctx.putImageData(out,0,0);
       ctx.save(); ctx.globalAlpha=0.12; ctx.fillStyle='#000'; for(let y=0;y<h;y+=3)ctx.fillRect(0,y,w,1); ctx.restore(); },
   }[id];
   if(fn) fn();
   /* Blend effect result with original snapshot using strength (0..2). */
   if(strength !== 1){
     const cur = ctx.getImageData(0,0,w,h), o = cur.data, s = _fxSrc.data, S = strength;
     for(let i=0;i<o.length;i+=4){
       o[i]   = clamp(s[i]   + (o[i]   - s[i]  ) * S);
       o[i+1] = clamp(s[i+1] + (o[i+1] - s[i+1]) * S);
       o[i+2] = clamp(s[i+2] + (o[i+2] - s[i+2]) * S);
     }
     ctx.putImageData(cur,0,0);
   }
 }
  
 /* ========================================================================
    CUSTOM COLOR FILTER (solid + gradient blend, with intensity)
    ======================================================================== */
 function applyCustomColorFilter(opts){
   /* opts: { color?, grad?, intensity(0..1), blend('normal'|'multiply'|'screen'|'overlay'|'softlight'|'color') } */
   if(!state.img) return;
   pushHistory();
   const w=canvas.width, h=canvas.height;
   const intensity = Math.max(0, Math.min(1, opts.intensity ?? 0.5));
  
   /* Build the color layer on a temp canvas (either solid or gradient). */
   const tmp = document.createElement('canvas');
   tmp.width = w; tmp.height = h;
   const tc = tmp.getContext('2d');
   if(opts.grad){
     const g = opts.grad;
     let grad;
     if(g.type === 'radial'){
       grad = tc.createRadialGradient(w/2, h/2, Math.min(w,h)*0.05, w/2, h/2, Math.max(w,h)*0.75);
     } else {
       const ang = ((g.angle||0)-90) * Math.PI/180;
       const cx = w/2, cy = h/2, len = Math.max(w,h);
       grad = tc.createLinearGradient(cx - Math.cos(ang)*len/2, cy - Math.sin(ang)*len/2,
                                      cx + Math.cos(ang)*len/2, cy + Math.sin(ang)*len/2);
     }
     grad.addColorStop(0, g.c1);
     grad.addColorStop(1, g.c2);
     tc.fillStyle = grad;
   } else {
     tc.fillStyle = opts.color || '#4d96ff';
   }
   tc.fillRect(0,0,w,h);
  
   /* Composite the color layer onto the canvas with chosen blend + intensity. */
   const blend = opts.blend || 'overlay';
   ctx.save();
   ctx.globalAlpha = intensity;
   const modeMap = {
     normal:'source-over', multiply:'multiply', screen:'screen',
     overlay:'overlay', softlight:'soft-light', color:'color',
     'soft-light':'soft-light'
   };
   ctx.globalCompositeOperation = modeMap[blend] || 'overlay';
   ctx.drawImage(tmp, 0, 0);
   ctx.restore();
 }
 function convolve(k){
   const w=canvas.width,h=canvas.height;
   const s=ctx.getImageData(0,0,w,h).data, out=ctx.createImageData(w,h), o=out.data;
   for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
     for(let c=0;c<3;c++){ let v=0;
       for(let ky=-1;ky<=1;ky++)for(let kx=-1;kx<=1;kx++){ v+=s[((y+ky)*w+(x+kx))*4+c]*k[(ky+1)*3+(kx+1)]; }
       o[(y*w+x)*4+c]=clamp(v); }
     o[(y*w+x)*4+3]=255;
   }
   ctx.putImageData(out,0,0);

 /* ========================================================================
    TRANSFORM

 function rotate(deg){
   if(!state.img) return; commitPaintLayerBeforeMutation(); pushHistory();
   const rad=deg*Math.PI/180,w=canvas.width,h=canvas.height,abs=Math.abs;
   const nw=Math.round(abs(w*Math.cos(rad))+abs(h*Math.sin(rad))), nh=Math.round(abs(w*Math.sin(rad))+abs(h*Math.cos(rad)));
   const t=document.createElement('canvas'); t.width=nw; t.height=nh; const tc=t.getContext('2d');
   tc.translate(nw/2,nh/2); tc.rotate(rad); tc.drawImage(canvas,-w/2,-h/2);
   canvas.width=nw; canvas.height=nh; overlay.width=nw; overlay.height=nh; ctx.drawImage(t,0,0); fitCanvasCss();

   tc.translate(h?t.width:0,v?t.height:0); tc.scale(h?-1:1,v?-1:1); tc.drawImage(canvas,0,0);

   const t=document.createElement('canvas'); t.width=w; t.height=h; t.getContext('2d').drawImage(canvas,0,0,w,h);
   canvas.width=w; canvas.height=h; overlay.width=w; overlay.height=h; ctx.clearRect(0,0,w,h); ctx.drawImage(t,0,0); fitCanvasCss();

    CROP + INTERACTIVE RESIZE
    ======================================================================== */

   overlay.classList.add('interactive'); drawOverlay();

   const r=state.cropRect, x=Math.round(r.x),y=Math.round(r.y),w=Math.round(r.w),h=Math.round(r.h);
   const t=document.createElement('canvas'); t.width=w; t.height=h; t.getContext('2d').drawImage(canvas,-x,-y);
   canvas.width=w; canvas.height=h; overlay.width=w; overlay.height=h; ctx.drawImage(t,0,0);
   state.cropRect=null; state.activeTool=null; overlay.classList.remove('interactive'); fitCanvasCss();

 function drawOverlay(){
   octx.clearRect(0,0,overlay.width,overlay.height);
   if(state.cropRect){
     const r=state.cropRect;
     octx.save();
     octx.fillStyle='rgba(0,0,0,.55)'; octx.fillRect(0,0,overlay.width,overlay.height);
     octx.clearRect(r.x,r.y,r.w,r.h);
     octx.strokeStyle=getAccent(); octx.lineWidth=2; octx.strokeRect(r.x,r.y,r.w,r.h);
     // rule-of-thirds
     octx.strokeStyle='rgba(255,255,255,0.3)'; octx.lineWidth=1;
     for(let k=1;k<3;k++){ octx.beginPath(); octx.moveTo(r.x+r.w*k/3,r.y); octx.lineTo(r.x+r.w*k/3,r.y+r.h); octx.stroke();

   }

      image but stay editable. The last-selected one is highlighted. */
   if(state.shapes && state.shapes.length){

   }
   state.texts.forEach(t=>{ if(t.id===state.editingTextId) return; drawTextItem(octx, t, t.id===state.activeTextId); });

 /* Bounding box helpers used by Smart Select. */
 function shapeBBox(s){
   const a={x:s.ax!=null?s.ax:s.x, y:s.ay!=null?s.ay:s.y};
   const b={x:s.bx!=null?s.bx:s.x+s.w, y:s.by!=null?s.by:s.y+s.h};
   return {x:Math.min(a.x,b.x), y:Math.min(a.y,b.y),
           w:Math.abs(b.x-a.x), h:Math.abs(b.y-a.y)};
 }
 function textBBox(t){
   octx.save();
   octx.font=`${t.italic?'italic ':''}${t.bold?'700 ':'400 '}${t.size}px ${t.font}`;
   const w=octx.measureText(t.text||'').width, h=t.size;
   octx.restore();
   let bx=t.x-w/2;
   if(t.align==='left') bx=t.x;
   if(t.align==='right') bx=t.x-w;
   return {x:bx, y:t.y-h/2, w:w, h:h};
 }

 function resizeSmartFromDrag(p){
   const s=state.smartStart, h=state.smartHandle;
   const dx=p.x-s.mx, dy=p.y-s.my;
   let x=s.x,y=s.y,w=s.w,hh=s.h;
   if(h==='move'){ x=s.x+dx; y=s.y+dy; }
   if(h && h.includes('l')){ x=s.x+dx; w=s.w-dx; }
   if(h && h.includes('r')){ w=s.w+dx; }
   if(h && h.includes('t')){ y=s.y+dy; hh=s.h-dy; }
   if(h && h.includes('b')){ hh=s.h+dy; }
   // Normalize negative sizes so dragging up/left still yields a valid rect.
   if(w<0){ x+=w; w=Math.abs(w); }
   if(hh<0){ y+=hh; hh=Math.abs(hh); }
   x=Math.max(0,Math.min(canvas.width-2,x));
   y=Math.max(0,Math.min(canvas.height-2,y));
   w=Math.max(2,Math.min(canvas.width-x,w));
   hh=Math.max(2,Math.min(canvas.height-y,hh));
   state.smartRect={x,y,w,h:hh};
 }
 function detectSmartObjects(){
   if(!state.smartRect){ state.smartSelectedIds=[]; return; }
   const r=state.smartRect;
   const ids=[];
   state.smartChecked = state.smartChecked || {};
   (state.shapes||[]).forEach(s=>{ if(rectsIntersect(shapeBBox(s), r)) ids.push({type:'shape', id:s.id}); });
   (state.texts||[]).forEach(t=>{ if(rectsIntersect(textBBox(t), r)) ids.push({type:'text', id:t.id}); });
   state.smartSelectedIds = ids;
   // Auto-check all new detections

   const hs=Math.max(baseHs, Math.round(Math.min(canvas.width,canvas.height)/60));
   let pts={
     tl:[r.x,r.y], t:[r.x+r.w/2,r.y], tr:[r.x+r.w,r.y],
     l:[r.x,r.y+r.h/2], r:[r.x+r.w,r.y+r.h/2],
     bl:[r.x,r.y+r.h], b:[r.x+r.w/2,r.y+r.h], br:[r.x+r.w,r.y+r.h],
   };
   Object.entries(pts).forEach(([k,p])=>{
     if(only && !only.includes(k)) return;
     octx.fillStyle='#ffffff'; octx.fillRect(p[0]-hs/2-2,p[1]-hs/2-2,hs+4,hs+4);
     octx.fillStyle=getAccent(); octx.fillRect(p[0]-hs/2,p[1]-hs/2,hs,hs);

    TEXT
    ======================================================================== */

     id, text:'Your text', x, y, size:Math.max(24,Math.round(canvas.width/20)),
     color:'#ffffff', font:'Heebo, Inter, sans-serif',
     bold:false, italic:false, under:false, vAlign:'normal', align:'center', shadow:true,
     stroke:false, strokeColor:'#000000', strokeWidth:2,

   if(p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h) return 'move';

 function resizeCropFromDrag(p){
   const s=state.cropStart,h=state.cropHandle;
   const dx=p.x-s.mx, dy=p.y-s.my;
   let x=s.x,y=s.y,w=s.w,hh=s.h;
   if(h==='move'){ x=s.x+dx; y=s.y+dy; }
   if(h.includes('l')){ x=s.x+dx; w=s.w-dx; }
   if(h.includes('r')){ w=s.w+dx; }
   if(h.includes('t')){ y=s.y+dy; hh=s.h-dy; }
   if(h.includes('b')){ hh=s.h+dy; }
   x=Math.max(0,Math.min(canvas.width-10,x)); y=Math.max(0,Math.min(canvas.height-10,y));
   w=Math.max(10,Math.min(canvas.width-x,w)); hh=Math.max(10,Math.min(canvas.height-y,hh));
   state.cropRect={x,y,w,h:hh};
 }
 function hitResizeHandle(p){
   const r={x:0,y:0,w:state.resizeRect.w,h:state.resizeRect.h};
   const isTouch=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
   const scale=canvas.width/Math.max(1,canvas.clientWidth);
   const hs=Math.max((isTouch?28:16)*scale,isTouch?30:16);
   const pts={ br:{x:r.w,y:r.h}, r:{x:r.w,y:r.h/2}, b:{x:r.w/2,y:r.h} };
   for(const k in pts){ const q=pts[k]; if(Math.abs(p.x-q.x)<=hs&&Math.abs(p.y-q.y)<=hs) return k; }
   return null;
 }
 function resizeFromDrag(p){
   const s=state.resizeStart, h=state.resizeHandle;
   let w=s.w, hh=s.h;
   if(h.includes('r')) w = Math.max(10, s.w + (p.x-s.mx));
   if(h.includes('b')) hh = Math.max(10, s.h + (p.y-s.my));
   if(h==='br' && state.resizeRect.keepRatio){
     const ratio=state.resizeRect.ratio;
     // use dominant delta
     hh = w/ratio;
   }
   state.resizeRect.w=w; state.resizeRect.h=hh;
 }

 function applyBorder(colorOrGrad,thickness){
   if(!state.img) return; pushHistory();
   const w=canvas.width,h=canvas.height;
   const t=document.createElement('canvas'); t.width=w+thickness*2; t.height=h+thickness*2; const tc=t.getContext('2d');
   // Accept either a css color string or a gradient descriptor { c1, c2, type, angle }.
   let fillStyle;
   if(colorOrGrad && typeof colorOrGrad === 'object' && colorOrGrad.c1){
     const g = colorOrGrad, tw=t.width, th=t.height;
     let gr;
     if((g.type||'linear')==='radial'){
       gr = tc.createRadialGradient(tw/2,th/2,Math.min(tw,th)*0.05,tw/2,th/2,Math.max(tw,th)*0.75);
     } else {
       const ang=(g.angle||0)*Math.PI/180, cx=tw/2, cy=th/2, len=Math.hypot(tw,th)/2;
       gr = tc.createLinearGradient(cx-Math.cos(ang)*len, cy-Math.sin(ang)*len, cx+Math.cos(ang)*len, cy+Math.sin(ang)*len);
     }
     gr.addColorStop(0,g.c1); gr.addColorStop(1,g.c2);
     fillStyle = gr;
   } else {
     fillStyle = colorOrGrad;
   }
   tc.fillStyle = fillStyle; tc.fillRect(0,0,t.width,t.height); tc.drawImage(canvas,thickness,thickness);
   canvas.width=t.width; canvas.height=t.height; overlay.width=t.width; overlay.height=t.height; ctx.drawImage(t,0,0); fitCanvasCss();
 }
 function applyPolaroidFrame(){
   if(!state.img) return; pushHistory();
   const w=canvas.width,h=canvas.height, pad=Math.round(Math.min(w,h)*0.04), bottom=Math.round(pad*3.5);
   const nw=w+pad*2, nh=h+pad+bottom;
   const t=document.createElement('canvas'); t.width=nw; t.height=nh; const tc=t.getContext('2d');
   tc.fillStyle='#fefefe'; tc.fillRect(0,0,nw,nh); tc.drawImage(canvas,pad,pad);
   canvas.width=nw; canvas.height=nh; overlay.width=nw; overlay.height=nh; ctx.drawImage(t,0,0); fitCanvasCss();
 }
 function applyRoundedFrame(radius,color){
   if(!state.img) return; pushHistory();
   const w=canvas.width,h=canvas.height;
   const t=document.createElement('canvas'); t.width=w; t.height=h; const tc=t.getContext('2d');
   if(color && color!=='#00000000'){ tc.fillStyle=color; tc.fillRect(0,0,w,h); }
   tc.save(); roundedRectPath(tc,0,0,w,h,radius); tc.clip(); tc.drawImage(canvas,0,0); tc.restore();
   ctx.clearRect(0,0,w,h); ctx.drawImage(t,0,0);
 }
 function roundedRectPath(t,x,y,w,h,r){
   r=Math.min(r,w/2,h/2);
   t.beginPath(); t.moveTo(x+r,y); t.lineTo(x+w-r,y); t.quadraticCurveTo(x+w,y,x+w,y+r);
   t.lineTo(x+w,y+h-r); t.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
   t.lineTo(x+r,y+h); t.quadraticCurveTo(x,y+h,x,y+h-r);
   t.lineTo(x,y+r); t.quadraticCurveTo(x,y,x+r,y); t.closePath();
 }

 function colorControl(opts){
   // opts: { label, value, onColor, allowGrad(bool), grad(obj|null), onGrad(gradObj|null) }
   const wrap=el(`<div class="field"><label>${opts.label}</label><div class="colorctrl"></div></div>`);
   const cc=wrap.querySelector('.colorctrl');
   const hasGrad = !!opts.grad;
   const bgStyle = hasGrad ? gradientCSS(opts.grad) : (opts.value||'#ffffff');
   const head=el(`<div class="colorctrl-head">
     <div class="swatch-preview" title="Click to pick color" style="background:${bgStyle};flex:1;"></div>
   </div>`);
   cc.appendChild(head);
   const preview=head.querySelector('.swatch-preview');
   preview.addEventListener('click', ()=>{
     openColorModal({
       title: opts.label || 'Pick a Color',
       value: opts.value || '#ffffff',
       grad: opts.grad || null,
       allowGrad: !!opts.allowGrad,
       onApply: (result)=>{
         if(result.type==='solid'){
           if(opts.allowGrad && opts.onGrad) opts.onGrad(null);
           opts.onColor(result.color);
           preview.style.background = result.color;
         } else {
           // gradient
           if(opts.allowGrad && opts.onGrad){
             opts.onGrad(result.grad);
             preview.style.background = gradientCSS(result.grad);
           } else {
             // no gradient allowed: fallback to first stop
             opts.onColor(result.grad.c1);
             preview.style.background = result.grad.c1;
           }
         }
         if(typeof renderContent==='function') renderContent();
       }
     });
   });
   return wrap;
 }
  
 function gradientCSS(g){
   if(!g) return '#ffffff';
   const type = g.type || 'linear';
   if(type==='radial') return `radial-gradient(circle, ${g.c1}, ${g.c2})`;
   return `linear-gradient(${g.angle||0}deg, ${g.c1}, ${g.c2})`;
 }

   if(m) return '#'+m[1];
   return v;
 }

 /* -------------------------------------------------------------------
    Reusable strength-picker item for filters/effects.
    Structure: [ main label button ] [ chevron popover with slider ]
    ------------------------------------------------------------------- */
 function makeFxItem(kind, id, label, onApply){
   const wrap = el(`<div class="fx-item"></div>`);
   const main = el(`<button class="fx-main">${label}</button>`);
   const more = el(`<button class="fx-more" title="Strength"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>`);
   wrap.appendChild(main); wrap.appendChild(more);
  
   const cur = getFxStrength(kind,id);
   if(cur !== 1) wrap.classList.add('has-strength');
  
   main.addEventListener('click', ()=>{ onApply(); });
  
   /* Strength slider: 0 = no filter, 1 = 100% (normal), 10 = 1000% (extreme).
      Step 0.1 gives fine control including decimal values below 1. */
   const pop = el(`
     <div class="fx-pop">
       <label>Strength <span class="fx-pop-val">${cur.toFixed(2)}</span></label>
       <input type="range" class="fx-pop-slider" min="0" max="10" step="0.1" value="${cur}"/>
       <div class="fx-pop-hint">0 = none · 1 = 100% · 10 = 1000%</div>
       <div class="fx-actions">
         <button class="fx-reset">Reset</button>
         <button class="fx-apply primary">Apply</button>
       </div>
     </div>`);
   wrap.appendChild(pop);
  
   const slider = pop.querySelector('.fx-pop-slider');
   const valEl  = pop.querySelector('.fx-pop-val');
   slider.addEventListener('input', e=>{
     const v = parseFloat(e.target.value);
     valEl.textContent = v.toFixed(2);
     setFxStrength(kind,id,v);
     wrap.classList.toggle('has-strength', v !== 1);
   });
   pop.querySelector('.fx-reset').addEventListener('click', ()=>{
     setFxStrength(kind,id,1);
     slider.value = 1; valEl.textContent = '1.00';
     wrap.classList.remove('has-strength');
   });
   pop.querySelector('.fx-apply').addEventListener('click', ()=>{
     closeAllFxPops();
     onApply();
   });
  
   /* Position the popover using fixed coordinates so it is never clipped by a
      scroll container. Anchored under (or above) the More button, aligned to
      the right edge of the fx-item and flipped when it would run off-screen. */
   function positionFxPop(){
     const anchor = wrap.getBoundingClientRect();
     // Move pop off-screen first to measure its natural size without affecting layout.
     pop.style.left = '0px'; pop.style.top = '0px';
     const pr = pop.getBoundingClientRect();
     const vw = window.innerWidth, vh = window.innerHeight, margin = 6;
     let top  = anchor.bottom + 4;
     let left = anchor.right  - pr.width;   // right-align by default
     // Flip up if bottom would overflow
     if(top + pr.height > vh - margin){
       const above = anchor.top - 4 - pr.height;
       if(above >= margin) top = above;
       else top = Math.max(margin, vh - pr.height - margin);
     }
     // Keep inside horizontal viewport
     if(left < margin) left = margin;
     if(left + pr.width > vw - margin) left = Math.max(margin, vw - pr.width - margin);
     pop.style.left = left + 'px';
     pop.style.top  = top  + 'px';
   }
   more.addEventListener('click', (e)=>{
     e.stopPropagation();
     const open = pop.classList.contains('open');
     closeAllFxPops();
     if(!open){
       pop.classList.add('open');
       // Re-measure/position after the browser lays out the now-visible pop.
       requestAnimationFrame(positionFxPop);
     }
   });
   /* Keep positioning fresh on resize/scroll while open. */
   const _reposition = ()=>{ if(pop.classList.contains('open')) positionFxPop(); };
   window.addEventListener('resize', _reposition);
   window.addEventListener('scroll', _reposition, true);
   /* prevent slider input from bubbling to document-click close handler */
   pop.addEventListener('click', e=>e.stopPropagation());
  
   return wrap;
 }
