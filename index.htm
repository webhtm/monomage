  ctx.fillStyle = ctx.strokeStyle;
  switch(br.type){
    case 'round': ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); break;
    case 'marker': ctx.globalAlpha*=0.35; ctx.lineWidth=br.size*1.4; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); break;
    case 'spray': { const dots=Math.max(3,Math.round(br.size));
      for(let i=0;i<dots;i++){ const r=Math.random()*br.size,ang=Math.random()*Math.PI*2; ctx.globalAlpha=(br.opacity/100)*Math.random(); ctx.beginPath(); ctx.arc(b.x+Math.cos(ang)*r,b.y+Math.sin(ang)*r,1,0,Math.PI*2); ctx.fill(); } break; }
    case 'calligraphy': { const angle=Math.atan2(b.y-a.y,b.x-a.x); ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(angle+Math.PI/4); ctx.fillRect(-br.size,-br.size/6,br.size*2,br.size/3); ctx.restore(); break; }
    case 'pixel': { const s=Math.max(2,Math.round(br.size/2)); ctx.fillRect(Math.round(b.x/s)*s,Math.round(b.y/s)*s,s,s); break; }
    case 'rainbow': { const t=(Date.now()/20)%360; ctx.strokeStyle=`hsl(${t},80%,60%)`; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); break; }
    default: ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  ctx.restore();
}

/* ========================================================================
   SHAPES (with fill / stroke / gradient)
   ======================================================================== */
const SHAPE_TOOLS=['rect','circ','line','arrow','triangle','pentagon','hexagon','star','diamond'];
function isShapeTool(t){ return SHAPE_TOOLS.includes(t); }
function drawShapePreview(a,b){
  state.__lastShapePt=b;
  octx.clearRect(0,0,overlay.width,overlay.height); drawOverlay();
  applyShapeStyle(octx,a,b,true);
  drawShapePath(octx,state.activeTool,a,b);
  strokeFillShape(octx,true);
  octx.restore();
}
function finalizeShape(a,b){
  applyShapeStyle(ctx,a,b,false);
  drawShapePath(ctx,state.activeTool,a,b);
  strokeFillShape(ctx,false);
  ctx.restore();
}
function makeGradient(t,grad,a,b){
  const x1=Math.min(a.x,b.x), y1=Math.min(a.y,b.y), x2=Math.max(a.x,b.x), y2=Math.max(a.y,b.y);
  const cx=(x1+x2)/2, cy=(y1+y2)/2;
  const rx=Math.max(1,(x2-x1)/2), ry=Math.max(1,(y2-y1)/2);
  let g;
  if((grad.type||'linear')==='radial'){
    g = t.createRadialGradient(cx, cy, Math.max(1,Math.min(rx,ry)*0.05), cx, cy, Math.max(rx,ry));
  } else {
    const ang=(grad.angle||0)*Math.PI/180;
    const len=Math.max(rx,ry);
    g = t.createLinearGradient(cx-Math.cos(ang)*len, cy-Math.sin(ang)*len, cx+Math.cos(ang)*len, cy+Math.sin(ang)*len);
  }
  g.addColorStop(0,grad.c1); g.addColorStop(1,grad.c2);
  return g;
}
function applyShapeStyle(t,a,b,preview){
  const s=state.shape;
  t.save();
  t.lineWidth=s.strokeWidth; t.lineJoin='round';
  t.__fill = s.fillOn ? (s.fillGrad ? makeGradient(t,s.fillGrad,a,b) : s.fill) : null;
  t.__stroke = s.strokeOn ? (s.strokeGrad ? makeGradient(t,s.strokeGrad,a,b) : s.stroke) : null;
  if(preview){ t.setLineDash([6,4]); }
}
function strokeFillShape(t,preview){
  const s=state.shape;
  if(t.__fill && !preview){ t.fillStyle=t.__fill; t.fill(); }
  else if(t.__fill && preview){ t.fillStyle=t.__fill; t.globalAlpha=0.4; t.fill(); t.globalAlpha=1; }
  if(t.__stroke){ t.strokeStyle=t.__stroke; t.stroke(); }
  else if(!t.__fill){ t.strokeStyle=getAccent(); t.stroke(); }
}
function drawShapePath(t,kind,a,b){
  const x=Math.min(a.x,b.x), y=Math.min(a.y,b.y), w=Math.abs(b.x-a.x), h=Math.abs(b.y-a.y);
  const cx=x+w/2, cy=y+h/2;
  t.beginPath();
  if(kind==='rect'){ t.rect(x,y,w,h); }
  else if(kind==='circ'){ t.ellipse(cx,cy,w/2,h/2,0,0,Math.PI*2); }
  else if(kind==='line'){ t.moveTo(a.x,a.y); t.lineTo(b.x,b.y); }
  else if(kind==='arrow'){
    t.moveTo(a.x,a.y); t.lineTo(b.x,b.y);
    const ang=Math.atan2(b.y-a.y,b.x-a.x), len=Math.max(10,state.shape.strokeWidth*3);
    t.moveTo(b.x,b.y); t.lineTo(b.x-len*Math.cos(ang-Math.PI/6), b.y-len*Math.sin(ang-Math.PI/6));
    t.moveTo(b.x,b.y); t.lineTo(b.x-len*Math.cos(ang+Math.PI/6), b.y-len*Math.sin(ang+Math.PI/6));
  }
  else if(kind==='triangle'){ t.moveTo(cx,y); t.lineTo(x+w,y+h); t.lineTo(x,y+h); t.closePath(); }
  else if(kind==='diamond'){ t.moveTo(cx,y); t.lineTo(x+w,cy); t.lineTo(cx,y+h); t.lineTo(x,cy); t.closePath(); }
  else if(kind==='pentagon'){ polygonPath(t,cx,cy,w/2,h/2,5,-Math.PI/2); }
  else if(kind==='hexagon'){ polygonPath(t,cx,cy,w/2,h/2,6,-Math.PI/2); }
  else if(kind==='star'){ starPath(t,cx,cy,w/2,h/2,state.shape.starPoints||5,-Math.PI/2); }
}
function polygonPath(t,cx,cy,rx,ry,sides,rot){
  for(let i=0;i<sides;i++){ const ang=rot+i*2*Math.PI/sides; const px=cx+Math.cos(ang)*rx, py=cy+Math.sin(ang)*ry; i===0?t.moveTo(px,py):t.lineTo(px,py); }
  t.closePath();
}
function starPath(t,cx,cy,rx,ry,points,rot){
  const step=Math.PI/points;
  for(let i=0;i<points*2;i++){ const r=i%2===0?1:0.45; const ang=rot+i*step; const px=cx+Math.cos(ang)*rx*r, py=cy+Math.sin(ang)*ry*r; i===0?t.moveTo(px,py):t.lineTo(px,py); }
  t.closePath();
}
function rgbToHex(r,g,b){ return '#'+[r,g,b].map(n=>n.toString(16).padStart(2,'0')).join(''); }

/* ---- Hit tests ---- */
function hitTestText(p){
  const isTouch=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
  const scale=canvas.width/Math.max(1,canvas.clientWidth);
  const pad=(isTouch?24:10)*scale;
  for(let i=state.texts.length-1;i>=0;i--){
    const t=state.texts[i];
    octx.save(); octx.font=`${t.italic?'italic ':''}${t.bold?'700 ':'400 '}${t.size}px ${t.font}`;
    const w=octx.measureText(t.text).width, h=t.size; octx.restore();
    let bx=t.x-w/2; if(t.align==='left') bx=t.x; if(t.align==='right') bx=t.x-w;
    if(p.x>=bx-pad&&p.x<=bx+w+pad&&p.y>=t.y-h/2-pad&&p.y<=t.y+h/2+pad) return t;
  }
  return null;
}
function hitCropHandle(p,r){
  const isTouch=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
  const scale=canvas.width/Math.max(1,canvas.clientWidth);
  const hs=Math.max((isTouch?28:16)*scale, isTouch?30:16);
  const pts={ tl:{x:r.x,y:r.y}, tr:{x:r.x+r.w,y:r.y}, bl:{x:r.x,y:r.y+r.h}, br:{x:r.x+r.w,y:r.y+r.h},
    t:{x:r.x+r.w/2,y:r.y}, b:{x:r.x+r.w/2,y:r.y+r.h}, l:{x:r.x,y:r.y+r.h/2}, r:{x:r.x+r.w,y:r.y+r.h/2} };
  for(const k in pts){ const q=pts[k]; if(Math.abs(p.x-q.x)<=hs&&Math.abs(p.y-q.y)<=hs) return k; }
  if(p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h) return 'move';
  return null;
}
function resizeCropFromDrag(p){
  const s=state.cropStart,h=state.cropHandle;
  const dx=p.x-s.mx, dy=p.y-s.my;
  let x=s.x,y=s.y,w=s.w,hh=s.h;
  if(h==='move'){ x=s.x+dx; y=s.y+dy; }
  if(h.includes('l')){ x=s.x+dx; w=s.w-dx; }
  if(h.includes('r')){ w=s.w+dx; }
  if(h.includes('t')){ y=s.y+dy; hh=s.h-dy; }
  if(h.includes('b')){ hh=s.h+dy; }
  x=Math.max(0,Math.min(canvas.width-10,x)); y=Math.max(0,Math.min(canvas.height-10,y));
  w=Math.max(10,Math.min(canvas.width-x,w)); hh=Math.max(10,Math.min(canvas.height-y,hh));
  state.cropRect={x,y,w,h:hh};
}
function hitResizeHandle(p){
  const r={x:0,y:0,w:state.resizeRect.w,h:state.resizeRect.h};
  const isTouch=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
  const scale=canvas.width/Math.max(1,canvas.clientWidth);
  const hs=Math.max((isTouch?28:16)*scale,isTouch?30:16);
  const pts={ br:{x:r.w,y:r.h}, r:{x:r.w,y:r.h/2}, b:{x:r.w/2,y:r.h} };
  for(const k in pts){ const q=pts[k]; if(Math.abs(p.x-q.x)<=hs&&Math.abs(p.y-q.y)<=hs) return k; }
  return null;
}
function resizeFromDrag(p){
  const s=state.resizeStart, h=state.resizeHandle;
  let w=s.w, hh=s.h;
  if(h.includes('r')) w = Math.max(10, s.w + (p.x-s.mx));
  if(h.includes('b')) hh = Math.max(10, s.h + (p.y-s.my));
  if(h==='br' && state.resizeRect.keepRatio){
    const ratio=state.resizeRect.ratio;
    // use dominant delta
    hh = w/ratio;
  }
  state.resizeRect.w=w; state.resizeRect.h=hh;
}

function applyBorder(colorOrGrad,thickness){
  if(!state.img) return; pushHistory();
  const w=canvas.width,h=canvas.height;
  const t=document.createElement('canvas'); t.width=w+thickness*2; t.height=h+thickness*2; const tc=t.getContext('2d');
  // Accept either a css color string or a gradient descriptor { c1, c2, type, angle }.
  let fillStyle;
  if(colorOrGrad && typeof colorOrGrad === 'object' && colorOrGrad.c1){
    const g = colorOrGrad, tw=t.width, th=t.height;
    let gr;
    if((g.type||'linear')==='radial'){
      gr = tc.createRadialGradient(tw/2,th/2,Math.min(tw,th)*0.05,tw/2,th/2,Math.max(tw,th)*0.75);
    } else {
      const ang=(g.angle||0)*Math.PI/180, cx=tw/2, cy=th/2, len=Math.hypot(tw,th)/2;
      gr = tc.createLinearGradient(cx-Math.cos(ang)*len, cy-Math.sin(ang)*len, cx+Math.cos(ang)*len, cy+Math.sin(ang)*len);
    }
    gr.addColorStop(0,g.c1); gr.addColorStop(1,g.c2);
    fillStyle = gr;
  } else {
    fillStyle = colorOrGrad;
  }
  tc.fillStyle = fillStyle; tc.fillRect(0,0,t.width,t.height); tc.drawImage(canvas,thickness,thickness);
  canvas.width=t.width; canvas.height=t.height; overlay.width=t.width; overlay.height=t.height; ctx.drawImage(t,0,0); fitCanvasCss();
}
function applyPolaroidFrame(){
  if(!state.img) return; pushHistory();
  const w=canvas.width,h=canvas.height, pad=Math.round(Math.min(w,h)*0.04), bottom=Math.round(pad*3.5);
  const nw=w+pad*2, nh=h+pad+bottom;
  const t=document.createElement('canvas'); t.width=nw; t.height=nh; const tc=t.getContext('2d');
  tc.fillStyle='#fefefe'; tc.fillRect(0,0,nw,nh); tc.drawImage(canvas,pad,pad);
  canvas.width=nw; canvas.height=nh; overlay.width=nw; overlay.height=nh; ctx.drawImage(t,0,0); fitCanvasCss();
}
function applyRoundedFrame(radius,color){
  if(!state.img) return; pushHistory();
  const w=canvas.width,h=canvas.height;
  const t=document.createElement('canvas'); t.width=w; t.height=h; const tc=t.getContext('2d');
  if(color && color!=='#00000000'){ tc.fillStyle=color; tc.fillRect(0,0,w,h); }
  tc.save(); roundedRectPath(tc,0,0,w,h,radius); tc.clip(); tc.drawImage(canvas,0,0); tc.restore();
  ctx.clearRect(0,0,w,h); ctx.drawImage(t,0,0);
}
function roundedRectPath(t,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  t.beginPath(); t.moveTo(x+r,y); t.lineTo(x+w-r,y); t.quadraticCurveTo(x+w,y,x+w,y+r);
  t.lineTo(x+w,y+h-r); t.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  t.lineTo(x+r,y+h); t.quadraticCurveTo(x,y+h,x,y+h-r);
  t.lineTo(x,y+r); t.quadraticCurveTo(x,y,x+r,y); t.closePath();
}

function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstElementChild; }
function sectionShell(id,title,bodyEl){

  s.appendChild(bodyEl); return s;

function makeToolBtn(label,icon,fn){
  const b=el(`<button class="tool-btn centered">${ICONS[icon]||''}<span>${label}</span></button>`);
  b.addEventListener('click',fn); return b;
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

/* Reusable color control - opens the color-picker modal. */
function colorControl(opts){
  // opts: { label, value, onColor, allowGrad(bool), grad(obj|null), onGrad(gradObj|null) }
  const wrap=el(`<div class="field"><label>${opts.label}</label><div class="colorctrl"></div></div>`);
  const cc=wrap.querySelector('.colorctrl');
  const hasGrad = !!opts.grad;
  const bgStyle = hasGrad ? gradientCSS(opts.grad) : (opts.value||'#ffffff');
  const head=el(`<div class="colorctrl-head">
    <div class="swatch-preview" title="Click to pick color" style="background:${bgStyle};flex:1;"></div>
  </div>`);
  cc.appendChild(head);
  const preview=head.querySelector('.swatch-preview');
  preview.addEventListener('click', ()=>{
    openColorModal({
      title: opts.label || 'Pick a Color',
      value: opts.value || '#ffffff',
      grad: opts.grad || null,
      allowGrad: !!opts.allowGrad,
      onApply: (result)=>{
        if(result.type==='solid'){
          if(opts.allowGrad && opts.onGrad) opts.onGrad(null);
          opts.onColor(result.color);
          preview.style.background = result.color;
        } else {
          // gradient
          if(opts.allowGrad && opts.onGrad){
            opts.onGrad(result.grad);
            preview.style.background = gradientCSS(result.grad);
          } else {
            // no gradient allowed: fallback to first stop
            opts.onColor(result.grad.c1);
            preview.style.background = result.grad.c1;
          }
        }
        if(typeof renderContent==='function') renderContent();
      }
    });
  });
  return wrap;
}

function gradientCSS(g){
  if(!g) return '#ffffff';
  const type = g.type || 'linear';
  if(type==='radial') return `radial-gradient(circle, ${g.c1}, ${g.c2})`;
  return `linear-gradient(${g.angle||0}deg, ${g.c1}, ${g.c2})`;
}

/* ========================================================================
   COLOR PICKER MODAL
   ======================================================================== */
const GRAD_PRESETS = [
  {c1:'#4d96ff', c2:'#8b7dff', type:'linear', angle:135},
  {c1:'#ff4b6e', c2:'#ff9f43', type:'linear', angle:135},
  {c1:'#1dd1a1', c2:'#48dbfb', type:'linear', angle:135},
  {c1:'#feca57', c2:'#ff6b6b', type:'linear', angle:135},
  {c1:'#5f27cd', c2:'#ff4b6e', type:'linear', angle:135},
  {c1:'#000000', c2:'#333333', type:'linear', angle:180},
  {c1:'#ffffff', c2:'#cccccc', type:'radial', angle:0},
  {c1:'#ff9f43', c2:'#feca57', type:'radial', angle:0},
];

const _colorModal = {
  el: null, cb: null, allowGrad: true,
  mode: 'solid',                   // 'solid' | 'gradient'
  solid: '#4d96ff',
  grad: {c1:'#4d96ff', c2:'#8b7dff', type:'linear', angle:135},
};

function openColorModal(opts){
  const m = document.getElementById('color-modal'); _colorModal.el = m; _colorModal.cb = opts.onApply;
  _colorModal.allowGrad = opts.allowGrad !== false;
  document.getElementById('cm-title').textContent = opts.title || 'Pick a Color';

  // Hide gradient tab if not allowed
  const tabs = document.getElementById('cm-tabs');
  tabs.querySelector('[data-cmtab="gradient"]').style.display = _colorModal.allowGrad ? '' : 'none';

  // Init state from opts
  if(opts.grad){
    _colorModal.mode = 'gradient';
    _colorModal.grad = { c1:opts.grad.c1||'#4d96ff', c2:opts.grad.c2||'#8b7dff',
                          type: opts.grad.type || 'linear', angle: opts.grad.angle||0 };
    _colorModal.solid = opts.value || '#4d96ff';
  } else {
    _colorModal.mode = 'solid';
    _colorModal.solid = opts.value || '#ffffff';
    _colorModal.grad = { c1:opts.value||'#4d96ff', c2:'#8b7dff', type:'linear', angle:135 };
  }
  syncColorModalUI();
  m.classList.add('open');
}

function syncColorModalUI(){
  const modeSolid = _colorModal.mode === 'solid';
  document.querySelectorAll('#cm-tabs [data-cmtab]').forEach(b=>b.classList.toggle('active', b.dataset.cmtab===_colorModal.mode));
  document.getElementById('cm-solid-panel').style.display = modeSolid ? '' : 'none';
  document.getElementById('cm-grad-panel').style.display  = modeSolid ? 'none' : '';

  // Solid
  document.getElementById('cm-solid-color').value = normalizeHex(_colorModal.solid);
  document.getElementById('cm-solid-hex').value = _colorModal.solid;

  // Gradient
  document.querySelectorAll('#cm-grad-panel [data-gtype]').forEach(b=>b.classList.toggle('active', b.dataset.gtype===_colorModal.grad.type));
  document.getElementById('cm-grad-c1').value = normalizeHex(_colorModal.grad.c1);
  document.getElementById('cm-grad-c2').value = normalizeHex(_colorModal.grad.c2);
  document.getElementById('cm-grad-angle').value = _colorModal.grad.angle||0;
  document.getElementById('cm-grad-angle-val').textContent = (_colorModal.grad.angle||0)+'°';
  document.getElementById('cm-grad-angle-wrap').style.display = _colorModal.grad.type==='linear' ? '' : 'none';
  document.getElementById('cm-grad-preview').style.background = gradientCSS(_colorModal.grad);

  // Presets (solid)
  const solidPresets = document.getElementById('cm-presets');
  if(!solidPresets.dataset.built){
    SWATCHES.forEach(c=>{
      const s=el(`<div class="swatch" style="background:${c}" data-c="${c}"></div>`);
      s.addEventListener('click',()=>{ _colorModal.solid=c; syncColorModalUI(); });
      solidPresets.appendChild(s);
    });
    solidPresets.dataset.built='1';
  }
  solidPresets.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active', s.dataset.c === _colorModal.solid));

  // Presets (gradient)
  const gp = document.getElementById('cm-grad-presets');
  if(!gp.dataset.built){
    GRAD_PRESETS.forEach((g,i)=>{
      const s=el(`<div class="swatch" style="background:${gradientCSS(g)};aspect-ratio:2/1;" data-gi="${i}"></div>`);
      s.addEventListener('click',()=>{ _colorModal.grad = {...g}; syncColorModalUI(); });
      gp.appendChild(s);
    });
    gp.dataset.built='1';
  }
}

function normalizeHex(v){
  if(!v) return '#000000';
  if(v==='transparent') return '#000000';
  // native color input requires #rrggbb (no alpha)
  const m = /^#([0-9a-f]{6})([0-9a-f]{2})?$/i.exec(v);
  if(m) return '#'+m[1];
  return v;
}

(function bindColorModal(){
  const m = document.getElementById('color-modal');
  // Tabs
  m.querySelectorAll('#cm-tabs [data-cmtab]').forEach(b=>{
    b.addEventListener('click', ()=>{ _colorModal.mode = b.dataset.cmtab; syncColorModalUI(); });
  });
  // Solid inputs
  document.getElementById('cm-solid-color').addEventListener('input', e=>{
    _colorModal.solid = e.target.value;
    document.getElementById('cm-solid-hex').value = e.target.value;
    document.querySelectorAll('#cm-presets .swatch').forEach(s=>s.classList.remove('active'));
  });
  document.getElementById('cm-solid-hex').addEventListener('input', e=>{
    const v = e.target.value.trim();
    if(/^#?[0-9a-f]{6}([0-9a-f]{2})?$/i.test(v)){
      const hex = v.startsWith('#')?v:'#'+v;
      _colorModal.solid = hex;
      document.getElementById('cm-solid-color').value = normalizeHex(hex);
    }
  });
  // Gradient inputs
  m.querySelectorAll('#cm-grad-panel [data-gtype]').forEach(b=>{
    b.addEventListener('click', ()=>{ _colorModal.grad.type = b.dataset.gtype; syncColorModalUI(); });
  });
  document.getElementById('cm-grad-c1').addEventListener('input', e=>{ _colorModal.grad.c1=e.target.value; document.getElementById('cm-grad-preview').style.background = gradientCSS(_colorModal.grad); });
  document.getElementById('cm-grad-c2').addEventListener('input', e=>{ _colorModal.grad.c2=e.target.value; document.getElementById('cm-grad-preview').style.background = gradientCSS(_colorModal.grad); });
  document.getElementById('cm-grad-angle').addEventListener('input', e=>{
    _colorModal.grad.angle = parseInt(e.target.value)||0;
    document.getElementById('cm-grad-angle-val').textContent = _colorModal.grad.angle+'°';
    document.getElementById('cm-grad-preview').style.background = gradientCSS(_colorModal.grad);
  });
  // Buttons
  m.addEventListener('click', e=>{
    const a = e.target.dataset.cm;
    if(a==='cancel' || e.target===m){ m.classList.remove('open'); return; }
    if(a==='save'){
      m.classList.remove('open');
      if(!_colorModal.cb) return;
      if(_colorModal.mode==='solid'){
        _colorModal.cb({ type:'solid', color: _colorModal.solid });
      } else {
        _colorModal.cb({ type:'gradient', grad: {...(_colorModal.grad)} });
      }
    }
  });
})();

function sectionsFor(catId){
  // When cropping or resizing, show ONLY the crop section (regardless of active category)
  if(state.activeTool==='crop-tool' || state.activeTool==='resize-tool'){
    return [secCrop()];
  }
  const S=[];
  const A = catId==='all';
  if(A||catId==='transform') S.push(secTransform());
  if(A||catId==='crop')      S.push(secCrop());
  if(A||catId==='adjust')    S.push(secAdjust());
  if(A||catId==='color')     S.push(secColor());
  if(A||catId==='filters')   S.push(secFilters());
  if(A||catId==='effects')   S.push(secEffects());
  if(A||catId==='brush')     S.push(secBrush());
  if(A||catId==='shape')     S.push(secShape());
  if(A||catId==='text')      S.push(secText());
  if(A||catId==='frame')     S.push(secFrame());
  return S;
}

function secTransform(){
  const b=el(`<div class="grid"></div>`);
  [
    {l:'Rotate Left',ic:'undo',fn:()=>rotate(-90)},
    {l:'Rotate Right',ic:'redo',fn:()=>rotate(90)},
    {l:'Rotate 180',ic:'transform',fn:()=>rotate(180)},
    {l:'Flip Horizontal',ic:'transform',fn:()=>{ pushHistory(); flip(true,false); }},
    {l:'Flip Vertical',ic:'transform',fn:()=>{ pushHistory(); flip(false,true); }},
    {l:'Reset',ic:'reset',fn:()=>{ if(state.originalDataUrl){ pushHistory(); loadDataUrlToCanvas(state.originalDataUrl,false);} }},
    {l:'Undo',ic:'undo',fn:undo},{l:'Redo',ic:'redo',fn:redo},
  ].forEach(it=>{ const btn=el(`<button class="tool-btn">${ICONS[it.ic]||''}<span>${it.l}</span></button>`); btn.addEventListener('click',it.fn); b.appendChild(btn); });
  return sectionShell('sec-transform','Transform',b);
}

function secCrop(){
  const wrap=document.createElement('div');
  const cropping = state.activeTool==='crop-tool';
  const resizingMode = state.activeTool==='resize-tool';

  if(cropping){
    // Only crop options shown while cropping
    const bar=el(`<div class="grid grid-3"></div>`);
    bar.appendChild(makeToolBtn('Save','check', ()=>commitCrop()));
    bar.appendChild(makeToolBtn('Revert','reset', ()=>cancelCrop()));
    bar.appendChild(makeToolBtn('Exit','crop', ()=>cancelCrop()));
    wrap.appendChild(bar);
    wrap.appendChild(el(`<div class="section-title" style="margin-top:8px;"><span>Aspect Ratio</span><span class="sec-line"></span></div>`));
    const grid=el(`<div class="grid grid-3"></div>`);
    [['Free',null],['1:1',1],['4:3',4/3],['3:2',3/2],['16:9',16/9],['9:16',9/16],['3:4',3/4],['2:3',2/3],['21:9',21/9]].forEach(([lbl,ratio])=>{
      const b=el(`<button class="tool-btn centered">${lbl}</button>`);
      b.addEventListener('click',()=>{
        if(!state.cropRect) startCrop();
        if(ratio){ let w=canvas.width*0.7, h=w/ratio; if(h>canvas.height*0.9){ h=canvas.height*0.9; w=h*ratio; }
          state.cropRect={x:(canvas.width-w)/2,y:(canvas.height-h)/2,w,h}; drawOverlay(); }
      });
      grid.appendChild(b);
    });
    wrap.appendChild(grid);
    wrap.appendChild(el(`<div class="hint">Drag the handles to adjust. Tap Save to apply or Revert to exit.</div>`));
    return sectionShell('sec-crop','Cropping',wrap);
  }

  if(resizingMode){
    const bar=el(`<div class="grid grid-3"></div>`);
    bar.appendChild(makeToolBtn('Save','check', ()=>commitResize()));
    bar.appendChild(makeToolBtn('Revert','reset', ()=>cancelResize()));
    bar.appendChild(makeToolBtn('Exit','resize', ()=>cancelResize()));
    wrap.appendChild(bar);
    const dims=el(`<div class="field" style="margin-top:8px;">
      <label>Dimensions <span class="val">px</span></label>
      <div class="row"><input type="number" id="rzr-w" value="${Math.round(state.resizeRect.w)}"/><input type="number" id="rzr-h" value="${Math.round(state.resizeRect.h)}"/></div>
    </div>`);
    wrap.appendChild(dims);
    const [wI,hI]=dims.querySelectorAll('input');
    wI.addEventListener('input',()=>{ let v=parseInt(wI.value)||1; state.resizeRect.w=v; if(state.resizeRect.keepRatio){ state.resizeRect.h=Math.round(v/state.resizeRect.ratio); hI.value=state.resizeRect.h; } drawOverlay(); });
    hI.addEventListener('input',()=>{ let v=parseInt(hI.value)||1; state.resizeRect.h=v; if(state.resizeRect.keepRatio){ state.resizeRect.w=Math.round(v*state.resizeRect.ratio); wI.value=state.resizeRect.w; } drawOverlay(); });
    const ratioBtn=el(`<button class="tool-btn centered ${state.resizeRect.keepRatio?'active':''}">Lock Aspect Ratio</button>`);
    ratioBtn.addEventListener('click',()=>{ state.resizeRect.keepRatio=!state.resizeRect.keepRatio; state.resizeRect.ratio=state.resizeRect.w/state.resizeRect.h; renderContent(); });
    wrap.appendChild(ratioBtn);
    wrap.appendChild(el(`<div class="hint">Drag the corner/edge handles on the canvas to resize.</div>`));
    return sectionShell('sec-crop','Resizing',wrap);
  }

  // default: start crop + start resize + numeric resize
  const bar=el(`<div class="grid grid-2-mobile"></div>`);
  bar.appendChild(makeToolBtn('Start Crop','crop', ()=>startCrop()));
  bar.appendChild(makeToolBtn('Drag Resize','resize', ()=>startInteractiveResize()));
  wrap.appendChild(bar);

  const rz=el(`<div class="field" style="margin-top:10px;">
     <label>Resize by Pixels</label>
     <div class="row"><input type="number" id="rz-w" placeholder="Width"/><input type="number" id="rz-h" placeholder="Height"/></div>
     <button class="tool-btn centered" id="rz-apply" style="margin-top:6px;">Apply Resize</button>
  </div>`);
  wrap.appendChild(rz);
  rz.querySelector('#rz-apply').addEventListener('click',()=>{ resizeCanvas(parseInt(rz.querySelector('#rz-w').value), parseInt(rz.querySelector('#rz-h').value)); });
  return sectionShell('sec-crop','Crop & Resize',wrap);
}

function secAdjust(){

    {k:'vibrance',l:'Vibrance',min:-100,max:100},{k:'hue',l:'Hue',min:-180,max:180},
    {k:'temperature',l:'Temperature',min:-100,max:100},{k:'tint',l:'Tint',min:-100,max:100},
    {k:'sharpen',l:'Sharpen',min:0,max:100},{k:'blur',l:'Blur',min:0,max:100},
    {k:'noise',l:'Noise',min:0,max:100},{k:'vignette',l:'Vignette',min:0,max:100},
  ];
  spec.forEach(s=>{
    const f=el(`<div class="field"><label>${s.l} <span class="val" data-val="${s.k}">${state.adj[s.k]}</span></label><input type="range" min="${s.min}" max="${s.max}" value="${state.adj[s.k]}" data-adj="${s.k}"/></div>`);
    f.querySelector('input').addEventListener('input',e=>{ state.adj[s.k]=parseFloat(e.target.value); f.querySelector('[data-val]').textContent=e.target.value; });
    wrap.appendChild(f);
  });
  const row=el(`<div class="grid" style="margin-top:8px;"></div>`);
  const applyB=el(`<button class="tool-btn centered">${ICONS.check}<span>Apply</span></button>`); applyB.addEventListener('click',applyPipeline);
  const resetB=el(`<button class="tool-btn centered">${ICONS.reset}<span>Reset</span></button>`);
  resetB.addEventListener('click',()=>{ state.adj={brightness:0,contrast:0,saturation:0,hue:0,exposure:0,temperature:0,tint:0,vibrance:0,sharpen:0,blur:0,noise:0,vignette:0}; syncAdjustSliders(); });
  row.appendChild(applyB); row.appendChild(resetB); wrap.appendChild(row);
  return sectionShell('sec-adjust','Adjustments',wrap);
}
function syncAdjustSliders(){
  document.querySelectorAll('[data-adj]').forEach(inp=>{ const k=inp.dataset.adj; inp.value=state.adj[k]; const disp=inp.parentElement.querySelector('[data-val]'); if(disp) disp.textContent=state.adj[k]; });
}

function secColor(){
  const wrap=document.createElement('div');
  const previewBg = state.brush.grad ? gradientCSS(state.brush.grad) : state.brush.color;
  // Preview swatch of current color / gradient
  const cur=el(`<div class="field"><label>Current Color</label>
    <div class="colorctrl-head"><div class="swatch-preview" id="sec-color-preview" style="background:${previewBg};flex:1;"></div></div>
  </div>`);
  const openPicker = ()=>{
    openColorModal({
      title:'Brush / Fill Color', value:state.brush.color, grad:state.brush.grad, allowGrad:true,
      onApply:(r)=>{
        if(r.type==='solid'){ state.brush.color=r.color; state.brush.grad=null; }
        else               { state.brush.grad=r.grad; }
        renderContent();
      }
    });
  };
  cur.querySelector('#sec-color-preview').addEventListener('click', openPicker);
  wrap.appendChild(cur);

  // "Set color" button (opens modal)
  const setBtn=el(`<button class="tool-btn centered" style="margin-bottom:8px;">${ICONS.color}<span>Set color / gradient</span></button>`);
  setBtn.addEventListener('click', openPicker);
  wrap.appendChild(setBtn);

  const sw=el(`<div class="field"><label>Swatches</label><div class="swatches"></div></div>`);
  const swg=sw.querySelector('.swatches');
  SWATCHES.forEach(c=>{ const s=el(`<div class="swatch" style="background:${c}" data-c="${c}"></div>`); if(c===state.brush.color && !state.brush.grad)s.classList.add('active');
    s.addEventListener('click',()=>{ state.brush.color=c; state.brush.grad=null; renderContent(); }); swg.appendChild(s); });
  wrap.appendChild(sw);

  // Gradient preset row (one click to pick a gradient without opening the modal)
  const gsw=el(`<div class="field"><label>Gradient Presets</label><div class="swatches" style="grid-template-columns:repeat(4,1fr);"></div></div>`);
  const gswg=gsw.querySelector('.swatches');
  GRAD_PRESETS.forEach((g,i)=>{ const s=el(`<div class="swatch" style="background:${gradientCSS(g)};aspect-ratio:2/1;" data-gi="${i}"></div>`);
    s.addEventListener('click',()=>{ state.brush.grad={...g}; renderContent(); }); gswg.appendChild(s); });
  wrap.appendChild(gsw);

  const fillBtn=el(`<button class="tool-btn centered" style="margin-top:6px;">${ICONS.color}<span>Fill Canvas</span></button>`);
  fillBtn.addEventListener('click',()=>{
    if(!state.img) return; pushHistory();
    ctx.save(); ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
    if(state.brush.grad){
      // Fill canvas with the current gradient (linear or radial), spanning the whole canvas.
      const w=canvas.width, h=canvas.height, g=state.brush.grad;
      let gr;
      if((g.type||'linear')==='radial'){
        gr = ctx.createRadialGradient(w/2,h/2,Math.min(w,h)*0.05,w/2,h/2,Math.max(w,h)*0.75);
      } else {
        const ang=(g.angle||0)*Math.PI/180, cx=w/2, cy=h/2, len=Math.hypot(w,h)/2;
        gr = ctx.createLinearGradient(cx-Math.cos(ang)*len, cy-Math.sin(ang)*len, cx+Math.cos(ang)*len, cy+Math.sin(ang)*len);
      }
      gr.addColorStop(0,g.c1); gr.addColorStop(1,g.c2);
      ctx.fillStyle = gr;
    } else {
      ctx.fillStyle = state.brush.color;
    }
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.restore();
  });
  wrap.appendChild(fillBtn);
  return sectionShell('sec-color','Color',wrap);
}

/* -------------------------------------------------------------------
   Reusable strength-picker item for filters/effects.
   Structure: [ main label button ] [ chevron popover with slider ]
   ------------------------------------------------------------------- */
function makeFxItem(kind, id, label, onApply){
  const wrap = el(`<div class="fx-item"></div>`);
  const main = el(`<button class="fx-main">${label}</button>`);
  const more = el(`<button class="fx-more" title="Strength"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button>`);
  wrap.appendChild(main); wrap.appendChild(more);

  const cur = getFxStrength(kind,id);
  if(cur !== 1) wrap.classList.add('has-strength');

  main.addEventListener('click', ()=>{ onApply(); });

  /* Strength slider: 0 = no filter, 1 = 100% (normal), 10 = 1000% (extreme).
     Step 0.1 gives fine control including decimal values below 1. */
  const pop = el(`
    <div class="fx-pop">
      <label>Strength <span class="fx-pop-val">${cur.toFixed(2)}</span></label>
      <input type="range" class="fx-pop-slider" min="0" max="10" step="0.1" value="${cur}"/>
      <div class="fx-pop-hint">0 = none · 1 = 100% · 10 = 1000%</div>
      <div class="fx-actions">
        <button class="fx-reset">Reset</button>
        <button class="fx-apply primary">Apply</button>
      </div>
    </div>`);
  wrap.appendChild(pop);

  const slider = pop.querySelector('.fx-pop-slider');
  const valEl  = pop.querySelector('.fx-pop-val');
  slider.addEventListener('input', e=>{
    const v = parseFloat(e.target.value);
    valEl.textContent = v.toFixed(2);
    setFxStrength(kind,id,v);
    wrap.classList.toggle('has-strength', v !== 1);
  });
  pop.querySelector('.fx-reset').addEventListener('click', ()=>{
    setFxStrength(kind,id,1);
    slider.value = 1; valEl.textContent = '1.00';
    wrap.classList.remove('has-strength');
  });
  pop.querySelector('.fx-apply').addEventListener('click', ()=>{
    closeAllFxPops();
    onApply();
  });

  /* Position the popover using fixed coordinates so it is never clipped by a
     scroll container. Anchored under (or above) the More button, aligned to
     the right edge of the fx-item and flipped when it would run off-screen. */
  function positionFxPop(){
    const anchor = wrap.getBoundingClientRect();
    // Move pop off-screen first to measure its natural size without affecting layout.
    pop.style.left = '0px'; pop.style.top = '0px';
    const pr = pop.getBoundingClientRect();
    const vw = window.innerWidth, vh = window.innerHeight, margin = 6;
    let top  = anchor.bottom + 4;
    let left = anchor.right  - pr.width;   // right-align by default
    // Flip up if bottom would overflow
    if(top + pr.height > vh - margin){
      const above = anchor.top - 4 - pr.height;
      if(above >= margin) top = above;
      else top = Math.max(margin, vh - pr.height - margin);
    }
    // Keep inside horizontal viewport
    if(left < margin) left = margin;
    if(left + pr.width > vw - margin) left = Math.max(margin, vw - pr.width - margin);
    pop.style.left = left + 'px';
    pop.style.top  = top  + 'px';
  }
  more.addEventListener('click', (e)=>{
    e.stopPropagation();
    const open = pop.classList.contains('open');
    closeAllFxPops();
    if(!open){
      pop.classList.add('open');
      // Re-measure/position after the browser lays out the now-visible pop.
      requestAnimationFrame(positionFxPop);
    }
  });
  /* Keep positioning fresh on resize/scroll while open. */
  const _reposition = ()=>{ if(pop.classList.contains('open')) positionFxPop(); };
  window.addEventListener('resize', _reposition);
  window.addEventListener('scroll', _reposition, true);
  /* prevent slider input from bubbling to document-click close handler */
  pop.addEventListener('click', e=>e.stopPropagation());

  return wrap;
}
function closeAllFxPops(){ document.querySelectorAll('.fx-pop.open').forEach(p=>p.classList.remove('open')); }
document.addEventListener('click', ()=>closeAllFxPops());

function secCustomColorFilter(){
  /* Local state for the color + gradient + intensity + blend controls */
  const localState = {
    color: '#4d96ff',
    grad: null, /* {c1,c2,type,angle} */
    intensity: 0.5,
    blend: 'overlay',
  };

  const wrap = document.createElement('div');

  /* Color / gradient chooser — reuses the existing color modal (supports gradients). */
  const colorField = colorControl({
    label:'Filter Color',
    value: localState.color,
    allowGrad: true,
    grad: localState.grad,
    onColor: v => { localState.color = v; localState.grad = null; },
    onGrad:  g => { localState.grad = g; },
  });
  wrap.appendChild(colorField);

  /* Intensity slider (0-100%) */
  const intField = el(`
    <div class="field">
      <label>Intensity <span class="val ccf-int-val">${Math.round(localState.intensity*100)}%</span></label>
      <input type="range" class="ccf-int" min="0" max="100" value="${Math.round(localState.intensity*100)}"/>
    </div>`);
  intField.querySelector('.ccf-int').addEventListener('input', e=>{
    localState.intensity = parseInt(e.target.value)/100;
    intField.querySelector('.ccf-int-val').textContent = e.target.value + '%';
  });
  wrap.appendChild(intField);

  /* Blend mode selector */
  const blendField = el(`
    <div class="field">
      <label>Blend Mode</label>
      <select class="ccf-blend">
        <option value="overlay">Overlay</option>
        <option value="multiply">Multiply</option>
        <option value="screen">Screen</option>
        <option value="soft-light">Soft Light</option>
        <option value="color">Color (hue+sat)</option>
        <option value="normal">Normal</option>
      </select>
    </div>`);
  blendField.querySelector('.ccf-blend').value = localState.blend;
  blendField.querySelector('.ccf-blend').addEventListener('change', e=>{ localState.blend = e.target.value; });
  wrap.appendChild(blendField);

  /* Apply */
  const applyBtn = el(`<button class="tool-btn centered" style="margin-top:4px;">${ICONS.check}<span>Apply Color Filter</span></button>`);
  applyBtn.addEventListener('click', ()=>{
    applyCustomColorFilter({
      color: localState.color,
      grad:  localState.grad,
      intensity: localState.intensity,
      blend: localState.blend,
    });
  });
  wrap.appendChild(applyBtn);
  wrap.appendChild(el(`<div class="hint">Pick any solid color or gradient, choose a blend mode, and adjust the intensity for a tinted color-filter look.</div>`));
  return wrap;
}

function secBrush(){
  const wrap=document.createElement('div');
  const g=el(`<div class="grid grid-3"></div>`);
  BRUSHES.forEach(br=>{ const b=el(`<button class="tool-btn centered">${ICONS[br.icon]||ICONS.brush}<span>${br.label}</span></button>`); if(state.brush.type===br.id)b.classList.add('active');
    b.addEventListener('click',()=>{ state.brush.type=br.id; state.activeTool=(br.id==='eraser')?'eraser':'brush'; renderContent(); renderRail(); }); g.appendChild(b); });
  wrap.appendChild(g);
  const size=el(`<div class="field" style="margin-top:10px;"><label>Size <span class="val">${state.brush.size}px</span></label><input type="range" min="1" max="200" value="${state.brush.size}" data-brush="size"/></div>`);
  const op=el(`<div class="field"><label>Opacity <span class="val">${state.brush.opacity}%</span></label><input type="range" min="1" max="100" value="${state.brush.opacity}" data-brush="opacity"/></div>`);
  wrap.appendChild(size); wrap.appendChild(op);

  // Eraser-only controls when the eraser is the active brush.
  const isEraser = state.activeTool==='eraser' || state.brush.type==='eraser';
  if(isEraser){
    const modeField = el(`<div class="field"><label>Erase Everything <button class="grad-toggle ${state.eraser.eraseAll?'active':''}" id="eraser-all" style="width:auto;padding:2px 8px;">${state.eraser.eraseAll?'ON':'OFF'}</button></label></div>`);
    modeField.querySelector('#eraser-all').addEventListener('click',()=>{ state.eraser.eraseAll = !state.eraser.eraseAll; renderContent(); });
    wrap.appendChild(modeField);
    wrap.appendChild(el(`<div class="hint">Off (default): eraser removes only brushstrokes, keeping the image and baked shapes/text intact. On: cuts through every layer (image, brushstrokes, baked shapes/text) to transparency.</div>`));
  } else {
    // Colour + gradient control for actual brushes
    wrap.appendChild(colorControl({
      label:'Color', value:state.brush.color, allowGrad:true, grad:state.brush.grad,
      onColor:v=>{ state.brush.color=v; state.brush.grad=null; },
      onGrad :g=>{ state.brush.grad=g; }
    }));
  }
  wrap.querySelectorAll('[data-brush]').forEach(inp=>{ inp.addEventListener('input',e=>{ const k=inp.dataset.brush; const v=parseFloat(e.target.value); state.brush[k]=v; const valEl=inp.parentElement.querySelector('.val'); if(valEl){ if(k==='size')valEl.textContent=v+'px'; else if(k==='opacity')valEl.textContent=v+'%'; else valEl.textContent=v; } }); });
  return sectionShell('sec-brush','Brush & Paint',wrap);
}

  [

    b.addEventListener('click',()=>{ state.activeTool=id; renderContent(); renderRail(); }); g.appendChild(b); });

  wrap.appendChild(fillField);
  fillField.querySelector('#fill-on').addEventListener('click',()=>{ state.shape.fillOn=!state.shape.fillOn; renderContent(); });
  if(state.shape.fillOn){
    wrap.appendChild(colorControl({ label:'Fill Color', value:state.shape.fill, allowGrad:true, grad:state.shape.fillGrad,
      onColor:v=>{ state.shape.fill=v; }, onGrad:g=>{ state.shape.fillGrad=g; } }));
  }

  // Stroke toggle
  const strokeField=el(`<div class="field"><label>Border <button class="grad-toggle ${state.shape.strokeOn?'active':''}" id="stroke-on" style="width:auto;padding:2px 8px;">${state.shape.strokeOn?'ON':'OFF'}</button></label></div>`);
  wrap.appendChild(strokeField);

function categoryMeta(id){ return CATEGORIES.find(c=>c.id===id)||CATEGORIES[0]; }
function setCategory(id){
  state.activeCategory=id;
  if(id==='brush'){ if(state.activeTool!=='eraser'&&state.activeTool!=='picker')state.activeTool='brush'; }
  else if(id==='crop'){}
  else if(id!=='shape'&&id!=='text'){ if(state.activeTool!=='crop-tool'&&state.activeTool!=='resize-tool')state.activeTool=null; }
  updateCatSwitcherLabels(); renderContent(); renderRail();
}
function updateCatSwitcherLabels(){
  const m=categoryMeta(state.activeCategory); const iconHtml=ICONS[m.icon]||ICONS.all;
  const dLbl=document.getElementById('desk-cat-label'),dIco=document.getElementById('desk-cat-icon');
  const mLbl=document.getElementById('mb-cat-label'),mIco=document.getElementById('mb-cat-icon');
  const tLbl=document.getElementById('mtb-cat-label'),tIco=document.getElementById('mtb-cat-icon');
  if(dLbl){ dLbl.textContent=m.label; dIco.innerHTML=iconHtml; }
  if(mLbl){ mLbl.textContent=m.label; mIco.innerHTML=iconHtml; }
  if(tLbl){ tLbl.textContent=m.label; tIco.innerHTML=iconHtml; }
}
function buildDropdown(listEl,searchInput,source){
  // source: 'desktop' | 'mobile' | 'mtb' | (legacy bool: true=mobile, false=desktop)
  if(source===true) source='mobile'; else if(source===false) source='desktop';
  const q=(searchInput.value||'').toLowerCase().trim(); listEl.innerHTML='';
  visibleCategories().filter(c=>c.label.toLowerCase().includes(q)).forEach(c=>{
    const it=el(`<div class="dropdown-item ${state.activeCategory===c.id?'active':''}"><span class="di-icon">${ICONS[c.icon]||''}</span><span>${c.label}</span></div>`);
    it.addEventListener('click',()=>{
      setCategory(c.id);
      if(source==='mobile') closeMobileDropdown();
      else if(source==='mtb') closeMtbCatDropdown();
      else closeDeskDropdown();
    });
    listEl.appendChild(it);
  });
}

function closeDeskDropdown(){
  deskDropdown.classList.remove('open'); deskSwitch.classList.remove('open'); deskDDSearch.value='';
  // Clear inline fixed-position styles so the next open re-measures cleanly.
  deskDropdown.style.position=''; deskDropdown.style.top=''; deskDropdown.style.left='';
  deskDropdown.style.right=''; deskDropdown.style.width=''; deskDropdown.style.maxHeight='';
  deskDDList.style.maxHeight='';
}
/* Position the desktop category dropdown using fixed coordinates so it is
   never clipped by sidebar overflow, and always sizes to the viewport. */
function positionDeskDropdown(){
  const a = deskSwitch.getBoundingClientRect();
  const vh = window.innerHeight, margin = 8;
  const belowSpace = vh - a.bottom - margin;
  const aboveSpace = a.top - margin;
  const useBelow = belowSpace >= 180 || belowSpace >= aboveSpace;
  const maxH = Math.max(180, Math.min(480, useBelow ? belowSpace : aboveSpace));
  deskDropdown.style.position = 'fixed';
  deskDropdown.style.left  = a.left  + 'px';
  deskDropdown.style.width = a.width + 'px';
  deskDropdown.style.right = 'auto';
  if(useBelow){
    deskDropdown.style.top    = (a.bottom + 4) + 'px';
    deskDropdown.style.bottom = 'auto';
  } else {
    deskDropdown.style.top    = 'auto';
    deskDropdown.style.bottom = (vh - a.top + 4) + 'px';
  }
  deskDropdown.style.maxHeight = maxH + 'px';
  // Give the inner scroll-list the remaining height after the search box.
  const searchEl = deskDropdown.querySelector('.dropdown-search');
  const searchH = searchEl ? searchEl.getBoundingClientRect().height : 0;
  deskDDList.style.maxHeight = Math.max(120, maxH - searchH - 4) + 'px';
}
deskDDSearch.addEventListener('input',()=>buildDropdown(deskDDList,deskDDSearch,false));

window.addEventListener('resize',()=>{ if(deskDropdown.classList.contains('open')) positionDeskDropdown(); });

function filterSections(q){
  q=(q||'').toLowerCase().trim();
  document.querySelectorAll('#content .section').forEach(sec=>{
    let matchAny=false;
    sec.querySelectorAll('.tool-btn,.field').forEach(x=>{ const txt=x.textContent.toLowerCase(); const show=!q||txt.includes(q); x.style.display=show?'':'none'; if(show)matchAny=true; });
    const title=sec.querySelector('.section-title span:first-child').textContent.toLowerCase();
    if(!q||title.includes(q))matchAny=true;
    sec.style.display=matchAny?'':'none';
  });
}

function positionMobileDropdown(){
  if(!isMobileViewport())return;
  const anchor=mbSwitch.getBoundingClientRect(), vh=window.innerHeight, margin=8;
  const spaceAbove=anchor.top-margin, spaceBelow=vh-anchor.bottom-margin, useAbove=spaceAbove>=spaceBelow;
  const row=mbSwitch.closest('.mb-cat-row'), rowRect=row?row.getBoundingClientRect():anchor;
  mbDropdown.style.left=Math.max(8,rowRect.left+4)+'px'; mbDropdown.style.right=Math.max(8,window.innerWidth-rowRect.right+4)+'px';
  if(useAbove){ mbDropdown.style.bottom=(vh-anchor.top+margin)+'px'; mbDropdown.style.top='auto'; mbDropdown.style.maxHeight=Math.max(160,spaceAbove)+'px'; }
  else { mbDropdown.style.top=(anchor.bottom+margin)+'px'; mbDropdown.style.bottom='auto'; mbDropdown.style.maxHeight=Math.max(160,spaceBelow)+'px'; }
  mbDDList.style.maxHeight=Math.max(120,(parseInt(mbDropdown.style.maxHeight,10)||300)-60)+'px';
}

function positionMtbDropdown(anchorEl, dropdownEl, align){
  if(!isMobileViewport()) return;
  const r = anchorEl.getBoundingClientRect(); const margin=6; const vh=window.innerHeight;
  const bottomSafe = 10; // keep away from bottom edge
  const available = Math.max(160, vh - r.bottom - margin - bottomSafe);
  dropdownEl.style.top = (r.bottom + margin) + 'px';
  dropdownEl.style.bottom = 'auto';
  dropdownEl.style.maxHeight = available + 'px';
  // Also cap the inner scroll list so it never overflows the dropdown container
  const listEl = dropdownEl.querySelector('.dropdown-list');
  const searchEl = dropdownEl.querySelector('.dropdown-search');
  if(listEl){
    const searchH = searchEl ? searchEl.getBoundingClientRect().height : 0;
    listEl.style.maxHeight = Math.max(120, available - searchH - 4) + 'px';
  }
  if(align && align.right){
    dropdownEl.style.right = Math.max(6, window.innerWidth - r.right) + 'px';
    dropdownEl.style.left = 'auto';
  } else if(align && align.left){
    dropdownEl.style.left = Math.max(6, r.left) + 'px';
    dropdownEl.style.right = 'auto';
  }
}

    {id:'circ',label:'Ellipse',icon:'shape',onclick:()=>{state.activeTool='circ';drawOverlay();renderRail();}},
    {id:'triangle',label:'Triangle',icon:'triangle',onclick:()=>{state.activeTool='triangle';drawOverlay();renderRail();}},
    {id:'hexagon',label:'Hexagon',icon:'hexagon',onclick:()=>{state.activeTool='hexagon';drawOverlay();renderRail();}},
    {id:'star',label:'Star',icon:'star',onclick:()=>{state.activeTool='star';drawOverlay();renderRail();}},
    {id:'line',label:'Line',icon:'draw',onclick:()=>{state.activeTool='line';drawOverlay();renderRail();}},
    {id:'arrow',label:'Arrow',icon:'move',onclick:()=>{state.activeTool='arrow';drawOverlay();renderRail();}},
  ];
  const textTools=[
    {id:'text-add',label:'Add Text',icon:'text',onclick:()=>{ addText(); state.activeTool='text-move'; drawOverlay(); renderRail(); }},
    {id:'text-move',label:'Move Text',icon:'move',onclick:()=>{ state.activeTool='text-move'; drawOverlay(); renderRail(); }},
  ];
  const cropTools=[
    {id:'crop-tool',label:'Crop',icon:'crop',onclick:()=>{ if(state.activeTool==='crop-tool')cancelCrop(); else startCrop(); }},
    {id:'resize-tool',label:'Resize',icon:'resize',onclick:()=>{ if(state.activeTool==='resize-tool')cancelResize(); else startInteractiveResize(); }},
  ];
  let specific=[];
  if(cat==='brush')specific=brushTools;
  else if(cat==='shape')specific=shapeTools;
  else if(cat==='text')specific=textTools;
  else if(cat==='crop')specific=cropTools;
  else if(cat==='all')specific=[...brushTools,{id:'__d1',divider:true},...shapeTools,{id:'__d2',divider:true},...textTools,{id:'__d3',divider:true},...cropTools];
  return {specific,universal};
}

function renderRail(){
  const rail=document.getElementById('tools-rail'); rail.innerHTML='';
  const {specific,universal}=toolsForCategory(state.activeCategory);
  specific.forEach(t=>{
    if(t.divider){ const div=document.createElement('div'); div.className='rail-divider'; rail.appendChild(div); return; }
    const b=document.createElement('button'); b.className='rail-btn'+(state.activeTool===t.id?' active':''); b.innerHTML=ICONS[t.icon]||ICONS.all; b.dataset.tooltip=t.label; b.addEventListener('click',t.onclick); rail.appendChild(b);
  });
  if(specific.length>0){ const div=document.createElement('div'); div.className='rail-divider'; rail.appendChild(div); }
  universal.forEach(t=>{ const b=document.createElement('button'); b.className='rail-btn'; b.innerHTML=ICONS[t.icon]||ICONS.all; b.dataset.tooltip=t.label; b.addEventListener('click',t.fn); rail.appendChild(b); });

  // Mobile top-bar tools dropdown (opens on demand)
  const mtbList=document.getElementById('mtb-tools-list');
  if(mtbList){
    mtbList.innerHTML='';
    const buildItem=(t,isUniv)=>{
      const it=el(`<div class="dropdown-item ${state.activeTool===t.id?'active':''}"><span class="di-icon">${ICONS[t.icon]||''}</span><span>${t.label}</span></div>`);
      it.addEventListener('click',()=>{ (isUniv?t.fn:t.onclick)(); closeMtbToolsDropdown(); });
      return it;
    };
    specific.forEach(t=>{
      if(t.divider){ const d=el('<div class="dropdown-item divider"></div>'); mtbList.appendChild(d); return; }
      mtbList.appendChild(buildItem(t,false));
    });
    if(specific.length>0){ const d=el('<div class="dropdown-item divider"></div>'); mtbList.appendChild(d); }
    universal.forEach(t=>mtbList.appendChild(buildItem(t,true)));
  }

  const needsOverlayInteractive=!!state.cropRect||!!state.resizeRect||state.activeTool==='text-move'||state.activeTool==='text-add';
  overlay.classList.toggle('interactive',needsOverlayInteractive);
}

/* Mobile bar height var */
function updateMobileBarHeightVar(){
  const bar=document.getElementById('mobile-bar'); if(!bar)return;
  if(isMobileViewport()){
    const mb=document.getElementById('mb-content');
    const hasContent=mb&&mb.children.length>0;
    bar.classList.toggle('compact',!hasContent);
    /* If the user manually resized the bar via the drag pill, honour it. */
    const manual = bar.style.height ? parseFloat(bar.style.height) : 0;
    const h = (manual > 0) ? manual : (bar.getBoundingClientRect().height || 150);
    document.documentElement.style.setProperty('--mb-height',h+'px');
    const tb=document.getElementById('mobile-topbar');
    if(tb) document.documentElement.style.setProperty('--topbar-height',(tb.getBoundingClientRect().height||46)+'px');
  } else {
    document.documentElement.style.removeProperty('--mb-height'); bar.classList.remove('compact');
    /* Clear any leftover manual sizing when switching to desktop. */
    bar.style.maxHeight=''; bar.style.height='';
  }
  if(typeof fitCanvasCss==='function')fitCanvasCss();
}
if('ResizeObserver' in window){ const ro=new ResizeObserver(updateMobileBarHeightVar); const bar=document.getElementById('mobile-bar'); if(bar)ro.observe(bar); }
window.addEventListener('orientationchange',()=>setTimeout(updateMobileBarHeightVar,120));
setTimeout(updateMobileBarHeightVar,0);

/* ========================================================================
   RENDER CONTENT
   ======================================================================== */
function renderContent(){
  const desk=document.getElementById('content');
  const mb=document.getElementById('mb-content');
  const mbBar=document.getElementById('mobile-bar');
  desk.innerHTML=''; sectionsFor(state.activeCategory).forEach(sec=>desk.appendChild(sec));
  mb.innerHTML=''; sectionsFor(state.activeCategory).forEach(sec=>mb.appendChild(sec));

  // Mobile: simplified crop/resize strip
  const cropping = state.activeTool==='crop-tool' && !!state.cropRect;
  const resizing = state.activeTool==='resize-tool' && !!state.resizeRect;
  if(mbBar){
    if(cropping || resizing){ mbBar.classList.add('crop-mode'); renderCropStrip(cropping?'crop':'resize'); }
    else { mbBar.classList.remove('crop-mode'); const s=document.getElementById('mb-crop-strip'); if(s) s.style.display='none'; }
  }

  updateCatSwitcherLabels(); drawOverlay();
  if(typeof updateMobileBarHeightVar==='function')updateMobileBarHeightVar();
}

function renderCropStrip(mode){
  const strip=document.getElementById('mb-crop-strip'); if(!strip) return;
  strip.innerHTML=''; strip.style.display='flex';
  // Action row
  const actions=el(`<div class="mcs-actions"></div>`);
  const cancelB=el(`<button class="danger">${ICONS.reset}<span>Cancel</span></button>`);
  const saveB=el(`<button class="primary">${ICONS.check}<span>Save</span></button>`);
  if(mode==='crop'){
    cancelB.addEventListener('click',()=>cancelCrop());
    saveB.addEventListener('click',()=>commitCrop());
  } else {
    cancelB.addEventListener('click',()=>cancelResize());
    saveB.addEventListener('click',()=>commitResize());
  }
  actions.appendChild(cancelB); actions.appendChild(saveB);
  strip.appendChild(actions);

  if(mode==='crop'){
    // A few aspect-ratio presets
    const row=el(`<div class="mcs-presets"></div>`);
    [['Free',null],['1:1',1],['4:3',4/3],['16:9',16/9],['3:2',3/2],['9:16',9/16],['3:4',3/4]].forEach(([lbl,ratio])=>{
      const b=el(`<button>${lbl}</button>`);
      b.addEventListener('click',()=>{
        if(!state.cropRect) startCrop();
        if(ratio){
          let w=canvas.width*0.7, h=w/ratio;
          if(h>canvas.height*0.9){ h=canvas.height*0.9; w=h*ratio; }
          state.cropRect={x:(canvas.width-w)/2,y:(canvas.height-h)/2,w,h}; drawOverlay();
        }
      });
      row.appendChild(b);
    });
    strip.appendChild(row);
  } else {
    // Resize: dimensions + lock aspect ratio
    const dims=el(`<div class="mcs-dims"></div>`);
    const wI=el(`<input type="number" value="${Math.round(state.resizeRect.w)}" placeholder="W"/>`);
    const hI=el(`<input type="number" value="${Math.round(state.resizeRect.h)}" placeholder="H"/>`);
    const lockB=el(`<button class="mcs-lock ${state.resizeRect.keepRatio?'active':''}">${state.resizeRect.keepRatio?'🔒':'🔓'}</button>`);
    wI.addEventListener('input',()=>{ const v=parseInt(wI.value)||1; state.resizeRect.w=v; if(state.resizeRect.keepRatio){ state.resizeRect.h=Math.round(v/state.resizeRect.ratio); hI.value=state.resizeRect.h; } drawOverlay(); });
    hI.addEventListener('input',()=>{ const v=parseInt(hI.value)||1; state.resizeRect.h=v; if(state.resizeRect.keepRatio){ state.resizeRect.w=Math.round(v*state.resizeRect.ratio); wI.value=state.resizeRect.w; } drawOverlay(); });
    lockB.addEventListener('click',()=>{
      state.resizeRect.keepRatio=!state.resizeRect.keepRatio;
      state.resizeRect.ratio=state.resizeRect.w/state.resizeRect.h;
      lockB.classList.toggle('active',state.resizeRect.keepRatio);
      lockB.textContent=state.resizeRect.keepRatio?'🔒':'🔓';
    });
    dims.appendChild(wI); dims.appendChild(hI); dims.appendChild(lockB);
    strip.appendChild(dims);

    // Common size presets
    const row=el(`<div class="mcs-presets"></div>`);
    const cur=state.resizeRect;
    [['50%',()=>[Math.round(canvas.width*0.5),Math.round(canvas.height*0.5)]],
     ['100%',()=>[canvas.width,canvas.height]],
     ['200%',()=>[canvas.width*2,canvas.height*2]],
     ['1080',()=>[1080,Math.round(1080/(canvas.width/canvas.height))]],
     ['720',()=>[720,Math.round(720/(canvas.width/canvas.height))]]].forEach(([lbl,fn])=>{
      const b=el(`<button>${lbl}</button>`);
      b.addEventListener('click',()=>{ const [w,h]=fn(); state.resizeRect.w=w; state.resizeRect.h=h; wI.value=w; hI.value=h; drawOverlay(); });
      row.appendChild(b);
    });
    strip.appendChild(row);
  }
}

/* ========================================================================
   MOBILE TOP-BAR SEARCH
   The search button toggles a search bar that replaces the category selector.
   The bar filters section content the same way the desktop sidebar search does.
   ======================================================================== */
(function bindMobileTopbarSearch(){
  const btn = document.getElementById('mtb-search-btn');
  const box = document.getElementById('mtb-search-box');
  const cat = document.getElementById('mtb-cat');
  const input = document.getElementById('mtb-search-input');
  const closeBtn = document.getElementById('mtb-search-close');
  if(!btn || !box || !cat || !input) return;

  function openSearch(){
    box.classList.add('open');
    cat.style.display = 'none';
    btn.classList.add('active');
    setTimeout(()=>input.focus(), 30);
  }
  function closeSearch(){
    box.classList.remove('open');
    cat.style.display = '';
    btn.classList.remove('active');
    input.value = '';
    filterSections('');
    filterMobileSections('');
  }
  btn.addEventListener('click', (e)=>{
    e.stopPropagation();
    if(box.classList.contains('open')) closeSearch();
    else openSearch();
  });
  closeBtn.addEventListener('click', closeSearch);
  input.addEventListener('input', ()=>{
    /* Reuse the desktop search filter helper AND also mirror to mobile content. */
    filterSections(input.value);
    filterMobileSections(input.value);
  });
  input.addEventListener('keydown', e=>{
    if(e.key === 'Escape') closeSearch();
  });
})();

/* Mobile mirror of filterSections — filters the .mb-content section list too. */
function filterMobileSections(q){
  q = (q||'').toLowerCase().trim();
  document.querySelectorAll('#mb-content .section').forEach(sec=>{
    let matchAny = false;
    sec.querySelectorAll('.tool-btn, .fx-item, .field').forEach(x=>{
      const txt = x.textContent.toLowerCase();
      const show = !q || txt.includes(q);
      x.style.display = show ? '' : 'none';
      if(show) matchAny = true;
    });
    const titleEl = sec.querySelector('.section-title span:first-child');
    const title = titleEl ? titleEl.textContent.toLowerCase() : '';
    if(!q || title.includes(q)) matchAny = true;
    sec.style.display = matchAny ? '' : 'none';
  });
}

/* Extend the desktop search helper so it also matches .fx-item entries. */
(function patchFilterSections(){
  const origFilter = window.filterSections || filterSections;
  window.filterSections = function(q){
    q = (q||'').toLowerCase().trim();
    document.querySelectorAll('#content .section').forEach(sec=>{
      let matchAny = false;
      sec.querySelectorAll('.tool-btn, .fx-item, .field').forEach(x=>{
        const txt = x.textContent.toLowerCase();
        const show = !q || txt.includes(q);
        x.style.display = show ? '' : 'none';
        if(show) matchAny = true;
      });
      const titleEl = sec.querySelector('.section-title span:first-child');
      const title = titleEl ? titleEl.textContent.toLowerCase() : '';
      if(!q || title.includes(q)) matchAny = true;
      sec.style.display = matchAny ? '' : 'none';
    });
  };
})();

/* ========================================================================
   MOBILE BOTTOM-PANE DRAG PILL
   Lets the user drag the top edge of the bottom pane up/down to resize it,
   revealing more of the image on small screens.
   ======================================================================== */
(function bindDragPill(){
  const pill = document.getElementById('mb-drag-pill');
  const bar  = document.getElementById('mobile-bar');
  if(!pill || !bar) return;

  let dragging = false, startY = 0, startH = 0;

  function clampHeight(px){
    const vh = window.innerHeight;
    const min = 56;                     /* just enough to show the pill + one row */
    const max = Math.floor(vh * 0.9);   /* never eat the whole screen */
    return Math.max(min, Math.min(max, px));
  }

  function begin(clientY){
    if(!window.matchMedia('(max-width: 900px)').matches) return;
    dragging = true;
    startY = clientY;
    startH = bar.getBoundingClientRect().height;
    pill.classList.add('dragging');
    document.body.style.userSelect = 'none';
  }
  function move(clientY){
    if(!dragging) return;
    /* Dragging up increases pane height (clientY decreases). */
    const dy = startY - clientY;
    const h  = clampHeight(startH + dy);
    bar.style.maxHeight = h + 'px';
    bar.style.height    = h + 'px';
    document.documentElement.style.setProperty('--mb-height', h + 'px');
    if(typeof fitCanvasCss === 'function') fitCanvasCss();
  }
  function end(){
    if(!dragging) return;
    dragging = false;
    pill.classList.remove('dragging');
    document.body.style.userSelect = '';
  }

  pill.addEventListener('mousedown', e=>{ begin(e.clientY); e.preventDefault(); });
  window.addEventListener('mousemove', e=>move(e.clientY));
  window.addEventListener('mouseup', end);

  pill.addEventListener('touchstart', e=>{
    if(!e.touches[0]) return;
    begin(e.touches[0].clientY);
  }, {passive:true});
  window.addEventListener('touchmove', e=>{
    if(!dragging || !e.touches[0]) return;
    move(e.touches[0].clientY);
    e.preventDefault();
  }, {passive:false});
  window.addEventListener('touchend', end);
  window.addEventListener('touchcancel', end);

  /* Double-tap the pill to snap back to auto height. */
  let lastTap = 0;
  pill.addEventListener('click', ()=>{
    const now = Date.now();
    if(now - lastTap < 350){
      bar.style.maxHeight = '';
      bar.style.height = '';
      updateMobileBarHeightVar();
      if(typeof fitCanvasCss === 'function') fitCanvasCss();
    }
    lastTap = now;
  });
})();

/* ========================================================================
   INIT
   ======================================================================== */
function init(){
  renderContent(); renderRail(); updateCatSwitcherLabels(); updateMobileBarHeightVar();
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
    if((e.ctrlKey||e.metaKey)&&e.key==='z'){ e.preventDefault(); if(e.shiftKey)redo(); else undo(); }
    if((e.ctrlKey||e.metaKey)&&e.key==='y'){ e.preventDefault(); redo(); }
    if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); openExportModal(); }
    if(e.key==='Enter'&&state.cropRect){ commitCrop(); }
    if(e.key==='Escape'&&state.cropRect){ cancelCrop(); }
    if(e.key==='Escape'&&state.resizeRect){ cancelResize(); }
    if(e.key==='Delete'&&state.activeTextId){ state.texts=state.texts.filter(t=>t.id!==state.activeTextId); state.activeTextId=null; drawOverlay(); renderContent(); }
  });
}
init();
