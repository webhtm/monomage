     </div></div>`);
     fmt.querySelectorAll('.fmt-btn').forEach(b=>b.addEventListener('click',()=>{ pushHistory(); const f=b.dataset.f;
       if(f==='bold')active.bold=!active.bold; else if(f==='italic')active.italic=!active.italic; else if(f==='under')active.under=!active.under;
       else if(f==='sup')active.vAlign=(active.vAlign==='sup')?'normal':'sup'; else if(f==='sub')active.vAlign=(active.vAlign==='sub')?'normal':'sub';
       renderContent(); drawOverlay(); }));
     editor.appendChild(fmt);
  
     const al=el(`<div class="field"><label>Alignment</label><div class="fmt-row">
       <button class="fmt-btn ${active.align==='left'?'active':''}" data-a="left">Left</button>
       <button class="fmt-btn ${active.align==='center'?'active':''}" data-a="center">Center</button>
       <button class="fmt-btn ${active.align==='right'?'active':''}" data-a="right">Right</button>
     </div></div>`);
     al.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{ pushHistory(); active.align=b.dataset.a; renderContent(); drawOverlay(); }));
     editor.appendChild(al);
  
     const ext=el(`<div class="field"><label>Style</label><div class="fmt-row">
       <button class="fmt-btn ${active.shadow?'active':''}" data-x="shadow">Shadow</button>
       <button class="fmt-btn ${active.stroke?'active':''}" data-x="stroke">Stroke</button>
       <button class="fmt-btn ${active.bg?'active':''}" data-x="bg">BG</button>
       <button class="fmt-btn ${active.highlight?'active':''}" data-x="highlight">HL</button>
     </div></div>`);
     ext.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{ pushHistory(); active[b.dataset.x]=!active[b.dataset.x]; renderContent(); drawOverlay(); }));
     editor.appendChild(ext);
  
     if(active.stroke){
       const st=el(`<div class="field"><label>Stroke</label><div class="row"><input type="color" value="${active.strokeColor}"/><input type="number" min="1" max="20" value="${active.strokeWidth}"/></div></div>`);
       const [cInp,wInp]=st.querySelectorAll('input');
       cInp.addEventListener('input',e=>{ active.strokeColor=e.target.value; drawOverlay(); });
       wInp.addEventListener('input',e=>{ active.strokeWidth=parseInt(e.target.value)||1; drawOverlay(); });
       editor.appendChild(st);
     }
     if(active.highlight){
       editor.appendChild(colorControl({
         label:'Highlight Color', value:(active.highlightColor||'#ffd93d'), allowGrad:false,
         onColor:(v)=>{ active.highlightColor=v; drawOverlay(); }
       }));
       const hlop=el(`<div class="field"><label>Highlight Opacity <span class="val">${Math.round((active.highlightOpacity??0.55)*100)}%</span></label><input type="range" min="0" max="100" value="${Math.round((active.highlightOpacity??0.55)*100)}"/></div>`);
       hlop.querySelector('input').addEventListener('input',e=>{ active.highlightOpacity=parseInt(e.target.value)/100; hlop.querySelector('.val').textContent=e.target.value+'%'; drawOverlay(); });
       editor.appendChild(hlop);
     }
     if(active.bg){
       const bg=el(`<div class="field"><label>Background</label>
         <div class="row"><input type="color" value="${active.bgColor}"/><input type="range" min="0" max="100" value="${active.bgOpacity*100}" title="Opacity"/></div>
       </div>`);
       const [cInp,oInp]=bg.querySelectorAll('input');
       cInp.addEventListener('input',e=>{ active.bgColor=e.target.value; drawOverlay(); });
       oInp.addEventListener('input',e=>{ active.bgOpacity=parseInt(e.target.value)/100; drawOverlay(); });
       editor.appendChild(bg);
       const padF=el(`<div class="field"><label>Padding <span class="val">${Math.round((active.bgPadX??0.3)*100)}%</span></label><input type="range" min="0" max="150" value="${Math.round((active.bgPadX??0.3)*100)}"/></div>`);
       padF.querySelector('input').addEventListener('input',e=>{ const v=parseInt(e.target.value)/100; active.bgPadX=v; active.bgPadY=v*0.7; padF.querySelector('.val').textContent=e.target.value+'%'; drawOverlay(); });
       editor.appendChild(padF);
       const radF=el(`<div class="field"><label>Corner Radius <span class="val">${active.bgRadius??8}px</span></label><input type="range" min="0" max="80" value="${active.bgRadius??8}"/></div>`);
       radF.querySelector('input').addEventListener('input',e=>{ active.bgRadius=parseInt(e.target.value); radF.querySelector('.val').textContent=e.target.value+'px'; drawOverlay(); });
       editor.appendChild(radF);
     }
     wrap.appendChild(editor);
   }
   return sectionShell('sec-text','Text',wrap);
 }
  
 /* =====================================================================
    FORMATTING SECTION — categorised object browser
    ---------------------------------------------------------------------
    Lists every live object on the canvas grouped by category (Shapes,
    Text, Brush Layer). Selecting an object exposes an inline editor
    where the user can change its background/fill colour (uses the
    existing custom colour modal), text colour (same picker method),
    bevel/effects, opacity, font family/size, typography. Each row has
    an X button for deletion.
    ===================================================================== */
 function secFormat(){
   const wrap = document.createElement('div');
  
   /* ----- Helper: build a delete button ----- */
   const delBtn = (onClick)=>{
     const b = el(`<button class="fmt-x-btn" title="Delete object" aria-label="Delete" style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:0 8px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;">Delete</button>`);
     b.addEventListener('mouseenter',()=>{ b.style.color='var(--danger)'; b.style.borderColor='var(--danger)'; });
     b.addEventListener('mouseleave',()=>{ b.style.color='var(--muted)';   b.style.borderColor='var(--border)'; });
     b.addEventListener('click',ev=>{ ev.stopPropagation(); onClick(); });
     return b;
   };
  
   /* ----- Category header ----- */
   const catHeader = (label, count)=>{
     return el(`<div class="fmt-cat-head" style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:12px 0 6px;display:flex;align-items:center;gap:6px;">
       <span>${label}</span>
       <span style="opacity:.6;">(${count})</span>
       <span style="flex:1;height:1px;background:var(--border);"></span>
     </div>`);
   };
  
   /* Ensure the format-panel checkbox state exists. */
   if(!state.smartChecked) state.smartChecked={};

   /* Live-click hint at the top of the panel. */
   wrap.appendChild(el(`<div class="hint" style="margin-bottom:8px;">Click any object on the canvas to select it.</div>`));
  
   /* ----- Row template (with a leading checkbox for multi-select) ----- */
   const row = (label, isActive, objId, onSelect, onDelete)=>{
     const checked = state.smartChecked[objId] === true;
     const r = el(`<div class="fmt-row-item" style="display:flex;align-items:center;gap:6px;padding:6px 8px;background:${isActive?'rgba(77,150,255,0.15)':'var(--panel-2)'};border:1px solid ${isActive?'var(--accent)':'var(--border)'};border-radius:8px;margin-bottom:4px;cursor:pointer;">
       <input type="checkbox" ${checked?'checked':''} style="accent-color:var(--accent);width:14px;height:14px;margin:0;flex-shrink:0;"/>
       <span class="fmt-row-label" style="flex:1;font-size:13px;color:${isActive?'var(--accent)':'var(--text)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${label}</span>
     </div>`);
     const cb = r.querySelector('input');
     cb.addEventListener('click',ev=>ev.stopPropagation());
     cb.addEventListener('change',ev=>{ state.smartChecked[objId]=ev.target.checked; });
     r.addEventListener('click',ev=>{
       if(ev.target.closest('.fmt-x-btn')||ev.target.tagName==='INPUT') return;
       onSelect();
     });
     r.appendChild(delBtn(onDelete));
     return r;
   };
  
   /* ================ MULTI-SELECT TOOLBAR ================
      Check-boxes on rows below drive a shared bulk-action bar so users
      can act on ALL currently-checked objects at once (delete, copy,
      paste, effect toggles). Mirrors the Smart Select bulk bar. */
   const allObjectIds = [
     ...(state.shapes||[]).map(s=>({type:'shape',id:s.id})),
     ...(state.texts ||[]).map(t=>({type:'text', id:t.id})),
   ];
   const anyObjects = allObjectIds.length > 0;
   if(anyObjects){
     const bulkBar = el(`<div style="background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:10px;">
       <div style="display:flex;gap:6px;margin-bottom:6px;">
         <button data-a="all" style="flex:1;background:var(--panel-3);border:1px solid var(--border);color:var(--text);padding:6px;border-radius:6px;font-size:11.5px;cursor:pointer;">Select All</button>
         <button data-a="none" style="flex:1;background:var(--panel-3);border:1px solid var(--border);color:var(--text);padding:6px;border-radius:6px;font-size:11.5px;cursor:pointer;">Clear</button>
       </div>
       <div class="bulk-actions" style="margin:0;">
         <button data-a="delete" class="danger">Delete</button>
         <button data-a="copy">Copy</button>
         <button data-a="paste">Paste</button>
         <button data-a="duplicate">Duplicate</button>
       </div>
       <div class="bulk-actions" style="margin-top:4px;">
         <button data-fx="bevel">Bevel</button>
         <button data-fx="shadow">Shadow</button>
         <button data-fx="blur">Blur</button>
         <button data-fx="gloss">Gloss</button>
       </div>
     </div>`);
     bulkBar.querySelector('[data-a="all"]').addEventListener('click',()=>{
       allObjectIds.forEach(o=>state.smartChecked[o.id]=true);
       renderContent();
     });
     bulkBar.querySelector('[data-a="none"]').addEventListener('click',()=>{
       allObjectIds.forEach(o=>delete state.smartChecked[o.id]);
       renderContent();
     });
     bulkBar.querySelector('[data-a="delete"]').addEventListener('click',()=>{
       // Ensure smartSelectedIds is populated for bulkDeleteChecked
       state.smartSelectedIds = allObjectIds;
       bulkDeleteChecked();
     });
     bulkBar.querySelector('[data-a="copy"]').addEventListener('click',()=>{
       state.smartSelectedIds = allObjectIds; bulkCopyChecked();
     });
     bulkBar.querySelector('[data-a="paste"]').addEventListener('click',()=>{
       bulkPaste();
     });
     bulkBar.querySelector('[data-a="duplicate"]').addEventListener('click',()=>{
       state.smartSelectedIds = allObjectIds; bulkDuplicateChecked();
     });
     bulkBar.querySelectorAll('[data-fx]').forEach(b=>b.addEventListener('click',()=>{
       const k=b.dataset.fx;
       state.smartSelectedIds = allObjectIds;
       forEachCheckedObj(obj=>{ obj[k]=!obj[k]; });
       drawOverlay(); renderContent();
     }));
     wrap.appendChild(bulkBar);
   }
  
   /* ================ SHAPES ================ */
   const shapes = state.shapes || [];
   wrap.appendChild(catHeader('Shapes', shapes.length));
   if(shapes.length===0){
     wrap.appendChild(el(`<div style="font-size:12px;color:var(--muted);padding:6px;">No live shape objects. Draw a shape from the Shapes section — un-baked shapes appear here.</div>`));
   } else {
     shapes.forEach((s,idx)=>{
       const isActive = s.id===state.activeShapeId;
       wrap.appendChild(row(
         `${idx+1}. ${s.kind.charAt(0).toUpperCase()+s.kind.slice(1)}`,
         isActive,
         s.id,
         ()=>{ state.activeShapeId = s.id; state.activeTextId=null; drawOverlay(); renderContent(); },
         ()=>{ pushHistory(); state.shapes = state.shapes.filter(x=>x.id!==s.id); if(state.activeShapeId===s.id) state.activeShapeId=null; drawOverlay(); renderContent(); }
       ));
     });
     /* Bake button for shapes */
     const bake = el(`<button class="tool-btn centered" style="margin:4px 0 8px;">${ICONS.check||''}<span>Bake All Shapes</span></button>`);
     bake.addEventListener('click',()=>{ commitShapes(); });
     wrap.appendChild(bake);
   }
  
   /* ================ TEXT ================ */
   const texts = state.texts || [];
   wrap.appendChild(catHeader('Text', texts.length));
   if(texts.length===0){
     wrap.appendChild(el(`<div style="font-size:12px;color:var(--muted);padding:6px;">No text layers. Add one from the Text section.</div>`));
   } else {
     texts.forEach((t,idx)=>{
       const isActive = t.id===state.activeTextId;
       const preview = (t.text||'').slice(0,20) || '(empty)';
       wrap.appendChild(row(
         `${idx+1}. ${escapeHtml(preview)}`,
         isActive,
         t.id,
         ()=>{ state.activeTextId = t.id; state.activeShapeId=null; state.activeTool='text-move'; drawOverlay(); renderContent(); renderRail(); },
         ()=>{ pushHistory(); state.texts = state.texts.filter(x=>x.id!==t.id); if(state.activeTextId===t.id) state.activeTextId=null; drawOverlay(); renderContent(); }
       ));
     });
   }
  
   /* ================ BRUSH LAYER ================ */
   const hasPaint = paintLayer && paintLayer.width>0 && _paintLayerHasPixels();
   wrap.appendChild(catHeader('Brush Layer', hasPaint ? 1 : 0));
   if(!hasPaint){
     wrap.appendChild(el(`<div style="font-size:12px;color:var(--muted);padding:6px;">No un-baked brushstrokes. Draw in the Brush section to add to this layer.</div>`));
   } else {
     const r = el(`<div class="fmt-row-item" style="display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;">
       <span class="fmt-row-label" style="flex:1;font-size:13px;">Current brush strokes</span>
     </div>`);
     r.appendChild(delBtn(()=>{
       pctx.clearRect(0,0,paintLayer.width,paintLayer.height);
       renderContent();
     }));
     wrap.appendChild(r);
     const bake = el(`<button class="tool-btn centered" style="margin:4px 0 8px;">${ICONS.check||''}<span>Bake Brushstrokes</span></button>`);
     bake.addEventListener('click',()=>{ pushHistory(); bakePaintLayer(); renderContent(); });
     wrap.appendChild(bake);
   }
  
   /* ================ EDITOR PANEL ================ */
   const editor = document.createElement('div');
   editor.style.marginTop='12px';
   editor.style.paddingTop='12px';
   editor.style.borderTop='1px solid var(--border)';
  
   const activeShape = shapes.find(s=>s.id===state.activeShapeId);
   const activeText  = texts.find (t=>t.id===state.activeTextId);
  
   if(!activeShape && !activeText){
     editor.appendChild(el(`<div style="font-size:12px;color:var(--muted);padding:6px;">Select an object above to edit its formatting: fill/background colour, text colour, font, size, opacity, bevel, shadow and effects.</div>`));
     wrap.appendChild(editor);
     return sectionShell('sec-format','Formatting',wrap);
   }
  
   /* ----- Slider helper (persistent, does NOT reset on release) ----- */
   const slider = (label, min, max, step, value, unit, onChange)=>{
     const f = el(`<div class="field"><label>${label} <span class="val" data-val>${value}${unit||''}</span></label><input type="range" min="${min}" max="${max}" step="${step}" value="${value}"/></div>`);
     f.querySelector('input').addEventListener('input',e=>{
       const v = parseFloat(e.target.value);
       f.querySelector('[data-val]').textContent = e.target.value + (unit||'');
       onChange(v);
     });
     return f;
   };
  
   const titleEl = el(`<div class="section-title" style="margin:0 0 8px;"><span>${activeShape?('Shape: '+activeShape.kind):'Text Object'}</span><span class="sec-line"></span></div>`);
   editor.appendChild(titleEl);
  
   if(activeShape){
     /* -------- SHAPE FORMATTING -------- */
     const s = activeShape;
     const _isLinear = (s.kind === 'line' || s.kind === 'arrow');
  
     /* Fill / bg colour — line and arrow are 1-D shapes; fill/background
        has no visual meaning on them, so the picker is intentionally
        hidden (and the fill flag is force-cleared) for those kinds. */
     if(_isLinear){
       s.fillOn = false;
       editor.appendChild(el(`<div class="hint">Background / fill is disabled for lines and arrows — only the border (stroke) is rendered.</div>`));
     } else {
       editor.appendChild(colorControl({
         label:'Background / Fill Color', value:s.fill, allowGrad:true, grad:s.fillGrad,
         onColor:v=>{ s.fill=v; s.fillGrad=null; s.fillOn=true; drawOverlay(); },
         onGrad:g=>{ s.fillGrad=g; s.fillOn=true; drawOverlay(); }
       }));
       /* Fill toggle */
       const fillToggle = el(`<div class="field"><label>Fill Enabled <button class="grad-toggle ${s.fillOn?'active':''}" style="width:auto;padding:2px 8px;">${s.fillOn?'ON':'OFF'}</button></label></div>`);
       fillToggle.querySelector('button').addEventListener('click',()=>{ s.fillOn=!s.fillOn; drawOverlay(); renderContent(); });
       editor.appendChild(fillToggle);
     }
  
     /* Border colour (same picker method) */
     editor.appendChild(colorControl({
       label:'Border Color', value:s.stroke, allowGrad:true, grad:s.strokeGrad,
       onColor:v=>{ s.stroke=v; s.strokeGrad=null; s.strokeOn=true; drawOverlay(); },
       onGrad:g=>{ s.strokeGrad=g; s.strokeOn=true; drawOverlay(); }
     }));
     const strokeToggle = el(`<div class="field"><label>Border Enabled <button class="grad-toggle ${s.strokeOn?'active':''}" style="width:auto;padding:2px 8px;">${s.strokeOn?'ON':'OFF'}</button></label></div>`);
     strokeToggle.querySelector('button').addEventListener('click',()=>{ s.strokeOn=!s.strokeOn; drawOverlay(); renderContent(); });
     editor.appendChild(strokeToggle);
  
     editor.appendChild(slider('Border Width', 0, 60, 1, s.strokeWidth||2, 'px', v=>{ s.strokeWidth=v; drawOverlay(); }));
  
     /* Inner text (typography) */
     const textInp = el(`<div class="field"><label>Inner Text</label><input type="text" value="${escapeAttr(s.text||'')}" placeholder="Optional label"/></div>`);
     textInp.querySelector('input').addEventListener('input',e=>{ s.text=e.target.value; drawOverlay(); });
     editor.appendChild(textInp);
  
     editor.appendChild(colorControl({ label:'Text Color', value:s.textColor||'#ffffff', allowGrad:false, onColor:v=>{ s.textColor=v; drawOverlay(); } }));
  
     /* Font family */
     const fonts=['Heebo, Inter, sans-serif','Georgia, serif','Times New Roman, serif','Courier New, monospace','Arial, sans-serif','Comic Sans MS, cursive','Impact, sans-serif','Verdana, sans-serif','Trebuchet MS, sans-serif'];
     const ff = el(`<div class="field"><label>Font Family</label><select></select></div>`);
     fonts.forEach(f=>{ const o=document.createElement('option'); o.value=f; o.textContent=f.split(',')[0]; if(s.fontFamily===f) o.selected=true; ff.querySelector('select').appendChild(o); });
     ff.querySelector('select').addEventListener('change',e=>{ s.fontFamily=e.target.value; drawOverlay(); });
     editor.appendChild(ff);
  
     editor.appendChild(slider('Font Size', 8, 200, 1, s.fontSize||24, 'px', v=>{ s.fontSize=v; drawOverlay(); }));
  
     /* Typography toggles */
     const typo = el(`<div class="field"><label>Typography</label><div class="fmt-row">
       <button class="fmt-btn ${s.fontBold?'active':''}" data-f="bold"><b>B</b></button>
       <button class="fmt-btn ${s.fontItalic?'active':''}" data-f="italic"><i>I</i></button>
     </div></div>`);
     typo.querySelectorAll('.fmt-btn').forEach(b=>b.addEventListener('click',()=>{
       const k=b.dataset.f;
       if(k==='bold') s.fontBold=!s.fontBold;
       else if(k==='italic') s.fontItalic=!s.fontItalic;
       drawOverlay(); renderContent();
     }));
     editor.appendChild(typo);
  
     /* Opacity */
     editor.appendChild(slider('Opacity', 0, 100, 1, Math.round((s.opacity==null?1:s.opacity)*100), '%', v=>{ s.opacity=v/100; drawOverlay(); }));
  
     /* Effects: bevel, shadow, blur, gloss — each with an intensity slider
        that only shows when the effect is turned on. */
     const fx = el(`<div class="field"><label>Effects</label><div class="fmt-row" style="flex-wrap:wrap;gap:4px;">
       <button class="fmt-btn ${s.bevel?'active':''}" data-x="bevel">Bevel</button>
       <button class="fmt-btn ${s.shadow?'active':''}" data-x="shadow">Shadow</button>
       <button class="fmt-btn ${s.blur?'active':''}" data-x="blur">Blur</button>
       <button class="fmt-btn ${s.gloss?'active':''}" data-x="gloss">Gloss</button>
     </div></div>`);
     fx.querySelectorAll('.fmt-btn').forEach(b=>b.addEventListener('click',()=>{
       const k=b.dataset.x;
       s[k]=!s[k];
       drawOverlay(); renderContent();
     }));
     editor.appendChild(fx);
  
     if(s.bevel){
       editor.appendChild(slider('Bevel Intensity', 1, 20, 1, s.bevelIntensity||4, 'px', v=>{ s.bevelIntensity=v; drawOverlay(); }));
     }
     if(s.shadow){
       editor.appendChild(slider('Shadow Blur', 0, 50, 1, s.shadowBlur||8, 'px', v=>{ s.shadowBlur=v; drawOverlay(); }));
       editor.appendChild(slider('Shadow Offset X', -30, 30, 1, s.shadowOffsetX==null?2:s.shadowOffsetX, 'px', v=>{ s.shadowOffsetX=v; drawOverlay(); }));
       editor.appendChild(slider('Shadow Offset Y', -30, 30, 1, s.shadowOffsetY==null?2:s.shadowOffsetY, 'px', v=>{ s.shadowOffsetY=v; drawOverlay(); }));
     }
     if(s.blur){
       editor.appendChild(slider('Blur Intensity', 1, 30, 1, s.blurIntensity||4, 'px', v=>{ s.blurIntensity=v; drawOverlay(); }));
     }
     if(s.gloss){
       editor.appendChild(slider('Gloss Intensity', 0, 100, 1, s.glossIntensity==null?60:s.glossIntensity, '%', v=>{ s.glossIntensity=v; drawOverlay(); }));
     }
  
     if(s.starPoints !== undefined && s.kind==='star'){
       editor.appendChild(slider('Star Points', 3, 12, 1, s.starPoints||5, '', v=>{ s.starPoints=Math.round(v); drawOverlay(); }));
     }
     if(s.kind==='rect'){
       editor.appendChild(slider('Corner Radius', 0, 200, 1, s.cornerRadius||0, 'px', v=>{ s.cornerRadius=v; drawOverlay(); }));
     }
   }
  
   if(activeText){
     /* -------- TEXT FORMATTING -------- */
     const t = activeText;
  
     const inp = el(`<div class="field"><label>Text Content</label><input type="text" value="${escapeAttr(t.text)}"/></div>`);
     inp.querySelector('input').addEventListener('input',e=>{ t.text=e.target.value; drawOverlay(); });
     editor.appendChild(inp);
  
     /* Text colour — supports solid OR gradient. */
     editor.appendChild(colorControl({
       label:'Text Color', value:t.color, allowGrad:true, grad:t.colorGrad,
       onColor:v=>{ t.color=v; t.colorGrad=null; drawOverlay(); },
       onGrad :g=>{ t.colorGrad=g; drawOverlay(); }
     }));
  
     /* Background colour — same colour modal */
     const bgTog = el(`<div class="field"><label>Background Enabled <button class="grad-toggle ${t.bg?'active':''}" style="width:auto;padding:2px 8px;">${t.bg?'ON':'OFF'}</button></label></div>`);
     bgTog.querySelector('button').addEventListener('click',()=>{ t.bg=!t.bg; drawOverlay(); renderContent(); });
     editor.appendChild(bgTog);
     if(t.bg){
       editor.appendChild(colorControl({ label:'Background Color', value:t.bgColor, allowGrad:false, onColor:v=>{ t.bgColor=v; drawOverlay(); } }));
       editor.appendChild(slider('Background Opacity', 0, 100, 1, Math.round((t.bgOpacity??0.5)*100), '%', v=>{ t.bgOpacity=v/100; drawOverlay(); }));
     }
  
     /* Font family */
     const fonts=['Heebo, Inter, sans-serif','Georgia, serif','Times New Roman, serif','Courier New, monospace','Arial, sans-serif','Comic Sans MS, cursive','Impact, sans-serif','Verdana, sans-serif','Trebuchet MS, sans-serif'];
     const ff = el(`<div class="field"><label>Font Family</label><select></select></div>`);
     fonts.forEach(f=>{ const o=document.createElement('option'); o.value=f; o.textContent=f.split(',')[0]; if(t.font===f) o.selected=true; ff.querySelector('select').appendChild(o); });
     ff.querySelector('select').addEventListener('change',e=>{ t.font=e.target.value; drawOverlay(); });
     editor.appendChild(ff);
  
     editor.appendChild(slider('Font Size', 8, 400, 1, t.size, 'px', v=>{ t.size=Math.round(v); drawOverlay(); }));
  
     const typo = el(`<div class="field"><label>Typography</label><div class="fmt-row">
       <button class="fmt-btn ${t.bold?'active':''}" data-f="bold"><b>B</b></button>
       <button class="fmt-btn ${t.italic?'active':''}" data-f="italic"><i>I</i></button>
       <button class="fmt-btn ${t.under?'active':''}" data-f="under"><u>U</u></button>
     </div></div>`);
     typo.querySelectorAll('.fmt-btn').forEach(b=>b.addEventListener('click',()=>{
       const k=b.dataset.f;
       if(k==='bold') t.bold=!t.bold;
       else if(k==='italic') t.italic=!t.italic;
       else if(k==='under') t.under=!t.under;
       drawOverlay(); renderContent();
     }));
     editor.appendChild(typo);
  
     /* Opacity (implemented via shadow toggle + we add an opacity field
        stored on the text object). */
     if(t.opacity==null) t.opacity = 1;
     editor.appendChild(slider('Opacity', 0, 100, 1, Math.round(t.opacity*100), '%', v=>{ t.opacity=v/100; drawOverlay(); }));

     /* Rotation: 0-359°, pivoting around the text anchor. */
     if(t.rotation==null) t.rotation = 0;
     editor.appendChild(slider('Rotation', 0, 359, 1, t.rotation, '°', v=>{ t.rotation=v; drawOverlay(); }));
  
     const fx = el(`<div class="field"><label>Layers</label><div class="fmt-row" style="flex-wrap:wrap;gap:4px;">
       <button class="fmt-btn ${t.stroke?'active':''}" data-x="stroke">Outline</button>
       <button class="fmt-btn ${t.highlight?'active':''}" data-x="highlight">Highlight</button>
     </div></div>`);
     fx.querySelectorAll('.fmt-btn').forEach(b=>b.addEventListener('click',()=>{
       const k=b.dataset.x;
       t[k]=!t[k];
       drawOverlay(); renderContent();
     }));
     editor.appendChild(fx);
  
     /* ---- Per-surface effects (Bevel / Shadow / Blur / Gloss) ----
        The target selector chooses which "surface" the toggle applies
        to: the glyphs themselves ("text"), the rounded background
        rectangle, or the marker-style highlight. This mirrors how
        Photoshop's layer-styles apply per-layer. */
     if(!t.fx) t.fx = {};
     if(!t.__fxTarget) t.__fxTarget = 'text';
     const targets = [
       {id:'text', label:'Text'},
       {id:'background', label:'Background', disabled:!t.bg},
       {id:'highlight', label:'Highlight', disabled:!t.highlight},
     ];
     const selWrap = el(`<div class="field"><label>Effect Target</label>
       <div class="fx-target-selector"></div>
     </div>`);
     const sel = selWrap.querySelector('.fx-target-selector');
     targets.forEach(tg=>{
       const b=el(`<button class="${t.__fxTarget===tg.id?'active':''}" ${tg.disabled?'disabled style="opacity:.4;cursor:not-allowed;"':''}>${tg.label}</button>`);
       b.addEventListener('click',()=>{
         if(tg.disabled) return;
         t.__fxTarget = tg.id;
         drawOverlay(); renderContent();
       });
       sel.appendChild(b);
     });
     editor.appendChild(selWrap);
  
     const surf = t.__fxTarget;
     if(!t.fx[surf]) t.fx[surf]={};
     const sc = t.fx[surf];
  
     const fx2 = el(`<div class="field"><label>Effects (applied to: <span class="val">${surf}</span>)</label><div class="fmt-row" style="flex-wrap:wrap;gap:4px;">
       <button class="fmt-btn ${sc.bevel?'active':''}" data-x="bevel">Bevel</button>
       <button class="fmt-btn ${sc.shadow?'active':''}" data-x="shadow">Shadow</button>
       <button class="fmt-btn ${sc.blur?'active':''}" data-x="blur">Blur</button>
       <button class="fmt-btn ${sc.gloss?'active':''}" data-x="gloss">Gloss</button>
     </div></div>`);
     fx2.querySelectorAll('.fmt-btn').forEach(b=>b.addEventListener('click',()=>{
       const k=b.dataset.x;
       sc[k]=!sc[k];
       drawOverlay(); renderContent();
     }));
     editor.appendChild(fx2);
  
     if(sc.bevel){
       editor.appendChild(slider('Bevel Intensity', 1, 20, 1, sc.bevelIntensity||3, 'px', v=>{ sc.bevelIntensity=v; drawOverlay(); }));
     }
     if(sc.shadow){
       editor.appendChild(slider('Shadow Blur', 0, 50, 1, sc.shadowIntensity||6, 'px', v=>{ sc.shadowIntensity=v; drawOverlay(); }));
     }
     if(sc.blur){
       editor.appendChild(slider('Blur Intensity', 1, 30, 1, sc.blurIntensity||3, 'px', v=>{ sc.blurIntensity=v; drawOverlay(); }));
     }
     if(sc.gloss){
       editor.appendChild(slider('Gloss Intensity', 0, 100, 1, sc.glossIntensity==null?60:sc.glossIntensity, '%', v=>{ sc.glossIntensity=v; drawOverlay(); }));
     }
   }
  
   wrap.appendChild(editor);
   return sectionShell('sec-format','Formatting',wrap);
 }

 /* Iterate every currently-checked object in Smart Select, calling fn(obj)
    for each. Silently ignores objects that no longer exist. */
 function forEachCheckedObj(fn){
   (state.smartSelectedIds||[]).forEach(o=>{
     if(state.smartChecked[o.id]===false) return;
     const obj = (o.type==='shape')
        ? state.shapes.find(x=>x.id===o.id)
        : state.texts.find(x=>x.id===o.id);
     if(obj) fn(obj, o.type);
   });
 }
 function bulkDeleteChecked(){
   const kill = new Set();
   (state.smartSelectedIds||[]).forEach(o=>{
     if(state.smartChecked[o.id]!==false) kill.add(o.id);
   });
   if(kill.size===0) return;
   pushHistory();
   state.shapes = state.shapes.filter(s=>!kill.has(s.id));
   state.texts  = state.texts.filter (t=>!kill.has(t.id));
   detectSmartObjects();
   drawOverlay(); renderContent();
 }
 function bulkCopyChecked(){
   const out=[];
   (state.smartSelectedIds||[]).forEach(o=>{
     if(state.smartChecked[o.id]===false) return;
     const obj = (o.type==='shape')
        ? state.shapes.find(x=>x.id===o.id)
        : state.texts.find(x=>x.id===o.id);
     if(obj) out.push({type:o.type, data:JSON.parse(JSON.stringify(obj))});
   });
   state.clipboard = out;
 }
 function bulkPaste(){
   if(!state.clipboard || !state.clipboard.length) return;
   pushHistory();
   state.clipboard.forEach(entry=>{
     const copy = JSON.parse(JSON.stringify(entry.data));
     copy.id = (entry.type==='shape'?'S':'T') + Date.now() + '_' + Math.floor(Math.random()*1000);
     // Offset slightly so the paste is visible
     if(entry.type==='shape'){
       if(copy.x!=null) copy.x+=24; if(copy.y!=null) copy.y+=24;
       if(copy.ax!=null){ copy.ax+=24; copy.bx+=24; }
       if(copy.ay!=null){ copy.ay+=24; copy.by+=24; }
       state.shapes.push(copy);
     } else {
       copy.x+=24; copy.y+=24;
       state.texts.push(copy);
     }
   });
   detectSmartObjects();
   drawOverlay(); renderContent();
 }
 function bulkDuplicateChecked(){ bulkCopyChecked(); bulkPaste(); }
 function bulkMoveChecked(dx,dy){
   forEachCheckedObj((obj,type)=>{
     if(type==='shape'){
       if(obj.x!=null) obj.x+=dx; if(obj.y!=null) obj.y+=dy;
       if(obj.ax!=null){ obj.ax+=dx; obj.bx+=dx; }
       if(obj.ay!=null){ obj.ay+=dy; obj.by+=dy; }
     } else {
       obj.x+=dx; obj.y+=dy;
     }
   });
   detectSmartObjects();
   drawOverlay();
 }
 function bulkBring(dir){
   const move = (arr)=>{
     const ids = new Set();
     (state.smartSelectedIds||[]).forEach(o=>{ if(state.smartChecked[o.id]!==false) ids.add(o.id); });
     if(dir==='forward'){
       for(let i=arr.length-2;i>=0;i--){
         if(ids.has(arr[i].id) && !ids.has(arr[i+1].id)){
           const tmp=arr[i]; arr[i]=arr[i+1]; arr[i+1]=tmp;
         }
       }
     } else {
       for(let i=1;i<arr.length;i++){
         if(ids.has(arr[i].id) && !ids.has(arr[i-1].id)){
           const tmp=arr[i]; arr[i]=arr[i-1]; arr[i-1]=tmp;
         }
       }
     }
   };
   move(state.shapes); move(state.texts);
   drawOverlay(); renderContent();
 }
  
 /* ========================================================================
    CONTEXT MENU
    Right-click on desktop or long-press on touch fires a context menu
    over the canvas. If the click hits a text/shape object, per-object
    actions (cut/copy/paste/format/delete/effects) are enabled;
    otherwise only Paste + Select-All are enabled.
    ======================================================================== */
 (function bindContextMenu(){
   const menu = document.createElement('div');
   menu.className = 'ctx-menu';
   menu.id = 'canvas-ctx-menu';
   document.body.appendChild(menu);
  
   let ctxTarget = null; // {type:'shape'|'text', id} or null
  
   function closeMenu(){ menu.classList.remove('open'); }
   function openMenu(x,y){
     menu.style.left = x+'px';
     menu.style.top  = y+'px';
     menu.classList.add('open');
     // Keep on-screen
     const rect = menu.getBoundingClientRect();
     if(rect.right > window.innerWidth-4){ menu.style.left=(window.innerWidth-rect.width-8)+'px'; }
     if(rect.bottom > window.innerHeight-4){ menu.style.top=(window.innerHeight-rect.height-8)+'px'; }
   }
  
   function hitTestAny(p){
     const t = hitTestText(p); if(t) return {type:'text', id:t.id};
     if(state.shapes){
       for(let i=state.shapes.length-1;i>=0;i--){
         const s=state.shapes[i]; const bb=shapeBBox(s);
         if(p.x>=bb.x && p.x<=bb.x+bb.w && p.y>=bb.y && p.y<=bb.y+bb.h){
           return {type:'shape', id:s.id};
         }
       }
     }
     return null;
   }
  
   function getObj(target){
     if(!target) return null;
     return target.type==='shape'
       ? state.shapes.find(x=>x.id===target.id)
       : state.texts.find(x=>x.id===target.id);
   }
  
   function itemHTML(icon, label, shortcut, disabled, danger){
     return `<div class="ctx-item ${disabled?'disabled':''} ${danger?'danger':''}" data-a="${icon}">
       <span class="ctx-icon">${ICONS[icon]||''}</span>
       <span>${label}</span>
       ${shortcut?`<span class="ctx-shortcut">${shortcut}</span>`:''}
     </div>`;
   }
  
   function buildMenu(target){
     const has = !!target;
     const hasClip = state.clipboard && state.clipboard.length > 0;
     const hasSel = has || (state.smartSelectedIds && state.smartSelectedIds.length>0);
     menu.innerHTML = `
       <div class="ctx-item ${!has?'disabled':''}" data-a="cut">
         <span>Cut</span><span class="ctx-shortcut">Ctrl+X</span>
       </div>
       <div class="ctx-item ${!has?'disabled':''}" data-a="copy">
         <span>Copy</span><span class="ctx-shortcut">Ctrl+C</span>
       </div>
       <div class="ctx-item ${!hasClip?'disabled':''}" data-a="paste">
         <span>Paste</span><span class="ctx-shortcut">Ctrl+V</span>
       </div>
       <div class="ctx-item ${!has?'disabled':''}" data-a="duplicate">
         <span>Duplicate</span><span class="ctx-shortcut">Ctrl+D</span>
       </div>
       <div class="ctx-sep"></div>
       <div class="ctx-item ctx-submenu-parent ${!has?'disabled':''}" data-a="format-menu">
         <span>Format</span>
         <div class="ctx-submenu">
           <div class="ctx-item" data-a="fmt-open">Open Formatting Panel</div>
           <div class="ctx-item" data-a="fmt-bevel">Toggle Bevel</div>
           <div class="ctx-item" data-a="fmt-shadow">Toggle Shadow</div>
           <div class="ctx-item" data-a="fmt-blur">Toggle Blur</div>
           <div class="ctx-item" data-a="fmt-gloss">Toggle Gloss</div>
           <div class="ctx-item" data-a="fmt-clear">Clear All Effects</div>
         </div>
       </div>
       <div class="ctx-item ctx-submenu-parent ${!has?'disabled':''}" data-a="arrange-menu">
         <span>Arrange</span>
         <div class="ctx-submenu">
           <div class="ctx-item" data-a="bring-front">Bring to Front</div>
           <div class="ctx-item" data-a="bring-forward">Bring Forward</div>
           <div class="ctx-item" data-a="send-backward">Send Backward</div>
           <div class="ctx-item" data-a="send-back">Send to Back</div>
         </div>
       </div>
       <div class="ctx-sep"></div>
       <div class="ctx-item" data-a="select-all"><span>Select All Objects</span><span class="ctx-shortcut">Ctrl+A</span></div>
       <div class="ctx-sep"></div>
       <div class="ctx-item danger ${!has?'disabled':''}" data-a="delete">
         <span>Delete</span><span class="ctx-shortcut">Del</span>
       </div>`;
  
     menu.querySelectorAll('.ctx-item').forEach(it=>{
       it.addEventListener('click',ev=>{
         ev.stopPropagation();
         if(it.classList.contains('disabled')) return;
         if(it.classList.contains('ctx-submenu-parent')) return; // handled by hover
         handleAction(it.dataset.a, target);
         closeMenu();
       });
     });
   }
  
   function handleAction(action, target){
     const obj = getObj(target);
     const arrangeArr = target && target.type==='shape' ? state.shapes : (target ? state.texts : null);
     switch(action){
       case 'cut':
         if(!target) return;
         state.clipboard = [{type:target.type, data:JSON.parse(JSON.stringify(obj))}];
         pushHistory();
         deleteObj(target); break;
       case 'copy':
         if(!target) return;
         state.clipboard = [{type:target.type, data:JSON.parse(JSON.stringify(obj))}];
         break;
       case 'paste':
         bulkPaste(); break;
       case 'duplicate':
         if(!target) return;
         pushHistory();
         const copy = JSON.parse(JSON.stringify(obj));
         copy.id = (target.type==='shape'?'S':'T')+Date.now()+'_'+Math.floor(Math.random()*1000);
         if(target.type==='shape'){
           if(copy.x!=null) copy.x+=24; if(copy.y!=null) copy.y+=24;
           if(copy.ax!=null){ copy.ax+=24; copy.bx+=24; }
           if(copy.ay!=null){ copy.ay+=24; copy.by+=24; }
           state.shapes.push(copy);
         } else {
           copy.x+=24; copy.y+=24;
           state.texts.push(copy);
         }
         drawOverlay(); renderContent();
         break;
       case 'delete':
         if(target){ pushHistory(); deleteObj(target); }
         break;
       case 'fmt-open':
         if(target){
           if(target.type==='shape'){ state.activeShapeId=target.id; state.activeTextId=null; }
           else { state.activeTextId=target.id; state.activeShapeId=null; }
           state.activeCategory='format'; renderContent(); renderRail();
         }
         break;
       case 'fmt-bevel': if(obj){ pushHistory(); obj.bevel=!obj.bevel; drawOverlay(); renderContent(); } break;
       case 'fmt-shadow': if(obj){ pushHistory(); obj.shadow=!obj.shadow; drawOverlay(); renderContent(); } break;
       case 'fmt-blur': if(obj){ pushHistory(); obj.blur=!obj.blur; drawOverlay(); renderContent(); } break;
       case 'fmt-gloss': if(obj){ pushHistory(); obj.gloss=!obj.gloss; drawOverlay(); renderContent(); } break;
       case 'fmt-clear':
         if(obj){ pushHistory(); obj.bevel=obj.shadow=obj.blur=obj.gloss=false; drawOverlay(); renderContent(); }
         break;
       case 'bring-front':
         if(arrangeArr){
           const idx=arrangeArr.findIndex(x=>x.id===target.id);
           if(idx>=0){ pushHistory(); const [it]=arrangeArr.splice(idx,1); arrangeArr.push(it); drawOverlay(); renderContent(); }
         } break;
       case 'bring-forward':
         if(arrangeArr){
           const idx=arrangeArr.findIndex(x=>x.id===target.id);
           if(idx>=0 && idx<arrangeArr.length-1){ pushHistory(); [arrangeArr[idx],arrangeArr[idx+1]]=[arrangeArr[idx+1],arrangeArr[idx]]; drawOverlay(); renderContent(); }
         } break;
       case 'send-backward':
         if(arrangeArr){
           const idx=arrangeArr.findIndex(x=>x.id===target.id);
           if(idx>0){ pushHistory(); [arrangeArr[idx],arrangeArr[idx-1]]=[arrangeArr[idx-1],arrangeArr[idx]]; drawOverlay(); renderContent(); }
         } break;
       case 'send-back':
         if(arrangeArr){
           const idx=arrangeArr.findIndex(x=>x.id===target.id);
           if(idx>0){ pushHistory(); const [it]=arrangeArr.splice(idx,1); arrangeArr.unshift(it); drawOverlay(); renderContent(); }
         } break;
       case 'select-all':
         // Check every live object in the Formatting panel and jump the user there.
         if(!state.smartChecked) state.smartChecked={};
         (state.shapes||[]).forEach(s=>state.smartChecked[s.id]=true);
         (state.texts ||[]).forEach(t=>state.smartChecked[t.id]=true);
         state.smartSelectedIds = [
           ...(state.shapes||[]).map(s=>({type:'shape',id:s.id})),
           ...(state.texts ||[]).map(t=>({type:'text', id:t.id})),
         ];
         state.activeCategory='format';
         drawOverlay(); renderContent(); renderRail();
         break;
     }
   }
   function deleteObj(target){
     if(!target) return;
     if(target.type==='shape'){
       state.shapes=state.shapes.filter(x=>x.id!==target.id);
       if(state.activeShapeId===target.id) state.activeShapeId=null;
     } else {
       state.texts=state.texts.filter(x=>x.id!==target.id);
       if(state.activeTextId===target.id) state.activeTextId=null;
     }
     drawOverlay(); renderContent();
   }
  
   /* Desktop: contextmenu event */
   const showAt = (clientX, clientY, canvasPt)=>{
     ctxTarget = hitTestAny(canvasPt);
     // If we clicked on an object, mark it active so it visually shows selected.
     if(ctxTarget){
       if(ctxTarget.type==='shape'){ state.activeShapeId=ctxTarget.id; state.activeTextId=null; }
       else { state.activeTextId=ctxTarget.id; state.activeShapeId=null; }
       drawOverlay();
     }
     buildMenu(ctxTarget);
     openMenu(clientX, clientY);
   };
  
   canvas.addEventListener('contextmenu', e=>{
     if(!state.img) return;
     e.preventDefault();
     showAt(e.clientX, e.clientY, getCanvasPos(e));
   });
   overlay.addEventListener('contextmenu', e=>{
     if(!state.img) return;
     e.preventDefault();
     showAt(e.clientX, e.clientY, getCanvasPos(e));
   });
  
   /* Touch long-press for mobile */
   let touchTimer=null, touchStart=null;
   const startLongPress = (e)=>{
     if(!state.img) return;
     if(e.touches.length!==1) return;
     const t=e.touches[0];
     touchStart={x:t.clientX, y:t.clientY, canvasPt:getCanvasPos(e)};
     touchTimer=setTimeout(()=>{
       if(touchStart){
         showAt(touchStart.x, touchStart.y, touchStart.canvasPt);
         touchTimer=null;
       }
     }, 550);
   };
   const cancelLongPress = (e)=>{
     if(touchTimer){ clearTimeout(touchTimer); touchTimer=null; }
     if(touchStart && e.touches && e.touches[0]){
       const dx=e.touches[0].clientX-touchStart.x, dy=e.touches[0].clientY-touchStart.y;
       if(Math.hypot(dx,dy)>10){ touchStart=null; if(touchTimer){ clearTimeout(touchTimer); touchTimer=null; } }
     }
   };
   const endLongPress = ()=>{
     if(touchTimer){ clearTimeout(touchTimer); touchTimer=null; }
     touchStart=null;
   };
   canvas.addEventListener('touchstart', startLongPress, {passive:true});
   canvas.addEventListener('touchmove',  cancelLongPress, {passive:true});
   canvas.addEventListener('touchend',   endLongPress, {passive:true});
   canvas.addEventListener('touchcancel',endLongPress, {passive:true});
   overlay.addEventListener('touchstart', startLongPress, {passive:true});
   overlay.addEventListener('touchmove',  cancelLongPress, {passive:true});
   overlay.addEventListener('touchend',   endLongPress, {passive:true});
   overlay.addEventListener('touchcancel',endLongPress, {passive:true});
  
   /* Dismiss on outside click / escape / scroll */
   document.addEventListener('click',e=>{
     if(!menu.contains(e.target)) closeMenu();
   });
   document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeMenu(); });
   window.addEventListener('resize',closeMenu);
   window.addEventListener('scroll',closeMenu, true);
 })();
  
 /* Detect any non-transparent pixel on the paint layer. Used by the
    Formatting section to decide whether the "Brush Layer" object exists. */
 function _paintLayerHasPixels(){
   if(!paintLayer || paintLayer.width===0) return false;
   try{
     // Cheap heuristic: sample the entire alpha channel once. On very
     // large canvases this is still fast (~10ms for 4K) and only runs
     // when the Formatting section is being rendered.
     const d = pctx.getImageData(0,0,paintLayer.width,paintLayer.height).data;
     for(let i=3;i<d.length;i+=4){ if(d[i]!==0) return true; }
     return false;
   } catch(_e){ return false; }
 }

     const hasContent=mb&&mb.children.length>0;
     bar.classList.toggle('compact',!hasContent);
     /* If the user manually resized the bar via the drag pill, honour it. */
     const manual = bar.style.height ? parseFloat(bar.style.height) : 0;
     const h = (manual > 0) ? manual : (bar.getBoundingClientRect().height || 150);
     document.documentElement.style.setProperty('--mb-height',h+'px');
     const tb=document.getElementById('mobile-topbar');
     if(tb) document.documentElement.style.setProperty('--topbar-height',(tb.getBoundingClientRect().height||46)+'px');
   } else {
     document.documentElement.style.removeProperty('--mb-height'); bar.classList.remove('compact');
     /* Clear any leftover manual sizing when switching to desktop. */
     bar.style.maxHeight=''; bar.style.height='';
   }
   if(typeof fitCanvasCss==='function')fitCanvasCss();
 }
 if('ResizeObserver' in window){ const ro=new ResizeObserver(updateMobileBarHeightVar); const bar=document.getElementById('mobile-bar'); if(bar)ro.observe(bar); }

 /* ========================================================================
    RENDER CONTENT
    ======================================================================== */
 function renderContent(){
   const desk=document.getElementById('content');
   const mb=document.getElementById('mb-content');
   const mbBar=document.getElementById('mobile-bar');
   desk.innerHTML=''; sectionsFor(state.activeCategory).forEach(sec=>desk.appendChild(sec));
   mb.innerHTML=''; sectionsFor(state.activeCategory).forEach(sec=>mb.appendChild(sec));
  
   // Mobile: simplified crop/resize strip
   const cropping = state.activeTool==='crop-tool' && !!state.cropRect;
   const resizing = state.activeTool==='resize-tool' && !!state.resizeRect;
   if(mbBar){
     if(cropping || resizing){ mbBar.classList.add('crop-mode'); renderCropStrip(cropping?'crop':'resize'); }
     else { mbBar.classList.remove('crop-mode'); const s=document.getElementById('mb-crop-strip'); if(s) s.style.display='none'; }
   }
  
   updateCatSwitcherLabels(); drawOverlay();
   if(typeof updateMobileBarHeightVar==='function')updateMobileBarHeightVar();
 }
  
 function renderCropStrip(mode){
   const strip=document.getElementById('mb-crop-strip'); if(!strip) return;
   strip.innerHTML=''; strip.style.display='flex';
   // Action row
   const actions=el(`<div class="mcs-actions"></div>`);
   const cancelB=el(`<button class="danger">${ICONS.reset}<span>Cancel</span></button>`);
   const saveB=el(`<button class="primary">${ICONS.check}<span>Save</span></button>`);
   if(mode==='crop'){
     cancelB.addEventListener('click',()=>cancelCrop());
     saveB.addEventListener('click',()=>commitCrop());
   } else {
     cancelB.addEventListener('click',()=>cancelResize());
     saveB.addEventListener('click',()=>commitResize());
   }
   actions.appendChild(cancelB); actions.appendChild(saveB);
   strip.appendChild(actions);
  
   if(mode==='crop'){
     // A few aspect-ratio presets
     const row=el(`<div class="mcs-presets"></div>`);
     [['Free',null],['1:1',1],['4:3',4/3],['16:9',16/9],['3:2',3/2],['9:16',9/16],['3:4',3/4]].forEach(([lbl,ratio])=>{
       const b=el(`<button>${lbl}</button>`);
       b.addEventListener('click',()=>{
         if(!state.cropRect) startCrop();
         if(ratio){
           let w=canvas.width*0.7, h=w/ratio;
           if(h>canvas.height*0.9){ h=canvas.height*0.9; w=h*ratio; }
           state.cropRect={x:(canvas.width-w)/2,y:(canvas.height-h)/2,w,h}; drawOverlay();
         }
       });
       row.appendChild(b);
     });
     strip.appendChild(row);
   } else {
     // Resize: dimensions + lock aspect ratio
     const dims=el(`<div class="mcs-dims"></div>`);
     const wI=el(`<input type="number" value="${Math.round(state.resizeRect.w)}" placeholder="W"/>`);
     const hI=el(`<input type="number" value="${Math.round(state.resizeRect.h)}" placeholder="H"/>`);
     const lockB=el(`<button class="mcs-lock ${state.resizeRect.keepRatio?'active':''}">${state.resizeRect.keepRatio?'Locked':'Unlocked'}</button>`);
     wI.addEventListener('input',()=>{ const v=parseInt(wI.value)||1; state.resizeRect.w=v; if(state.resizeRect.keepRatio){ state.resizeRect.h=Math.round(v/state.resizeRect.ratio); hI.value=state.resizeRect.h; } drawOverlay(); });
     hI.addEventListener('input',()=>{ const v=parseInt(hI.value)||1; state.resizeRect.h=v; if(state.resizeRect.keepRatio){ state.resizeRect.w=Math.round(v*state.resizeRect.ratio); wI.value=state.resizeRect.w; } drawOverlay(); });
     lockB.addEventListener('click',()=>{
       state.resizeRect.keepRatio=!state.resizeRect.keepRatio;
       state.resizeRect.ratio=state.resizeRect.w/state.resizeRect.h;
       lockB.classList.toggle('active',state.resizeRect.keepRatio);
       lockB.textContent=state.resizeRect.keepRatio?'Locked':'Unlocked';
     });
     dims.appendChild(wI); dims.appendChild(hI); dims.appendChild(lockB);
     strip.appendChild(dims);
  
     // Common size presets
     const row=el(`<div class="mcs-presets"></div>`);
     const cur=state.resizeRect;
     [['50%',()=>[Math.round(canvas.width*0.5),Math.round(canvas.height*0.5)]],
      ['100%',()=>[canvas.width,canvas.height]],
      ['200%',()=>[canvas.width*2,canvas.height*2]],
      ['1080',()=>[1080,Math.round(1080/(canvas.width/canvas.height))]],
      ['720',()=>[720,Math.round(720/(canvas.width/canvas.height))]]].forEach(([lbl,fn])=>{
       const b=el(`<button>${lbl}</button>`);
       b.addEventListener('click',()=>{ const [w,h]=fn(); state.resizeRect.w=w; state.resizeRect.h=h; wI.value=w; hI.value=h; drawOverlay(); });
       row.appendChild(b);
     });
     strip.appendChild(row);
   }
 }
  
 /* ========================================================================
    MOBILE TOP-BAR SEARCH
    The search button toggles a search bar that replaces the category selector.
    The bar filters section content the same way the desktop sidebar search does.
    ======================================================================== */
 (function bindMobileTopbarSearch(){
   const btn = document.getElementById('mtb-search-btn');
   const box = document.getElementById('mtb-search-box');
   const cat = document.getElementById('mtb-cat');
   const input = document.getElementById('mtb-search-input');
   const closeBtn = document.getElementById('mtb-search-close');
   if(!btn || !box || !cat || !input) return;
  
   function openSearch(){
     box.classList.add('open');
     cat.style.display = 'none';
     btn.classList.add('active');
     setTimeout(()=>input.focus(), 30);
   }
   function closeSearch(){
     box.classList.remove('open');
     cat.style.display = '';
     btn.classList.remove('active');
     input.value = '';
     filterSections('');
     filterMobileSections('');
   }
   btn.addEventListener('click', (e)=>{
     e.stopPropagation();
     if(box.classList.contains('open')) closeSearch();
     else openSearch();
   });
   closeBtn.addEventListener('click', closeSearch);
   input.addEventListener('input', ()=>{
     /* Reuse the desktop search filter helper AND also mirror to mobile content. */
     filterSections(input.value);
     filterMobileSections(input.value);
   });
   input.addEventListener('keydown', e=>{
     if(e.key === 'Escape') closeSearch();
   });
 })();
  
 /* Mobile mirror of filterSections — filters the .mb-content section list too. */
 function filterMobileSections(q){
   q = (q||'').toLowerCase().trim();
   document.querySelectorAll('#mb-content .section').forEach(sec=>{
     let matchAny = false;
     sec.querySelectorAll('.tool-btn, .fx-item, .field').forEach(x=>{
       const txt = x.textContent.toLowerCase();
       const show = !q || txt.includes(q);
       x.style.display = show ? '' : 'none';
       if(show) matchAny = true;
     });
     const titleEl = sec.querySelector('.section-title span:first-child');
     const title = titleEl ? titleEl.textContent.toLowerCase() : '';
     if(!q || title.includes(q)) matchAny = true;
     sec.style.display = matchAny ? '' : 'none';
   });
 }
  
 /* Extend the desktop search helper so it also matches .fx-item entries. */
 (function patchFilterSections(){
   const origFilter = window.filterSections || filterSections;
   window.filterSections = function(q){
     q = (q||'').toLowerCase().trim();
     document.querySelectorAll('#content .section').forEach(sec=>{
       let matchAny = false;
       sec.querySelectorAll('.tool-btn, .fx-item, .field').forEach(x=>{
         const txt = x.textContent.toLowerCase();
         const show = !q || txt.includes(q);
         x.style.display = show ? '' : 'none';
         if(show) matchAny = true;
       });
       const titleEl = sec.querySelector('.section-title span:first-child');
       const title = titleEl ? titleEl.textContent.toLowerCase() : '';
       if(!q || title.includes(q)) matchAny = true;
       sec.style.display = matchAny ? '' : 'none';
     });
   };
 })();
  
 /* ========================================================================
    MOBILE BOTTOM-PANE DRAG PILL
    Lets the user drag the top edge of the bottom pane up/down to resize it,
    revealing more of the image on small screens.
    ======================================================================== */
 (function bindDragPill(){
   const pill = document.getElementById('mb-drag-pill');
   const bar  = document.getElementById('mobile-bar');
   if(!pill || !bar) return;
  
   let dragging = false, startY = 0, startH = 0;
  
   function clampHeight(px){
     const vh = window.innerHeight;
     const min = 56;                     /* just enough to show the pill + one row */
     const max = Math.floor(vh * 0.9);   /* never eat the whole screen */
     return Math.max(min, Math.min(max, px));
   }
  
   function begin(clientY){
     if(!window.matchMedia('(max-width: 900px)').matches) return;
     dragging = true;
     startY = clientY;
     startH = bar.getBoundingClientRect().height;
     pill.classList.add('dragging');
     document.body.style.userSelect = 'none';
   }
   function move(clientY){
     if(!dragging) return;
     /* Dragging up increases pane height (clientY decreases). */
     const dy = startY - clientY;
     const h  = clampHeight(startH + dy);
     bar.style.maxHeight = h + 'px';
     bar.style.height    = h + 'px';
     document.documentElement.style.setProperty('--mb-height', h + 'px');
     if(typeof fitCanvasCss === 'function') fitCanvasCss();
   }
   function end(){
     if(!dragging) return;
     dragging = false;
     pill.classList.remove('dragging');
     document.body.style.userSelect = '';
   }
  
   pill.addEventListener('mousedown', e=>{ begin(e.clientY); e.preventDefault(); });
   window.addEventListener('mousemove', e=>move(e.clientY));
   window.addEventListener('mouseup', end);
  
   pill.addEventListener('touchstart', e=>{
     if(!e.touches[0]) return;
     begin(e.touches[0].clientY);
   }, {passive:true});
   window.addEventListener('touchmove', e=>{
     if(!dragging || !e.touches[0]) return;
     move(e.touches[0].clientY);
     e.preventDefault();
   }, {passive:false});
   window.addEventListener('touchend', end);
   window.addEventListener('touchcancel', end);
  
   /* Double-tap the pill to snap back to auto height. */
   let lastTap = 0;
   pill.addEventListener('click', ()=>{
     const now = Date.now();
     if(now - lastTap < 350){
       bar.style.maxHeight = '';
       bar.style.height = '';
       updateMobileBarHeightVar();
       if(typeof fitCanvasCss === 'function') fitCanvasCss();
     }
     lastTap = now;
   });
 })();
  
 /* ========================================================================
    INIT
    ======================================================================== */
 function init(){
   renderContent(); renderRail(); updateCatSwitcherLabels(); updateMobileBarHeightVar();
   document.addEventListener('keydown',e=>{
     if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
     if((e.ctrlKey||e.metaKey)&&e.key==='z'){ e.preventDefault(); if(e.shiftKey)redo(); else undo(); }
     if((e.ctrlKey||e.metaKey)&&e.key==='y'){ e.preventDefault(); redo(); }
     if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); openExportModal(); }
     if(e.key==='Enter'&&state.cropRect){ commitCrop(); }
     if(e.key==='Escape'&&state.cropRect){ cancelCrop(); }
     if(e.key==='Escape'&&state.resizeRect){ cancelResize(); }
     if(e.key==='Delete'&&state.activeTextId){ pushHistory(); state.texts=state.texts.filter(t=>t.id!==state.activeTextId); state.activeTextId=null; drawOverlay(); renderContent(); }
     if(e.key==='Delete'&&state.activeShapeId){ pushHistory(); state.shapes=state.shapes.filter(s=>s.id!==state.activeShapeId); state.activeShapeId=null; drawOverlay(); renderContent(); }
     /* Clipboard shortcuts operate on the currently active object, or on
        every Smart-Select-checked object if a smart rectangle exists. */
     const activeObj = state.activeShapeId ? {type:'shape',id:state.activeShapeId}
                    : state.activeTextId  ? {type:'text', id:state.activeTextId} : null;
     const getObjFor = (tar)=>tar && (tar.type==='shape' ? state.shapes.find(x=>x.id===tar.id) : state.texts.find(x=>x.id===tar.id));
     if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='c'){
       if(state.smartSelectedIds && state.smartSelectedIds.length){ e.preventDefault(); bulkCopyChecked(); }
       else if(activeObj){ e.preventDefault(); const o=getObjFor(activeObj); if(o) state.clipboard=[{type:activeObj.type, data:JSON.parse(JSON.stringify(o))}]; }
     }
     if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='x'){
       if(state.smartSelectedIds && state.smartSelectedIds.length){ e.preventDefault(); bulkCopyChecked(); bulkDeleteChecked(); }
       else if(activeObj){ e.preventDefault(); const o=getObjFor(activeObj); if(o){ state.clipboard=[{type:activeObj.type, data:JSON.parse(JSON.stringify(o))}];
         pushHistory();
         if(activeObj.type==='shape'){ state.shapes=state.shapes.filter(x=>x.id!==activeObj.id); state.activeShapeId=null; }
         else { state.texts=state.texts.filter(x=>x.id!==activeObj.id); state.activeTextId=null; }
         drawOverlay(); renderContent(); } }
     }
     if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='v'){
       e.preventDefault(); bulkPaste();
     }
     if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='d'){
       e.preventDefault();
       if(state.smartSelectedIds && state.smartSelectedIds.length){ bulkDuplicateChecked(); }
       else if(activeObj){ const o=getObjFor(activeObj); if(o){ state.clipboard=[{type:activeObj.type, data:JSON.parse(JSON.stringify(o))}]; bulkPaste(); } }
     }
     if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='a'){
       if(state.img){
         e.preventDefault();
         if(!state.smartChecked) state.smartChecked={};
         (state.shapes||[]).forEach(s=>state.smartChecked[s.id]=true);
         (state.texts ||[]).forEach(t=>state.smartChecked[t.id]=true);
         state.smartSelectedIds = [
           ...(state.shapes||[]).map(s=>({type:'shape',id:s.id})),
           ...(state.texts ||[]).map(t=>({type:'text', id:t.id})),
         ];
         state.activeCategory='format';
         drawOverlay(); renderContent(); renderRail();
       }
     }
   });

   /* ================================================================
      DELEGATED HISTORY CAPTURE for panel controls
      For continuous inputs (sliders, color pickers, text fields) we
      want a single history snapshot per "editing session", not one per
      pixel of drag. Capture BEFORE the first input event, then reset
      the mark on blur / mouseup so the next session gets its own entry.
      ================================================================ */
   const panelHosts = [document.getElementById('content'), document.getElementById('mb-content')];
   let __histSessionActive = false;
   const isHistoryField = (t)=>{
     if(!t) return false;
     if(t.matches && t.matches('input, textarea, select')) return true;
     return false;
   };
   /* Snapshot BEFORE the user starts editing a control (pointerdown /
      focusin fires before any 'input' event). One snapshot per editing
      session — reset when the user releases / blurs. */
   const beginHistorySession = (e)=>{
     if(!isHistoryField(e.target)) return;
     if(__histSessionActive) return;
     __histSessionActive = true;
     pushHistory();
   };
   const endHistorySession = ()=>{ __histSessionActive = false; autosaveCurrent(); };
   panelHosts.forEach(host=>{
     if(!host) return;
     host.addEventListener('pointerdown', beginHistorySession, true);
     host.addEventListener('focusin',     beginHistorySession, true);
     host.addEventListener('change',      endHistorySession,   true);
     host.addEventListener('pointerup',   endHistorySession,   true);
     host.addEventListener('focusout',    endHistorySession,   true);
   });
   /* Autosave after brush strokes / canvas mutations. */
   canvas.addEventListener('mouseup', ()=>autosaveCurrent(), true);
   canvas.addEventListener('touchend', ()=>autosaveCurrent(), true);
   overlay.addEventListener('mouseup', ()=>autosaveCurrent(), true);
   overlay.addEventListener('touchend', ()=>autosaveCurrent(), true);

   /* Init persistence (IndexedDB autosave + restore) */
   initPersistence();
 }
 init();

 /* ================================================================
    INDEXEDDB PERSISTENCE
    Autosaves the current image + history stack (up to 50 versions)
    so a random reload restores the exact session. Data is cleared
    ONLY when the user exports; new-image loads REPLACE the record.
    Undo history in memory is not cleared on export — only IndexedDB.
    ================================================================ */
 const DB_NAME = 'monomage-store';
 const DB_STORE = 'session';
 const DB_KEY = 'current';
 const MAX_PERSISTED_VERSIONS = 50;
 let __db = null;
 let __autosaveTimer = null;
 function _openDB(){
   return new Promise((resolve,reject)=>{
     if(__db) return resolve(__db);
     const req = indexedDB.open(DB_NAME, 1);
     req.onupgradeneeded = ()=>{
       const db = req.result;
       if(!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
     };
     req.onsuccess = ()=>{ __db = req.result; resolve(__db); };
     req.onerror   = ()=>reject(req.error);
   });
 }
 async function _dbPut(key, value){
   const db = await _openDB();
   return new Promise((resolve,reject)=>{
     const tx = db.transaction(DB_STORE,'readwrite');
     tx.objectStore(DB_STORE).put(value, key);
     tx.oncomplete = ()=>resolve();
     tx.onerror    = ()=>reject(tx.error);
   });
 }
 async function _dbGet(key){
   const db = await _openDB();
   return new Promise((resolve,reject)=>{
     const tx = db.transaction(DB_STORE,'readonly');
     const rq = tx.objectStore(DB_STORE).get(key);
     rq.onsuccess = ()=>resolve(rq.result);
     rq.onerror   = ()=>reject(rq.error);
   });
 }
 async function _dbDel(key){
   const db = await _openDB();
   return new Promise((resolve,reject)=>{
     const tx = db.transaction(DB_STORE,'readwrite');
     tx.objectStore(DB_STORE).delete(key);
     tx.oncomplete = ()=>resolve();
     tx.onerror    = ()=>reject(tx.error);
   });
 }
 function autosaveCurrent(){
   if(!state.img) return;
   // Debounced: coalesce rapid edits into a single write.
   if(__autosaveTimer) clearTimeout(__autosaveTimer);
   __autosaveTimer = setTimeout(async ()=>{
     try{
       const cur = _fullStateSnapshot();
       if(!cur) return;
       // Trim history to the newest MAX_PERSISTED_VERSIONS to control size.
       const hist = state.history.slice(-MAX_PERSISTED_VERSIONS);
       const redo = state.redoStack.slice(-MAX_PERSISTED_VERSIONS);
       await _dbPut(DB_KEY, {
         current: cur,
         history: hist,
         redoStack: redo,
         originalDataUrl: state.originalDataUrl,
         savedAt: Date.now(),
       });
     }catch(e){ /* Quota-exceeded is expected on huge images; ignore. */ }
   }, 350);
 }
 async function clearPersistedSession(){
   if(__autosaveTimer){ clearTimeout(__autosaveTimer); __autosaveTimer=null; }
   try{ await _dbDel(DB_KEY); }catch(_e){}
 }
 async function initPersistence(){
   try{
     const rec = await _dbGet(DB_KEY);
     if(!rec || !rec.current || !rec.current.canvasUrl) return;
     // Restore the last-saved state.
     state.history   = Array.isArray(rec.history)   ? rec.history   : [];
     state.redoStack = Array.isArray(rec.redoStack) ? rec.redoStack : [];
     state.originalDataUrl = rec.originalDataUrl || rec.current.canvasUrl;
     _applyStateSnapshot(rec.current);
   }catch(e){ /* No previous session or DB error: fresh start. */ }
 }
